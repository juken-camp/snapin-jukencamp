<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SnapIn 管理画面</title>
<meta name="theme-color" content="#FAFAF7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SnapIn 管理">
<style>
:root{
  --g:#1D9E75; --gl:#E8F5EF; --gd:#0F6E56;
  --bg:#FAFAF7; --surface:#FFFFFF;
  --ink:#1A1A1A; --ink2:#5C5C5C; --ink3:#9A9A9A;
  --line:rgba(0,0,0,.08); --line2:rgba(0,0,0,.14);
  --amber:#E8A33D; --rose:#D6604D; --sky:#3F7FB8;
  --font-jp:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic Medium",sans-serif;
  --font-en:"Charter","Iowan Old Style","Georgia",serif;
  --shadow:0 1px 2px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.04);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{
  height:100%;
  background:var(--bg);
  font-family:var(--font-jp);
  color:var(--ink);
  overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;background:none;border:none;cursor:pointer;color:inherit;font-size:inherit;}
input,textarea{font-family:inherit;border:none;outline:none;background:none;color:inherit;}

.app{
  max-width:430px;
  margin:0 auto;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  background:var(--bg);
  position:relative;
}

/* ヘッダー: index.html と同じスタイル */
.hdr{
  padding:calc(env(safe-area-inset-top) + 4px) 14px 0;
  height:calc(54px + env(safe-area-inset-top));
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:var(--bg);
  flex-shrink:0;
}
.logo{
  font-family:-apple-system,"Helvetica Neue",sans-serif;
  font-size:22px;
  font-weight:700;
  letter-spacing:-0.01em;
  display:flex;
  align-items:baseline;
  gap:0;
  color:var(--ink);
}
.logo em{
  color:var(--g);
  font-style:normal;
  font-weight:700;
  margin-right:8px;
}
.page-sub{
  font-family:-apple-system,sans-serif;
  font-size:11px;
  font-weight:500;
  color:var(--ink3);
  letter-spacing:0.02em;
}
.hdr-icons{display:flex;gap:4px;color:var(--ink2);align-items:center;}
.hdr-icons button{
  padding:8px 10px;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:transform .12s,color .12s,background .12s;
}
.hdr-icons button:active{background:var(--gl);color:var(--g);transform:scale(0.92);}

.scroll{
  flex:1;
  padding:0 0 calc(40px + env(safe-area-inset-bottom));
}

/* ステータス表示 */
.status{
  margin:8px 20px 0;
  padding:8px 12px;
  border-radius:8px;
  font-size:12px;
  background:var(--gl);
  color:var(--gd);
  display:none;
  align-items:center;
  gap:6px;
}
.status.show{display:flex;}
.status .dot{
  width:6px;height:6px;border-radius:50%;background:var(--g);
}
.status.error{background:#FCE8E5;color:#A03A2A;}
.status.error .dot{background:var(--rose);}
.status.busy .dot{animation:pulse-dot 1.2s ease-in-out infinite;}
@keyframes pulse-dot{0%,100%{opacity:1;}50%{opacity:.35;}}

/* ログイン */
.login-wrap{
  padding:60px 28px 40px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
}
.login-logo{
  font-family:-apple-system,"Helvetica Neue",sans-serif;
  font-size:42px;
  font-weight:700;
  letter-spacing:-0.01em;
  display:flex;
  align-items:baseline;
  justify-content:center;
  gap:0;
  color:var(--ink);
}
.login-logo em{
  color:var(--g);
  font-style:normal;
  font-weight:700;
}
.login-by{
  font-size:11px;
  color:var(--ink3);
  margin-top:-12px;
  letter-spacing:0.05em;
}
.login-tag{
  font-size:13px;
  color:var(--ink2);
  margin:6px 0 18px;
}
.login-form{
  width:100%;
  background:var(--surface);
  border-radius:14px;
  padding:20px;
  box-shadow:var(--shadow);
  display:flex;
  flex-direction:column;
  gap:12px;
}
.login-form label{
  font-size:11px;
  color:var(--ink3);
  font-weight:500;
}
.login-input{
  width:100%;
  height:42px;
  padding:0 14px;
  background:var(--bg);
  border:0.5px solid var(--line2);
  border-radius:10px;
  font-size:14px;
}
.login-input:focus{border-color:var(--g);background:var(--surface);}

.password-wrap{
  position:relative;
}
.password-wrap .login-input{
  padding-right:44px;
}
.password-toggle{
  position:absolute;
  right:6px;
  top:50%;
  transform:translateY(-50%);
  width:36px;
  height:36px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--ink3);
  border-radius:50%;
}
.password-toggle:active{background:var(--bg);}
.login-btn{
  height:44px;
  background:var(--g);
  color:white;
  font-size:14px;
  font-weight:600;
  border-radius:10px;
  margin-top:6px;
}
.login-btn:active{background:var(--gd);transform:scale(0.98);}
.login-btn:disabled{opacity:.5;}
.login-note{
  font-size:10px;
  color:var(--ink3);
  text-align:center;
  margin-top:8px;
  line-height:1.5;
}

/* セクション見出し */
.section-title{
  font-size:11px;
  font-weight:500;
  color:var(--ink3);
  letter-spacing:0.05em;
  padding:18px 20px 8px;
}

/* タブ切替 */
.admin-tabs{
  display:flex;
  gap:0;
  padding:8px 16px 0;
  border-bottom:0.5px solid var(--line);
  background:var(--surface);
  position:sticky;
  top:0;
  z-index:10;
}
.admin-tab{
  padding:12px 16px;
  font-size:14px;
  font-weight:500;
  color:var(--ink3);
  border-bottom:2px solid transparent;
  margin-bottom:-0.5px;
  display:flex;
  align-items:center;
  gap:6px;
  transition:color .12s,border-color .12s;
}
.admin-tab.on{
  color:var(--g);
  border-bottom-color:var(--g);
}
.admin-tab-count{
  background:var(--gl);
  color:var(--gd);
  font-size:11px;
  padding:2px 7px;
  border-radius:10px;
  min-width:18px;
  text-align:center;
  font-weight:600;
}
.admin-tab.on .admin-tab-count{background:var(--g);color:#fff;}
.admin-tab-pane{
  display:none;
  /* タブ切替時のフェードイン */
  animation:tab-fade-in .25s ease-out;
}
.admin-tab-pane.on{display:block;}
@keyframes tab-fade-in{
  from{opacity:0;transform:translateY(4px);}
  to{opacity:1;transform:translateY(0);}
}

/* 塾生一覧 */
.students-list{
  display:flex;
  flex-direction:column;
}
.student-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:14px 18px;
  background:var(--surface);
  border-top:0.5px solid var(--line);
  cursor:pointer;
  transition:background .12s;
}
.student-item:active{background:var(--gl);}
.student-item:last-child{border-bottom:0.5px solid var(--line);}
.student-name{
  flex:1;
  min-width:0;
  font-size:15px;
  color:var(--ink);
}
.student-name small{
  color:var(--ink3);
  font-size:12px;
  margin-left:6px;
}
.student-meta{
  font-size:11px;
  color:var(--ink3);
  font-family:var(--font-en,inherit);
}
.student-claim-badge{
  font-size:10px;
  padding:2px 8px;
  border-radius:10px;
  font-weight:500;
}
.student-claim-badge.claimed{
  background:var(--gl);
  color:var(--gd);
}
.student-claim-badge.unclaimed{
  background:#FEF3E0;
  color:#B8753E;
}
.students-empty{
  text-align:center;
  color:var(--ink3);
  font-size:13px;
  padding:32px 20px;
}
.students-actions{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-top:12px;
}
.students-hint{
  font-size:11px;
  color:var(--ink3);
  line-height:1.7;
  padding:18px 20px;
}

/* 塾生編集モーダルの中身 */
.student-edit-field{
  margin-bottom:14px;
}
.student-edit-field label{
  display:block;
  font-size:12px;
  color:var(--ink3);
  margin-bottom:6px;
  font-weight:500;
}
.student-edit-field input{
  width:100%;
  padding:12px 14px;
  font-size:14px;
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:10px;
  color:var(--ink);
  outline:none;
}
.student-edit-field input:focus{border-color:var(--g);}
.student-edit-field .field-hint{
  font-size:11px;
  color:var(--ink3);
  margin-top:4px;
}
.student-shelves-row{
  background:var(--surface);
  border-radius:12px;
  padding:14px;
  margin-bottom:14px;
}
.student-shelves-label{
  font-size:12px;
  color:var(--ink3);
  margin-bottom:10px;
  font-weight:500;
}
.student-shelf-opt{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 0;
  font-size:14px;
  color:var(--ink);
  cursor:pointer;
}
.student-shelf-opt + .student-shelf-opt{border-top:0.5px solid var(--line);}
.student-shelf-opt:active{opacity:.6;}
.student-shelf-opt .chk{
  width:22px;height:22px;
  border-radius:6px;
  border:1.5px solid var(--line2);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  background:var(--surface);
  color:#fff;
}
.student-shelf-opt.on .chk{background:var(--g);border-color:var(--g);}
.student-shelf-opt .chk svg{width:14px;height:14px;display:none;}
.student-shelf-opt.on .chk svg{display:block;}
.student-shelf-opt-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* 端末登録状況 */
.claim-status-row{
  background:var(--surface);
  border-radius:12px;
  padding:14px;
  margin-bottom:14px;
  display:flex;
  align-items:center;
  gap:12px;
}
.claim-status-label{
  flex:1;
  font-size:13px;
  color:var(--ink2);
}
.claim-status-label b{color:var(--ink);font-weight:600;}
.claim-status-btn{
  padding:8px 14px;
  font-size:12px;
  font-weight:500;
  background:var(--gl);
  color:var(--gd);
  border-radius:8px;
}
.claim-status-btn.danger{
  background:#FCE8E5;
  color:var(--rose,#C43A2C);
}
.claim-status-btn:active{opacity:.6;}

/* 一括追加モーダル */
.bulk-add-area{
  background:var(--surface);
  border-radius:12px;
  padding:14px;
  margin-bottom:14px;
}
.bulk-add-area textarea{
  width:100%;
  min-height:200px;
  font-size:13px;
  font-family:monospace;
  line-height:1.7;
  background:transparent;
  resize:vertical;
  color:var(--ink);
  outline:none;
}
.bulk-add-hint{
  font-size:11px;
  color:var(--ink3);
  line-height:1.7;
  margin-bottom:10px;
  padding:0 2px;
}
.bulk-add-preview{
  background:var(--gl);
  border-radius:10px;
  padding:12px;
  font-size:12px;
  color:var(--gd);
  line-height:1.6;
  margin-top:10px;
}
.bulk-add-preview .row{padding:3px 0;}
.bulk-add-preview .err{color:var(--rose,#C43A2C);}

/* 公式ライブラリ一覧 */
.shelf-list{
  display:flex;
  flex-direction:column;
}
.shelf-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 18px;
  background:var(--surface);
  border-top:0.5px solid var(--line);
  border-bottom:0.5px solid var(--line);
  margin-top:-0.5px;
  cursor:pointer;
}
.shelf-item:active{background:var(--bg);}
.shelf-item.active{background:var(--gl);}
.shelf-avatar{
  width:40px;height:40px;
  border-radius:50%;
  background:var(--gl);
  color:var(--gd);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:700;
  flex-shrink:0;
  overflow:hidden;
}
.shelf-avatar.has-icon{background:transparent;}
.shelf-avatar img{width:100%;height:100%;object-fit:cover;display:block;}

/* アイコン編集 (公式ライブラリ用) */
.icon-edit-row{
  display:flex;
  align-items:center;
  gap:16px;
}
.icon-edit-zone{
  width:84px;height:84px;
  border-radius:50%;
  background:var(--gl);
  color:var(--gd);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  font-weight:700;
  flex-shrink:0;
  overflow:hidden;
  cursor:pointer;
  border:0.5px solid var(--line);
  box-shadow:var(--shadow);
  transition:opacity .14s, transform .14s, box-shadow .14s;
  position:relative;
}
.icon-edit-zone:active{opacity:.85;transform:scale(0.96);}
.icon-edit-zone.has-icon{background:transparent;}
.icon-edit-zone img{width:100%;height:100%;object-fit:cover;display:block;}
.icon-edit-fallback{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
}
/* アイコンの上に薄く出る「カメラ」アイコン (ホバー的なヒント) */
.icon-edit-zone::after{
  content:'';
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0);
  transition:background .14s;
}
.icon-edit-zone:active::after{background:rgba(0,0,0,.06);}
.icon-edit-info{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.icon-edit-help{
  font-size:12px;
  color:var(--ink2);
  line-height:1.5;
}
.icon-clear-btn{
  align-self:flex-start;
  padding:6px 14px;
  background:transparent;
  border:0.5px solid var(--line2);
  border-radius:14px;
  color:var(--ink3);
  font-size:11px;
  font-weight:500;
  transition:background .12s;
}
.icon-clear-btn:active{background:var(--bg);}
.shelf-info{flex:1;min-width:0;}
.shelf-name{
  font-size:14px;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.shelf-handle{
  font-size:11px;color:var(--ink3);
  font-family:var(--font-en);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.shelf-count{
  font-size:11px;
  color:var(--ink3);
  padding:3px 8px;
  background:var(--bg);
  border-radius:10px;
  flex-shrink:0;
}

/* 新規作成ボタン */
.new-shelf-btn{
  margin:12px 20px 0;
  padding:14px;
  background:transparent;
  border:1.5px dashed var(--line2);
  border-radius:12px;
  color:var(--g);
  font-size:13px;
  font-weight:500;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  width:calc(100% - 40px);
}
.new-shelf-btn:active{background:var(--gl);}

/* 公式ライブラリの編集パネル */
.shelf-edit{
  margin:12px 0 0;
  background:var(--surface);
  border-top:0.5px solid var(--line);
  border-bottom:0.5px solid var(--line);
}
.shelf-edit-head{
  padding:14px 20px;
  display:flex;
  align-items:center;
  gap:10px;
  border-bottom:0.5px solid var(--line);
}
.shelf-edit-title{
  flex:1;
  font-size:15px;
  font-weight:600;
}
.shelf-edit-act{
  padding:6px 12px;
  border-radius:14px;
  font-size:12px;
  font-weight:500;
}
.shelf-edit-act.edit{color:var(--ink2);border:0.5px solid var(--line2);}
.shelf-edit-act.delete{color:var(--rose);background:#FCE8E5;}
.shelf-edit-act:active{transform:scale(0.95);}

.shelf-edit-body{
  padding:14px 20px;
}
.shelf-edit-row{
  margin-bottom:14px;
}
.shelf-edit-row label{
  display:block;
  font-size:11px;
  color:var(--ink3);
  margin-bottom:6px;
  font-weight:500;
}
.shelf-edit-row input,
.shelf-edit-row textarea{
  width:100%;
  padding:9px 12px;
  background:var(--bg);
  border:0.5px solid var(--line2);
  border-radius:8px;
  font-size:14px;
  line-height:1.5;
}
.shelf-edit-row textarea{
  min-height:64px;
  resize:vertical;
}
.shelf-edit-row input:focus,
.shelf-edit-row textarea:focus{
  border-color:var(--g);
  background:var(--surface);
}

/* メモ一覧 */
.memo-list-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 20px 4px;
}
.memo-list-head-title{
  font-size:13px;font-weight:600;
}
.memo-list-head-count{
  font-size:11px;
  color:var(--ink3);
}
.memo-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1px;
  background:var(--line);
  padding:0 0 0;
}
.memo-card{
  aspect-ratio:1;
  background:var(--surface);
  overflow:hidden;
  position:relative;
  cursor:pointer;
}
.memo-card:active{opacity:.8;}
.memo-card img{width:100%;height:100%;object-fit:cover;display:block;}
.memo-card .ctxt{
  padding:12px;
  font-size:11px;
  line-height:1.55;
  height:100%;
  overflow:hidden;
  display:-webkit-box;
  -webkit-line-clamp:7;
  -webkit-box-orient:vertical;
  word-break:break-word;
}
.memo-card.list .ctxt{font-size:11px;}
.memo-card-add{
  background:var(--gl);
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--g);
}
.memo-card-add svg{width:32px;height:32px;}

/* メモ編集モーダル */
.modal-mask{
  position:fixed;inset:0;
  background:rgba(0,0,0,0);
  display:flex;
  align-items:flex-end;
  justify-content:center;
  z-index:100;
  /* デフォルトは非表示状態。visibility と opacity でアニメーション対応 */
  visibility:hidden;
  pointer-events:none;
  transition:background .22s ease-out, visibility 0s linear .22s;
}
.modal-mask.on{
  visibility:visible;
  pointer-events:auto;
  background:rgba(0,0,0,.4);
  transition:background .22s ease-out, visibility 0s linear 0s;
}
.modal{
  width:100%;
  max-width:430px;
  background:var(--bg);
  border-radius:18px 18px 0 0;
  max-height:92dvh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  /* デフォルトは画面下に隠れている。.on になったらスライドアップ */
  transform:translateY(100%);
  transition:transform .28s cubic-bezier(.22,.94,.34,1);
  will-change:transform;
}
.modal-mask.on .modal{transform:translateY(0);}
.modal-hdr{
  padding:14px 16px;
  display:flex;
  align-items:center;
  gap:10px;
  background:var(--bg);
  border-bottom:0.5px solid var(--line);
  flex-shrink:0;
}
.modal-hdr-back{
  width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
  color:var(--ink2);
}
.modal-hdr-title{
  flex:1;
  font-size:15px;font-weight:600;
}
.modal-save{
  padding:8px 14px;
  background:var(--g);
  color:white;
  font-size:13px;
  font-weight:600;
  border-radius:18px;
  min-width:62px;
  text-align:center;
}
.modal-save:active{background:var(--gd);transform:scale(0.96);}
.modal-save:disabled{opacity:.5;}
.modal-save.saved{
  background:var(--gd);
  pointer-events:none;
  display:inline-flex;
  align-items:center;justify-content:center;
  animation:save-pulse .35s ease-out;
}
@keyframes save-pulse{
  0%{transform:scale(0.85);}
  60%{transform:scale(1.12);}
  100%{transform:scale(1);}
}
.modal-body{
  flex:1;
  overflow-y:auto;
  padding:16px;
}

/* メモタイプ選択 */
.type-row{
  display:flex;
  gap:8px;
  margin-bottom:18px;
}
.type-chip{
  flex:1;
  padding:10px 8px;
  background:var(--surface);
  border:0.5px solid var(--line2);
  border-radius:10px;
  font-size:12px;
  color:var(--ink2);
  font-weight:500;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
}
.type-chip.on{
  background:var(--gl);
  border-color:var(--g);
  color:var(--gd);
}
.type-chip svg{width:18px;height:18px;}

.memo-edit-area{
  background:var(--surface);
  border-radius:12px;
  padding:14px;
  margin-bottom:14px;
}
.memo-edit-area textarea{
  width:100%;
  min-height:120px;
  font-size:15px;
  line-height:1.6;
  resize:vertical;
}
.memo-edit-area input{
  width:100%;
  font-size:15px;
  padding:6px 0;
}

/* 色選択 */
.color-row{
  display:flex;
  gap:8px;
  margin-bottom:14px;
  flex-wrap:wrap;
}
.color-swatch{
  width:36px;height:36px;
  border-radius:50%;
  border:2px solid transparent;
  cursor:pointer;
}
.color-swatch.on{border-color:var(--g);}

/* クロスポスト: 共有する公式ライブラリ */
.share-row{
  background:var(--surface);
  border-radius:12px;
  padding:14px;
  margin-bottom:14px;
}
.share-row-label{
  font-size:12px;
  color:var(--ink3);
  margin-bottom:10px;
  font-weight:500;
}
.share-opt{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 0;
  font-size:14px;
  color:var(--ink);
  cursor:pointer;
}
.share-opt + .share-opt{border-top:0.5px solid var(--line);}
.share-opt.master{color:var(--ink3);cursor:default;}
.share-opt:active:not(.master){opacity:.6;}
.share-check{
  width:22px;height:22px;
  border-radius:6px;
  border:1.5px solid var(--line2);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  background:var(--surface);
  color:#fff;
  transition:background .12s ease,border-color .12s ease;
}
.share-opt.on .share-check{background:var(--g);border-color:var(--g);}
.share-opt.master .share-check{background:var(--ink3);border-color:var(--ink3);}
.share-check svg{width:14px;height:14px;display:none;}
.share-opt.on .share-check svg,
.share-opt.master .share-check svg{display:block;}
.share-mini-avatar{
  width:26px;height:26px;
  border-radius:50%;
  background:var(--gl);
  color:var(--gd);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;
  overflow:hidden;flex-shrink:0;
}
.share-mini-avatar img{width:100%;height:100%;object-fit:cover;display:block;}
.share-opt-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.share-opt-tag{font-size:11px;color:var(--ink3);}

/* 共有バッジ (メモグリッド) */
.memo-share-badge{
  position:absolute;
  top:6px;left:6px;
  background:rgba(0,0,0,.55);
  color:#fff;
  font-size:10px;
  font-weight:600;
  padding:2px 6px;
  border-radius:8px;
  display:flex;align-items:center;gap:3px;
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
  z-index:2;
}
.memo-share-badge svg{width:9px;height:9px;}
.memo-card.is-ref{opacity:.7;}
.memo-card.is-ref::after{
  content:'';
  position:absolute;
  inset:0;
  border:1.5px dashed var(--line2);
  pointer-events:none;
}

/* リスト編集 */
.list-edit{
  background:var(--surface);
  border-radius:12px;
  padding:14px;
  margin-bottom:14px;
}
.list-item-row{
  display:flex;
  align-items:center;
  gap:8px;
  padding:6px 0;
  border-bottom:0.5px solid var(--line);
}
.list-item-row:last-of-type{border-bottom:none;}
.list-item-row input{flex:1;font-size:14px;padding:6px 0;}
.list-mark{
  width:26px;
  height:26px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:6px;
  font-size:13px;
  color:var(--ink2);
  flex-shrink:0;
  transition:background .12s;
}
.list-mark:active{background:var(--gl);}
.list-mark.num{
  font-family:var(--font-en,inherit);
  font-weight:500;
  font-size:13px;
  color:var(--ink2);
}
.list-mark .chk-box{
  width:16px;
  height:16px;
  border:1.5px solid var(--line2);
  border-radius:4px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  background:transparent;
  transition:background .12s,border-color .12s;
}
.list-mark.on .chk-box{
  background:var(--g);
  border-color:var(--g);
}
.list-item-row.done input{
  color:var(--ink3);
  text-decoration:line-through;
}
.list-item-del{
  padding:4px 8px;
  color:var(--ink3);
  font-size:11px;
}
.list-item-add{
  margin-top:8px;
  color:var(--g);
  font-size:13px;
  font-weight:500;
  padding:6px 0;
}

/* 写真アップロード */
.photo-zone{
  background:var(--surface);
  border:1.5px dashed var(--line2);
  border-radius:12px;
  padding:30px 20px;
  text-align:center;
  margin-bottom:14px;
  color:var(--ink2);
  font-size:13px;
  transition:background .12s, border-color .12s;
}
.photo-zone:active{background:var(--gl);border-color:var(--g);}
.photo-zone-empty{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  color:var(--ink3);
}
.photo-zone-empty svg{color:var(--g);}
.photo-zone.has-image{
  padding:0;
  border:none;
  background:transparent;
}
.photo-zone img{
  width:100%;
  max-height:300px;
  object-fit:contain;
  border-radius:12px;
  background:var(--surface);
}
.photo-zone-buttons{
  display:flex;
  gap:8px;
  margin-top:10px;
}
.photo-zone-btn{
  flex:1;
  padding:9px;
  background:var(--surface);
  border:0.5px solid var(--line2);
  border-radius:10px;
  font-size:12px;
  color:var(--ink2);
  font-weight:500;
}
.photo-zone-btn:active{background:var(--gl);}

/* 削除ボタン (モーダル内) */
.modal-del{
  width:100%;
  padding:11px;
  background:transparent;
  border:0.5px solid var(--line2);
  border-radius:10px;
  color:var(--rose);
  font-size:13px;
  font-weight:500;
  margin-top:14px;
}
.modal-del:active{background:#FCE8E5;}

/* 待機メッセージ */
.empty-shelf-state{
  padding:60px 30px;
  text-align:center;
  color:var(--ink3);
  font-size:13px;
  line-height:1.7;
}

/* トースト */
.toast{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:rgba(20,20,20,.92);
  color:white;
  padding:10px 18px;
  border-radius:20px;
  font-size:13px;
  opacity:0;
  pointer-events:none;
  transition:all .25s;
  z-index:200;
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* ━━━ アイコンクロップエディタ ━━━
   写真を選んだあと、円形マスクの中で位置とスケールを調整して保存する */
.crop-mask{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:flex;
  flex-direction:column;
  z-index:300;
  visibility:hidden;
  opacity:0;
  transition:opacity .2s ease-out, visibility 0s linear .2s;
}
.crop-mask.on{
  visibility:visible;
  opacity:1;
  transition:opacity .2s ease-out, visibility 0s linear 0s;
}
.crop-hdr{
  padding:calc(env(safe-area-inset-top) + 10px) 16px 12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  color:white;
  flex-shrink:0;
}
.crop-hdr-title{
  font-size:15px;
  font-weight:600;
  flex:1;
  text-align:center;
}
.crop-btn{
  padding:8px 14px;
  border-radius:18px;
  font-size:13px;
  font-weight:600;
  min-width:64px;
  text-align:center;
}
.crop-btn.cancel{
  color:white;
  opacity:.85;
  padding-left:0;
  text-align:left;
}
.crop-btn.confirm{
  background:var(--g);
  color:white;
}
.crop-btn.confirm:active{background:var(--gd);transform:scale(0.96);}
.crop-stage{
  flex:1;
  position:relative;
  overflow:hidden;
  touch-action:none;
  user-select:none;
  -webkit-user-select:none;
}
.crop-stage canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  display:block;
}
.crop-hint{
  padding:14px 24px calc(env(safe-area-inset-bottom) + 18px);
  color:rgba(255,255,255,.7);
  font-size:12px;
  text-align:center;
  line-height:1.6;
  flex-shrink:0;
}
.crop-zoom-row{
  display:flex;
  align-items:center;
  gap:14px;
  padding:6px 24px 0;
  color:rgba(255,255,255,.85);
}
.crop-zoom-row input[type=range]{
  flex:1;
  -webkit-appearance:none;
  appearance:none;
  height:2px;
  background:rgba(255,255,255,.3);
  border-radius:1px;
  outline:none;
}
.crop-zoom-row input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;
  appearance:none;
  width:20px;
  height:20px;
  border-radius:50%;
  background:white;
  cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,.4);
}
.crop-zoom-row input[type=range]::-moz-range-thumb{
  width:20px;
  height:20px;
  border-radius:50%;
  background:white;
  border:none;
  cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,.4);
}
.crop-zoom-icon{
  font-size:13px;
  font-weight:600;
  width:18px;
  text-align:center;
}

.hide{display:none !important;}

/* ━━━ 新規スタイル ━━━ */

/* ホーム要約 (タブ直下の軽い数字パネル) */
.summary-row{
  display:flex;
  gap:8px;
  padding:12px 16px 4px;
}
.summary-card{
  flex:1;
  background:var(--surface);
  border-radius:12px;
  padding:10px 12px;
  display:flex;
  flex-direction:column;
  gap:2px;
  border:0.5px solid var(--line);
}
.summary-card .num{
  font-family:var(--font-en);
  font-size:22px;
  font-weight:600;
  color:var(--ink);
  line-height:1.1;
}
.summary-card .lbl{
  font-size:10px;
  color:var(--ink3);
  font-weight:500;
  letter-spacing:0.02em;
}
.summary-card.alert .num{color:var(--amber);}
.summary-card.alert{background:#FFF8E8;border-color:#F2D88B;}

/* 検索バー (塾生・メモ共通) */
.admin-search{
  margin:10px 16px 0;
  height:38px;
  background:var(--surface);
  border:0.5px solid var(--line2);
  border-radius:19px;
  display:flex;
  align-items:center;
  padding:0 14px;
  gap:8px;
  transition:border-color .12s, background .12s;
}
.admin-search:focus-within{
  border-color:var(--g);
  background:var(--surface);
}
.admin-search svg{
  color:var(--ink3);
  flex-shrink:0;
}
.admin-search input{
  flex:1;
  font-size:14px;
  color:var(--ink);
  height:100%;
}
.admin-search input::placeholder{color:var(--ink3);}
.admin-search-clear{
  width:22px;height:22px;
  border-radius:50%;
  background:var(--line);
  color:var(--ink2);
  display:none;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}
.admin-search-clear.show{display:flex;}
.admin-search-clear:active{background:var(--line2);}

/* フィルタチップ (塾生用・メモタイプ用) */
.filter-row{
  display:flex;
  gap:6px;
  padding:10px 16px 14px;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.filter-row::-webkit-scrollbar{display:none;}
.filter-chip{
  flex-shrink:0;
  padding:6px 12px;
  font-size:12px;
  color:var(--ink2);
  background:var(--surface);
  border:0.5px solid var(--line2);
  border-radius:14px;
  font-weight:500;
  display:flex;
  align-items:center;
  gap:5px;
  white-space:nowrap;
  transition:background .12s, color .12s, border-color .12s;
}
.filter-chip.on{
  background:var(--gl);
  color:var(--gd);
  border-color:var(--g);
}
.filter-chip:active{transform:scale(0.96);}
.filter-chip .c-count{
  font-size:10px;
  color:var(--ink3);
  font-family:var(--font-en);
}
.filter-chip.on .c-count{color:var(--gd);}

/* 塾生編集モーダル: ライブラリオプションにアバター追加 */
.student-shelf-opt .mini-avatar{
  width:24px;height:24px;
  border-radius:50%;
  background:var(--gl);
  color:var(--gd);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;
  overflow:hidden;
  flex-shrink:0;
}
.student-shelf-opt .mini-avatar img{width:100%;height:100%;object-fit:cover;display:block;}

/* 公式ライブラリ編集: 画面遷移 (リストと編集を切り替え) */
.shelf-edit-screen{
  display:none;
  flex-direction:column;
  /* 表示時に滑らかに見せるためのフェード/スライド */
  animation:shelf-edit-in .22s ease-out;
}
.shelf-edit-screen.on{
  display:flex;
}
@keyframes shelf-edit-in{
  from{opacity:0;transform:translateX(8px);}
  to{opacity:1;transform:translateX(0);}
}
/* リスト側を隠す時のクラス */
.pane-hidden{display:none !important;}
.shelf-edit-back{
  display:flex;
  align-items:center;
  gap:6px;
  padding:14px 12px 8px;
  background:var(--bg);
}
.shelf-edit-back button{
  display:flex;
  align-items:center;
  gap:4px;
  padding:6px 10px;
  color:var(--ink2);
  font-size:14px;
  font-weight:500;
  border-radius:8px;
}
.shelf-edit-back button:active{background:var(--gl);color:var(--g);}
.shelf-edit-back .crumb{
  font-size:14px;
  font-weight:600;
  color:var(--ink);
  flex:1;
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

/* 空メッセージ (検索結果なし) */
.no-result{
  text-align:center;
  color:var(--ink3);
  font-size:13px;
  padding:30px 20px;
}
</style>
</head>
<body>
<div class="app">

<div class="hdr">
  <div class="logo">Snap<em>In</em><span class="page-sub">管理画面</span></div>
  <div class="hdr-icons" id="hdr-icons" style="display:none;">
    <button id="logout-btn" aria-label="ログアウト">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5M21 12H9"/></svg>
    </button>
  </div>
</div>

<div id="status" class="status"></div>

<!-- ログイン画面 -->
<div id="login-screen" class="scroll">
  <div class="login-wrap">
    <div class="login-logo">Snap<em>In</em></div>
    <div class="login-by">管理画面</div>
    <div class="login-tag">JUKEN CAMP 公式アカウント</div>
    <form class="login-form" id="login-form" onsubmit="return false;">
      <div>
        <label for="login-email">メールアドレス</label>
        <input id="login-email" class="login-input" type="email" autocomplete="username" placeholder="example@yahoo.co.jp">
      </div>
      <div>
        <label for="login-password">パスワード</label>
        <div class="password-wrap">
          <input id="login-password" class="login-input" type="password" autocomplete="current-password" placeholder="">
          <button type="button" class="password-toggle" id="password-toggle" aria-label="パスワードを表示">
            <svg class="eye-on" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-off hide" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/><path d="M3 3l18 18" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>
      <button class="login-btn" id="login-btn" type="submit">ログイン</button>
      <div class="login-note">
        ログイン状態はこの端末で保持されます。<br>
        パスワードは Vercel の環境変数 ADMIN_PASSWORD で管理。
      </div>
    </form>
  </div>
</div>

<!-- ログイン後の画面 -->
<div id="main-screen" class="scroll hide">
  <!-- タブ切替 -->
  <div class="admin-tabs">
    <button class="admin-tab on" data-admin-tab="shelves">公式ライブラリ</button>
    <button class="admin-tab" data-admin-tab="students">塾生 <span class="admin-tab-count" id="students-tab-count">0</span></button>
  </div>

  <!-- 公式ライブラリタブ -->
  <div class="admin-tab-pane on" id="pane-shelves">
    <div class="section-title">管理する公式ライブラリ</div>
    <div class="shelf-list" id="shelf-list"></div>
    <button class="new-shelf-btn" id="new-shelf-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      新しい公式ライブラリを作る
    </button>
  </div>

  <!-- 公式ライブラリ編集 (画面遷移風) -->
  <div class="shelf-edit-screen" id="shelf-edit-screen">
    <div class="shelf-edit-back">
      <button id="shelf-edit-back-btn" aria-label="戻る">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        戻る
      </button>
      <div class="crumb" id="shelf-edit-crumb"></div>
    </div>
    <div id="shelf-edit-panel"></div>
  </div>

  <!-- 塾生タブ -->
  <div class="admin-tab-pane" id="pane-students">
    <div class="summary-row" id="students-summary"></div>
    <div class="admin-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="students-search" type="text" placeholder="名前で探す">
      <button class="admin-search-clear" id="students-search-clear" aria-label="クリア">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="filter-row" id="students-filter"></div>
    <div class="section-title" id="students-list-title">塾生名簿</div>
    <div class="students-list" id="students-list"></div>
    <div class="students-actions">
      <button class="new-shelf-btn" id="new-student-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        生徒を1人ずつ追加
      </button>
      <button class="new-shelf-btn" id="bulk-student-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        まとめて追加
      </button>
    </div>
    <div class="students-hint">
      生徒は登録した名前と誕生日4桁で SnapIn に入ります。<br>
      機種変などで入れなくなったら、生徒をタップして「端末登録を解除」してください。
    </div>
  </div>
</div>

<!-- メモ編集モーダル -->
<div class="modal-mask" id="memo-modal">
  <div class="modal">
    <div class="modal-hdr">
      <button class="modal-hdr-back" id="memo-cancel">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
      <div class="modal-hdr-title" id="memo-modal-title">新しいメモ</div>

<script>
'use strict';

const $=id=>document.getElementById(id);

const CARD_COLORS=[
  {id:'default',name:'白',bg:'#FFFDF5',fg:'#1A1A1A'},
  {id:'yellow', name:'黄',bg:'#FFF6D6',fg:'#5A4818'},
  {id:'pink',   name:'桃',bg:'#FCE6E8',fg:'#6B2030'},
  {id:'blue',   name:'青',bg:'#E0EDF8',fg:'#1F3A5C'},
  {id:'green',  name:'緑',bg:'#E0F1E4',fg:'#1F4E2C'},
  {id:'purple', name:'紫',bg:'#EBE0F2',fg:'#3D2657'},
  {id:'gray',   name:'灰',bg:'#ECEDEE',fg:'#3A3F44'},
];
const colorById=id=>CARD_COLORS.find(c=>c.id===id)||CARD_COLORS[0];

const state={
  password:null,         // ログイン後、メモリ上+localStorage で保持
  email:null,            // メールアドレス (表示用)
  shelves:[],
  selectedId:null,
  editingMemo:null,
  saving:false,
  // ─── 塾生名簿関連 ───
  tab:'shelves',         // 'shelves' | 'students'
  students:[],           // 塾生名簿
  editingStudent:null,   // 編集中の塾生
  bulkText:'',           // 一括追加のテキスト
  // ─── 検索/フィルタ ───
  studentSearch:'',      // 塾生検索文字列
  studentFilter:'all',   // 'all' | 'unclaimed' | 'claimed' | 'shelf:<id>'
  memoSearch:'',         // メモ検索文字列
  memoTypeFilter:'all',  // 'all' | 'note' | 'photo' | 'list'
};

const ADMIN_AUTH_KEY='snapin_admin_auth';

function loadAuth(){
  try{
    const raw=localStorage.getItem(ADMIN_AUTH_KEY);
    if(!raw)return false;
    const d=JSON.parse(raw);
    if(d && d.password){
      state.password=d.password;
      state.email=d.email||'';
      return true;
    }
  }catch(e){}
  return false;
}

function saveAuth(){
  try{
    localStorage.setItem(ADMIN_AUTH_KEY,JSON.stringify({
      email:state.email,
      password:state.password,
    }));
  }catch(e){}
}

function clearAuth(){
  try{localStorage.removeItem(ADMIN_AUTH_KEY);}catch(e){}
}

function esc(s){
  if(s==null)return '';
  return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

let toastT=null;
function toast(msg){
  const t=$('toast');
  t.textContent=msg;
  t.classList.add('on');
  clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove('on'),1800);
}

function setStatus(text,kind){
  const s=$('status');
  s.textContent='';
  if(!text){s.classList.remove('show');return;}
  s.classList.add('show');
  s.classList.toggle('error',kind==='error');
  s.classList.toggle('busy',kind==='busy');
  const dot=document.createElement('div');
  dot.className='dot';
  s.appendChild(dot);
  const sp=document.createElement('span');
  sp.textContent=text;
  s.appendChild(sp);
}

// ═══ API ═══
async function fetchShelves(){
  setStatus('読み込み中…','busy');
  try{
    const res=await fetch('/api/shelves');
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    state.shelves=Array.isArray(data.shelves)?data.shelves:[];
    setStatus('読み込みました');
    setTimeout(()=>setStatus(''),1500);
    return true;
  }catch(err){
    setStatus('読み込み失敗: '+err.message,'error');
    return false;
  }
}

async function saveShelves(){
  if(!state.password){setStatus('再ログインしてください','error');return false;}
  if(state.saving)return false;
  state.saving=true;
  setStatus('保存中…','busy');
  try{
    const res=await fetch('/api/shelves',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-admin-password':state.password,
      },
      // サーバー側のフィールド名の差異に備え、複数の名前で送る
      body:JSON.stringify({
        password:state.password,
        adminPassword:state.password,
        shelves:state.shelves,
      }),
    });
    if(res.status===401 || res.status===403){
      setStatus('認証エラー: パスワードが違います','error');
      state.password=null;
      clearAuth();
      showLogin();
      return false;
    }
    if(!res.ok)throw new Error('HTTP '+res.status);
    setStatus('保存しました');
    setTimeout(()=>setStatus(''),1500);
    return true;
  }catch(err){
    setStatus('保存失敗: '+err.message,'error');
    return false;
  }finally{
    state.saving=false;
  }
}

// ═══ STUDENTS ═══
async function fetchStudents(){
  if(!state.password)return false;
  try{
    const res=await fetch('/api/students',{
      headers:{'x-admin-password':state.password},
    });
    if(!res.ok){
      console.warn('students fetch failed:',res.status);
      return false;
    }
    const data=await res.json();
    state.students=Array.isArray(data.students)?data.students:[];
    return true;
  }catch(err){
    console.warn('students fetch error:',err);
    return false;
  }
}

async function saveStudents(){
  if(!state.password){setStatus('再ログインしてください','error');return false;}
  if(state.saving)return false;
  state.saving=true;
  setStatus('保存中…','busy');
  try{
    const res=await fetch('/api/students',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-admin-password':state.password,
      },
      body:JSON.stringify({students:state.students}),
    });
    if(res.status===401 || res.status===403){
      setStatus('認証エラー','error');
      state.password=null;
      clearAuth();
      showLogin();
      return false;
    }
    if(!res.ok)throw new Error('HTTP '+res.status);
    setStatus('保存しました');
    setTimeout(()=>setStatus(''),1500);
    return true;
  }catch(err){
    setStatus('保存失敗: '+err.message,'error');
    return false;
  }finally{
    state.saving=false;
  }
}

function updateStudentsTabCount(){
  const el=$('students-tab-count');
  if(el)el.textContent=state.students.length;
}

// 塾生サマリーカード (登録済/未登録の数)
function renderStudentsSummary(){
  const el=$('students-summary');
  if(!el)return;
  const total=state.students.length;
  const claimed=state.students.filter(s=>!!s.claimedBy).length;
  const unclaimed=total-claimed;
  const totalMemos=state.shelves.reduce((sum,sh)=>sum+(sh.cards||[]).filter(c=>!c._ref).length,0);
  el.innerHTML=`
    <div class="summary-card">
      <div class="num">${total}</div>
      <div class="lbl">塾生</div>
    </div>
    <div class="summary-card ${unclaimed>0?'alert':''}">
      <div class="num">${unclaimed}</div>
      <div class="lbl">未登録</div>
    </div>
    <div class="summary-card">
      <div class="num">${totalMemos}</div>
      <div class="lbl">メモ総数</div>
    </div>
  `;
}

// 塾生フィルタチップを描画
function renderStudentsFilter(){
  const el=$('students-filter');
  if(!el)return;
  const f=state.studentFilter;
  const total=state.students.length;
  const claimed=state.students.filter(s=>!!s.claimedBy).length;
  const unclaimed=total-claimed;
  const chips=[
    {id:'all',label:'すべて',count:total},
    {id:'unclaimed',label:'未登録',count:unclaimed},
    {id:'claimed',label:'登録済',count:claimed},
  ];
  // 各ライブラリ別チップ
  state.shelves.forEach(sh=>{
    const c=state.students.filter(s=>Array.isArray(s.shelfIds) && s.shelfIds.includes(sh.id)).length;
    if(c>0)chips.push({id:'shelf:'+sh.id,label:sh.name||'(無題)',count:c});
  });
  el.innerHTML=chips.map(ch=>`
    <button class="filter-chip ${f===ch.id?'on':''}" data-filter="${esc(ch.id)}">
      ${esc(ch.label)} <span class="c-count">${ch.count}</span>
    </button>
  `).join('');
  el.querySelectorAll('[data-filter]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      state.studentFilter=btn.dataset.filter;
      renderStudentsFilter();
      renderStudentsList();
    });
  });
}

// 検索・フィルタを適用した塾生リスト
function getFilteredStudents(){
  const q=(state.studentSearch||'').trim().toLowerCase();
  const f=state.studentFilter||'all';
  return state.students.filter(s=>{
    // フィルタ
    if(f==='unclaimed' && s.claimedBy)return false;
    if(f==='claimed' && !s.claimedBy)return false;
    if(f.startsWith('shelf:')){
      const sid=f.slice(6);
      if(!Array.isArray(s.shelfIds) || !s.shelfIds.includes(sid))return false;
    }
    // 検索 (名前 or 誕生日)
    if(q){
      const name=(s.name||'').toLowerCase();
      const bd=(s.birthday||'').toLowerCase();
      if(!name.includes(q) && !bd.includes(q))return false;
    }
    return true;
  });
}

function renderStudentsList(){
  const el=$('students-list');
  if(!el)return;
  el.innerHTML='';
  const filtered=getFilteredStudents();
  // タイトル更新 (検索/フィルタ中なら件数表示)
  const titleEl=$('students-list-title');
  if(titleEl){
    const total=state.students.length;
    if(filtered.length===total){
      titleEl.textContent='塾生名簿';
    }else{
      titleEl.textContent=`絞り込み結果 ${filtered.length}/${total}`;
    }
  }
  if(state.students.length===0){
    el.innerHTML='<div class="students-empty">まだ塾生が登録されていません。<br>下のボタンから追加してください。</div>';
    return;
  }
  if(filtered.length===0){
    el.innerHTML='<div class="no-result">該当する塾生はいません</div>';
    return;
  }
  // 名前順にソート (nameKeyベース、フォールバックで name)
  const sorted=[...filtered].sort((a,b)=>{
    const ka=(a.nameKey||a.name||'').toString();
    const kb=(b.nameKey||b.name||'').toString();
    return ka.localeCompare(kb,'ja');
  });
  sorted.forEach(s=>{
    const row=document.createElement('div');
    row.className='student-item';
    const claimed=!!s.claimedBy;
    const bdShow=s.birthday?s.birthday.slice(0,2)+'/'+s.birthday.slice(2):'';
    row.innerHTML=`
      <div class="student-name">
        ${esc(s.name||'(無名)')}
      </div>
      <div class="student-meta">${esc(bdShow)}</div>
      <div class="student-claim-badge ${claimed?'claimed':'unclaimed'}">${claimed?'✓ 登録済':'未登録'}</div>
    `;
    row.addEventListener('click',()=>openStudentModal(s));
    el.appendChild(row);
  });
}

function openStudentModal(student){
  const isNew=!student;
  if(isNew){
    student={
      id:'stu_'+Date.now()+'_'+Math.floor(Math.random()*1000),
      name:'',
      nameKey:'',
      birthday:'',
      shelfIds:[],
      aiEnabled:true, // 全員trueで固定 (UI上ではトグルしない)
      claimedBy:null,
      claimedAt:null,
      revoked:false,
      createdAt:Date.now(),
    };
  }
  state.editingStudent=Object.assign({},student,{_new:isNew});
  $('student-modal-title').textContent=isNew?'塾生を追加':'塾生を編集';
  renderStudentModalBody();
  $('student-modal').classList.add('on');
  const sbody=$('student-modal-body');
  if(sbody)sbody.scrollTop=0;
}

function closeStudentModal(){
  $('student-modal').classList.remove('on');
  state.editingStudent=null;
}

function renderStudentModalBody(){
  const body=$('student-modal-body');
  const s=state.editingStudent;
  if(!s)return;
  const shelves=state.shelves||[];
  const shelfIds=Array.isArray(s.shelfIds)?s.shelfIds:[];
  // claim状態
  const claimed=!!s.claimedBy;
  const claimDate=s.claimedAt?new Date(s.claimedAt).toLocaleDateString('ja-JP'):'';
  const claimHtml=s._new?'':`
    <div class="claim-status-row">
      <div class="claim-status-label">
        <b>端末の登録: ${claimed?'済':'未登録'}</b>
        ${claimed?`<br><small style="color:var(--ink3);">${esc(claimDate)} に登録</small>`:''}
      </div>
      ${claimed?'<button class="claim-status-btn danger" id="claim-unclaim-btn">解除</button>':''}
    </div>
  `;
  body.innerHTML=`
    <div class="student-edit-field">
      <label>名前 (スペースなし)</label>
      <input id="stu-name" type="text" value="${esc(s.name||'')}" placeholder="例: 山田太郎">
      <div class="field-hint">生徒が入力する時と同じ文字で登録してください。</div>
    </div>
    <div class="student-edit-field">
      <label>誕生日 (MMDD)</label>
      <input id="stu-bd" type="tel" inputmode="numeric" maxlength="4" value="${esc(s.birthday||'')}" placeholder="例: 0401">
      <div class="field-hint">4月1日なら 0401、12月25日なら 1225</div>
    </div>
    <div class="student-shelves-row">
      <div class="student-shelves-label">登録できる公式ライブラリ</div>
      ${shelves.length===0
        ? '<div style="font-size:12px;color:var(--ink3);padding:8px 0;">まだ公式ライブラリがありません。先に作ってください。</div>'
        : shelves.map(sh=>{
          const on=shelfIds.includes(sh.id);
          const avatar=sh.icon
            ? `<div class="mini-avatar"><img src="${esc(sh.icon)}" alt=""></div>`
            : `<div class="mini-avatar">${esc((sh.name||'?').slice(0,1))}</div>`;
          return `
            <div class="student-shelf-opt ${on?'on':''}" data-stu-shelf="${esc(sh.id)}">
              <div class="chk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></div>
              ${avatar}
              <div class="student-shelf-opt-name">${esc(sh.name||'(無題)')}</div>
            </div>
          `;
        }).join('')
      }
    </div>
    ${claimHtml}
    ${s._new?'':'<button class="modal-del" id="stu-del">この塾生を削除</button>'}
  `;
  // イベント
  $('stu-name').addEventListener('input',e=>{state.editingStudent.name=e.target.value;});
  const bdInp=$('stu-bd');
  bdInp.addEventListener('input',e=>{
    e.target.value=e.target.value.replace(/\D/g,'').slice(0,4);
    state.editingStudent.birthday=e.target.value;
  });
  body.querySelectorAll('[data-stu-shelf]').forEach(el=>{
    el.addEventListener('click',()=>{
      const id=el.dataset.stuShelf;
      if(!Array.isArray(state.editingStudent.shelfIds))state.editingStudent.shelfIds=[];
      const arr=state.editingStudent.shelfIds;
      const i=arr.indexOf(id);
      if(i>=0)arr.splice(i,1);
      else arr.push(id);
      renderStudentModalBody();
    });
  });
  const unclaimBtn=$('claim-unclaim-btn');
  if(unclaimBtn){
    unclaimBtn.addEventListener('click',unclaimStudent);
  }
  const delBtn=$('stu-del');
  if(delBtn){
    delBtn.addEventListener('click',deleteStudentFromModal);
  }
}

async function saveStudentFromModal(){
  const s=state.editingStudent;
  if(!s)return;
  const name=(s.name||'').trim();
  const bd=(s.birthday||'').trim();
  if(!name){setStatus('名前を入れてください','error');return;}
  if(!/^\d{4}$/.test(bd)){setStatus('誕生日は4桁の数字','error');return;}
  // 名前+誕生日の重複チェック (自分以外)
  const dup=state.students.find(x=>x.id!==s.id && x.birthday===bd && (x.name||'').trim()===name);
  if(dup){
    if(!confirm(`同じ名前+誕生日の生徒「${dup.name}」が既にいます。\nこのまま追加すると、生徒が claim する時にどちらか1人しか入れません。\n本当に追加しますか?`))return;
  }
  // sanitized object
  const cleaned={
    id:s.id,
    name:name,
    nameKey:'',
    birthday:bd,
    shelfIds:Array.isArray(s.shelfIds)?s.shelfIds:[],
    aiEnabled:true,
    revoked:false,
    createdAt:s.createdAt||Date.now(),
  };
  // 上書き or 新規追加
  if(s._new){
    state.students.unshift(cleaned);
  }else{
    const idx=state.students.findIndex(x=>x.id===s.id);
    if(idx>=0)state.students[idx]=cleaned;
    else state.students.unshift(cleaned);
  }
  const ok=await saveStudents();
  if(!ok)return;
  closeStudentModal();
  // サーバーから取り直して claim 状態などを同期
  await fetchStudents();
  renderStudentsSummary();
  renderStudentsFilter();
  renderStudentsList();
  updateStudentsTabCount();
}

async function deleteStudentFromModal(){
  const s=state.editingStudent;
  if(!s || s._new)return;
  if(!confirm(`「${s.name}」を名簿から削除しますか?\nこの生徒の端末から SnapIn が使えなくなります。`))return;
  state.students=state.students.filter(x=>x.id!==s.id);
  const ok=await saveStudents();
  if(!ok)return;
  closeStudentModal();
  renderStudentsSummary();
  renderStudentsFilter();
  renderStudentsList();
  updateStudentsTabCount();
}

async function unclaimStudent(){
  const s=state.editingStudent;
  if(!s || s._new)return;
  if(!confirm(`「${s.name}」の端末登録を解除しますか?\nこの生徒は新しい端末で再度 SnapIn に入れるようになります。`))return;
  try{
    const res=await fetch('/api/students?action=unclaim&id='+encodeURIComponent(s.id),{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-admin-password':state.password,
      },
      body:JSON.stringify({action:'unclaim',id:s.id}),
    });
    if(!res.ok){
      setStatus('解除失敗','error');
      return;
    }
    setStatus('端末登録を解除しました');
    setTimeout(()=>setStatus(''),1500);
    await fetchStudents();
    renderStudentsSummary();
    renderStudentsFilter();
    renderStudentsList();
    closeStudentModal();
  }catch(err){
    setStatus('解除失敗: '+err.message,'error');
  }
}

// ─── 一括追加 ───
function openBulkModal(){
  state.bulkText='';
  renderBulkModalBody();
  $('bulk-modal').classList.add('on');
  const bbody=$('bulk-modal-body');
  if(bbody)bbody.scrollTop=0;
}

function closeBulkModal(){
  $('bulk-modal').classList.remove('on');
  state.bulkText='';
}

function parseBulkText(text){
  // 各行: 名前,誕生日 (カンマで区切り)
  const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(l=>l);
  return lines.map((line,i)=>{
    const parts=line.split(/[,\t]/).map(p=>p.trim()).filter(p=>p);
    if(parts.length<2){
      return {line:i+1,error:'カンマで区切ってください: '+line,raw:line};
    }
    const name=parts[0];
    let bd=parts[1].replace(/\D/g,'');
    if(bd.length>4)bd=bd.slice(-4);
    bd=bd.padStart(4,'0');
    if(!/^\d{4}$/.test(bd)){
      return {line:i+1,error:'誕生日が不正: '+line,raw:line};
    }
    if(!name){
      return {line:i+1,error:'名前が空: '+line,raw:line};
    }
    return {name,nameKey:'',birthday:bd,raw:line};
  });
}

function renderBulkModalBody(){
  const body=$('bulk-modal-body');
  const parsed=state.bulkText?parseBulkText(state.bulkText):[];
  const ok=parsed.filter(p=>!p.error);
  const errs=parsed.filter(p=>p.error);
  const previewHtml=parsed.length>0?`
    <div class="bulk-add-preview">
      ${ok.length>0?`<b>追加されます (${ok.length}人)</b>`:''}
      ${ok.map(p=>`<div class="row">・${esc(p.name)} / ${esc(p.birthday.slice(0,2))}/${esc(p.birthday.slice(2))}</div>`).join('')}
      ${errs.length>0?`<div style="margin-top:8px;"><b class="err">エラー (${errs.length}行)</b></div>`:''}
      ${errs.map(p=>`<div class="row err">${p.line}行目: ${esc(p.error)}</div>`).join('')}
    </div>
  `:'';
  body.innerHTML=`
    <div class="bulk-add-hint">
      1行に1人ずつ書いてください。<br>
      <b>形式</b>: 名前,誕生日 (カンマで区切る)<br><br>
      <b>例</b>:<br>
      &nbsp;&nbsp;山田太郎,0401<br>
      &nbsp;&nbsp;佐藤花子,1225<br><br>
      カンマの後にスペースがあってもなくてもどちらでもOKです。<br>
      公式ライブラリの紐付けは追加後に1人ずつ設定してください。
    </div>
    <div class="bulk-add-area">
      <textarea id="bulk-textarea" placeholder="山田太郎,0401&#10;佐藤花子,1225&#10;鈴木一郎,0815">${esc(state.bulkText)}</textarea>
    </div>
    ${previewHtml}
  `;
  const ta=$('bulk-textarea');
  if(ta){
    ta.addEventListener('input',e=>{
      state.bulkText=e.target.value;
      // 軽量プレビュー更新 (再描画)
      renderBulkModalBody();
      // フォーカスを戻す
      const newTa=$('bulk-textarea');
      if(newTa){
        newTa.focus();
        // カーソル末尾
        newTa.selectionStart=newTa.selectionEnd=newTa.value.length;
      }
    });
  }
}

async function saveBulkStudents(){
  const parsed=parseBulkText(state.bulkText);
  const ok=parsed.filter(p=>!p.error);
  if(ok.length===0){
    setStatus('追加できる行がありません','error');
    return;
  }
  // 既存と被るものは確認
  const existingKeys=new Set(state.students.map(s=>(s.name||'').trim()+'|'+(s.birthday||'')));
  const newOnes=[];
  const skipped=[];
  for(const p of ok){
    const k=p.name+'|'+p.birthday;
    if(existingKeys.has(k)){
      skipped.push(p);
      continue;
    }
    newOnes.push({
      id:'stu_'+Date.now()+'_'+Math.floor(Math.random()*100000),
      name:p.name,
      nameKey:'',
      birthday:p.birthday,
      shelfIds:[],
      aiEnabled:true,
      revoked:false,
      createdAt:Date.now(),
    });
  }
  if(newOnes.length===0){
    setStatus('全て既存と重複しています','error');
    return;
  }
  let msg=`${newOnes.length}人を追加します`;
  if(skipped.length>0)msg+=`\n(${skipped.length}人は既存と重複するためスキップ)`;
  msg+='。よろしいですか?';
  if(!confirm(msg))return;
  state.students=newOnes.concat(state.students);
  const saved=await saveStudents();
  if(!saved)return;
  closeBulkModal();
  await fetchStudents();
  renderStudentsSummary();
  renderStudentsFilter();
  renderStudentsList();
  updateStudentsTabCount();
}

async function deleteShelf(id){
  const s=state.shelves.find(x=>x.id===id);
  if(!s)return;
  if(!confirm(`「${s.name}」を削除しますか？\nこの公式ライブラリを登録している生徒の端末からは消えません(各端末のキャッシュとして残ります)。`))return;
  // このライブラリにあった実体メモのIDを集める
  const masterIds=new Set((s.cards||[]).filter(c=>!c._ref).map(c=>c.id));
  // 他のライブラリにある「このライブラリを元にした参照」を一掃
  state.shelves.forEach(other=>{
    if(other.id===id)return;
    if(!Array.isArray(other.cards))return;
    other.cards=other.cards.filter(c=>!(c._ref && (c._originShelf===id || masterIds.has(c.id))));
  });
  state.shelves=state.shelves.filter(x=>x.id!==id);
  closeShelfEditScreen();
  await saveShelves();
  renderShelfList();
  $('shelf-edit-panel').innerHTML='';
}

function renderMemoGrid(){
  const s=getSelectedShelf();
  if(!s)return;
  const grid=$('memo-grid');
  grid.innerHTML='';
  // 全ライブラリの実体カードをIDで索引(参照の解決用)
  const byId=new Map();
  for(const sh of state.shelves){
    for(const cc of (sh.cards||[])){
      if(!cc._ref)byId.set(cc.id,{card:cc,shelf:sh});
    }
  }
  // 検索/フィルタ条件
  const q=(state.memoSearch||'').trim().toLowerCase();
  const tf=state.memoTypeFilter||'all';
  const matchesType=(t)=>{
    if(tf==='all')return true;
    if(tf==='photo')return t==='photo' || t==='photonote';
    return t===tf;
  };
  const matchesText=(card)=>{
    if(!q)return true;
    const parts=[];
    if(card.text)parts.push(card.text);
    if(card.title)parts.push(card.title);
    if(Array.isArray(card.items)){
      for(const it of card.items){if(it && it.t)parts.push(it.t);}
    }
    return parts.join(' ').toLowerCase().includes(q);
  };
  let shownCount=0;
  (s.cards||[]).forEach((c,idx)=>{
    let displayCard=c;
    let isRef=false;
    let originShelf=null;
    if(c._ref){
      const origin=byId.get(c.id);
      if(!origin)return; // 解決できない参照はスキップ
      displayCard=origin.card;
      originShelf=origin.shelf;
      isRef=true;
    }
    // フィルタ判定
    if(!matchesType(displayCard.type))return;
    if(!matchesText(displayCard))return;
    shownCount++;
    const cell=document.createElement('div');
    cell.className='memo-card '+(displayCard.type||'note')+(isRef?' is-ref':'');
    let inner='';
    if(displayCard.type==='photo' || displayCard.type==='photonote'){
      inner=`<img src="${esc(displayCard.image||'')}" alt="">`;
      if(displayCard.text)inner+=`<div class="ctxt" style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);color:white;padding:6px 8px;font-size:10px;-webkit-line-clamp:2;">${esc(displayCard.text)}</div>`;
    }else if(displayCard.type==='note'){
      const col=colorById(displayCard.color);
      inner=`<div class="ctxt" style="background:${col.bg};color:${col.fg};">${esc(displayCard.text||'')}</div>`;
    }else if(displayCard.type==='list'){
      const items=(displayCard.items||[]).slice(0,5).map(i=>`<div>・${esc(i.t)}</div>`).join('');
      inner=`<div class="ctxt">${displayCard.title?`<b>${esc(displayCard.title)}</b><br>`:''}${items}</div>`;
    }
    // 共有バッジ
    let badge='';
    if(isRef){
      // 参照 = 他から共有されたメモ
      badge=`<div class="memo-share-badge" title="${esc(originShelf.name||'')} から共有">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M7 17L17 7M17 7H8M17 7v9"/></svg>
        共有
      </div>`;
    }else if(Array.isArray(displayCard.sharedWith) && displayCard.sharedWith.length>0){
      // マスター = 他に共有しているメモ
      const validCount=displayCard.sharedWith.filter(id=>state.shelves.some(x=>x.id===id)).length;
      if(validCount>0){
        badge=`<div class="memo-share-badge" title="${validCount}個のライブラリにも共有中">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M7 17L17 7M17 7H8M17 7v9"/></svg>
          ${validCount}
        </div>`;
      }
    }
    cell.innerHTML=badge+inner;
    cell.addEventListener('click',()=>openMemoModal(c));
    grid.appendChild(cell);
  });
  // 検索/フィルタ中で結果ゼロなら、その旨を表示 (追加ボタンは出さない)
  if((q || tf!=='all') && shownCount===0){
    const empty=document.createElement('div');
    empty.className='no-result';
    empty.style.gridColumn='1 / -1';
    empty.textContent='該当するメモはありません';
    grid.appendChild(empty);
    return;
  }
  // 追加ボタン (検索/フィルタ未使用時のみ末尾に置く)
  if(!q && tf==='all'){
    const addCell=document.createElement('div');
    addCell.className='memo-card memo-card-add';
    addCell.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>';
    addCell.addEventListener('click',()=>openMemoModal(null));
    grid.appendChild(addCell);
  }
}

// ═══ MEMO MODAL ═══
function openMemoModal(card){
  const isNew=!card;
  if(isNew){
    card={
      id:'c_'+Date.now(),
      type:'note',
      text:'',
      color:'default',
      items:[{t:'',mark:'check'}],
      created:Date.now(),
    };
  }else if(card._ref){
    // 参照を開かれたらマスターのライブラリに切り替えて実体を編集
    const origin=state.shelves.find(x=>x.id===card._originShelf);
    const real=origin && (origin.cards||[]).find(x=>x.id===card.id && !x._ref);
    if(origin && real){
      state.selectedId=origin.id;
      renderShelfList();
      const panel=$('shelf-edit-panel');
      if(panel)renderShelfEdit();
      toast(`「${origin.name||''}」のメモを編集します`);
      card=real;
    }else{
      toast('元のメモが見つかりません');
      return;
    }
  }
  state.editingMemo=Object.assign({},card,{_new:isNew});
  $('memo-modal-title').textContent=isNew?'新しいメモ':'メモを編集';
  // 保存ボタンをリセット
  const btn=$('memo-save');
  btn.textContent='保存';
  btn.classList.remove('saved');
  btn.disabled=false;
  delete btn.dataset.saving;
  renderMemoModalBody();
  $('memo-modal').classList.add('on');
  // モーダル本体のスクロール位置を最上部へ (前回開いた状態が残らないように)
  const body=$('memo-modal-body');
  if(body)body.scrollTop=0;
}

  $('memo-modal').classList.remove('on');
  state.editingMemo=null;
}

      </div>
      <div class="list-edit" id="list-edit">
        ${(m.items||[{t:'',mark:'check'}]).map((it,i)=>{
          const mark=it.mark||'check';
          const done=it.d===true;
          // 番号項目の場合、何番目かを動的に計算

          let markHtml;

            markHtml=`<button class="list-mark check on" data-mark-idx="${i}" aria-label="記号切替"><span class="chk-box"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="m5 13 4 4L19 7"/></svg></span></button>`;
          }else{
            // □ 未チェック
            markHtml=`<button class="list-mark check" data-mark-idx="${i}" aria-label="記号切替"><span class="chk-box"></span></button>`;
          }
          return `
            <div class="list-item-row${done && mark==='check'?' done':''}">

  const s=getSelectedShelf();
  const masterId=s?s.id:null;
  const otherShelves=state.shelves.filter(x=>x.id!==masterId);
  if(!Array.isArray(m.sharedWith))m.sharedWith=[];

  if(masterId && otherShelves.length>0){

  if(ta){

  // 記号切替 (□未 → □チェック → 1. → 戻る)

      const done=it.d===true;
      if(mark==='check' && !done){
        // □ → ☑
        it.d=true;
        it.mark='check';
      }else if(mark==='check' && done){
        // ☑ → 1.
        it.mark='number';
        delete it.d;
      }else{
        // 1. → □
        it.mark='check';
        it.d=false;
      }
      renderMemoModalBody();

  body.querySelectorAll('[data-del-idx]').forEach(btn=>{

      const idx=parseInt(btn.dataset.delIdx);
      state.editingMemo.items.splice(idx,1);

      renderMemoModalBody();
    });

  const addBtn=$('list-item-add');
  if(addBtn){
    addBtn.addEventListener('click',()=>{
      if(!state.editingMemo.items)state.editingMemo.items=[];

      const prev=state.editingMemo.items[state.editingMemo.items.length-1];
      const inheritMark=(prev && prev.mark)?prev.mark:'check';

      renderMemoModalBody();

      state.editingMemo.image=compressed;
      setStatus('');
      renderMemoModalBody();

    });

function readAsDataURL(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>resolve(r.result);
    r.onerror=()=>reject(new Error('読み込み失敗'));
    r.readAsDataURL(file);
  });
}

// 画像を読み込んで Image オブジェクトを返す
function loadImage(dataUrl){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>resolve(img);
    img.onerror=()=>reject(new Error('画像の読み込み失敗'));
    img.src=dataUrl;
  });
}

/**
 * 画像を圧縮してJPEG dataURLを返す
 * @param {File|string} input  File または dataURL
 * @param {number} maxSize     長辺の最大ピクセル数
 * @param {number} quality     JPEG品質 (0-1)
 * @param {boolean} square     正方形クロップするか (アイコン用)
 * @param {object} [crop]      明示的なクロップ領域 {sx, sy, sw, sh} (sourceピクセル単位)。
 *                              指定時は square よりこちらが優先される。
 */
async function compressImage(input,maxSize=1600,quality=0.85,square=false,crop=null){
  const dataUrl=typeof input==='string'?input:await readAsDataURL(input);
  const img=await loadImage(dataUrl);
  let sw=img.naturalWidth, sh=img.naturalHeight;
  let sx=0, sy=0;
  if(crop){
    // 明示クロップ: 値は画像座標系。負やはみ出しはクランプ。
    sx=Math.max(0,Math.floor(crop.sx));
    sy=Math.max(0,Math.floor(crop.sy));
    sw=Math.min(img.naturalWidth-sx,Math.floor(crop.sw));
    sh=Math.min(img.naturalHeight-sy,Math.floor(crop.sh));
  }else if(square){
    // 正方形クロップ (中央) — 旧来のフォールバック
    const side=Math.min(sw,sh);
    sx=Math.floor((sw-side)/2);
    sy=Math.floor((sh-side)/2);
    sw=side;
    sh=side;
  }
  // 縮小サイズ計算
  let dw=sw, dh=sh;
  const long=Math.max(sw,sh);
  if(long>maxSize){
    const scale=maxSize/long;
    dw=Math.round(sw*scale);
    dh=Math.round(sh*scale);
  }
  const canvas=document.createElement('canvas');
  canvas.width=dw;
  canvas.height=dh;
  const ctx=canvas.getContext('2d');
  ctx.imageSmoothingEnabled=true;
  ctx.imageSmoothingQuality='high';
  ctx.drawImage(img,sx,sy,sw,sh,0,0,dw,dh);
  return canvas.toDataURL('image/jpeg',quality);
}

// dataURL のサイズ (約バイト数) を返す
function dataUrlBytes(dataUrl){
  // base64 部分の長さ × 3/4 がおおよそのバイト数
  const i=dataUrl.indexOf(',');
  if(i<0)return 0;
  return Math.floor((dataUrl.length-i-1)*3/4);
}

// 賢い圧縮: サイズが大きすぎたら品質を落として再エンコード
async function smartCompress(input,opts={}){
  const maxSize=opts.maxSize||1600;
  const square=!!opts.square;
  const crop=opts.crop||null;
  const maxBytes=opts.maxBytes||(1.5*1024*1024); // 1.5MB目標
  let q=0.85;
  let size=maxSize;
  for(let i=0;i<4;i++){
    const out=await compressImage(input,size,q,square,crop);
    const bytes=dataUrlBytes(out);
    if(bytes<=maxBytes)return out;
    // まだ大きい: 次は品質を下げる
    q-=0.15;
    if(q<0.5){q=0.5;size=Math.floor(size*0.75);}
  }
  // 最終 fallback
  return await compressImage(input,Math.floor(maxSize*0.6),0.6,square,crop);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   アイコンクロップエディタ
   File または dataURL を受け取り、ユーザーに位置/ズームを
   調整させてから {sx, sy, sw, sh} のクロップ領域を返す Promise を返す。
   ─ 内部状態は画像座標系。canvas には実画像を低解像度で描画。
   ─ ピンチ/ドラッグ/スライダーでスケールとオフセットを変更。
   ─ 円形マスクは canvas の上にCSSで描画。
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const cropEditor=(function(){
  const modal=$('crop-modal');
  const stage=$('crop-stage');
  const canvas=$('crop-canvas');
  const zoom=$('crop-zoom');
  const btnConfirm=$('crop-confirm');
  const btnCancel=$('crop-cancel');
  const ctx=canvas.getContext('2d');

  // 状態
  let img=null;             // HTMLImageElement (元解像度)
  let stageW=0, stageH=0;   // ステージのCSS px
  let cropSize=0;           // ステージ内の円直径 (CSS px)
  let cropOrigin={x:0,y:0}; // 円の左上 (ステージ内 CSS px)
  let scale=1;              // 画像表示の倍率 (1=円にちょうど収まる最小値)
  let minScale=1, maxScale=4;
  let imgPos={x:0,y:0};     // 画像左上のステージ内位置 (CSS px)
  let resolvePromise=null;
  let dpr=1;

  // タッチ追跡
  let dragStart=null;
  let pinchStart=null;

  function setCanvasSize(){
    dpr=Math.min(2,window.devicePixelRatio||1);
    const r=stage.getBoundingClientRect();
    stageW=r.width;
    stageH=r.height;
    canvas.width=Math.floor(stageW*dpr);
    canvas.height=Math.floor(stageH*dpr);
    canvas.style.width=stageW+'px';
    canvas.style.height=stageH+'px';
    // 円の直径: 横幅と縦幅の小さい方の 80%
    cropSize=Math.floor(Math.min(stageW,stageH)*0.82);
    cropOrigin.x=(stageW-cropSize)/2;
    cropOrigin.y=(stageH-cropSize)/2;
  }

  function fitInitial(){
    // 画像を「円にちょうど内接する」最小サイズで配置
    // 円直径 = cropSize。画像の短辺がそれに合うようにスケール決定。
    const shortSide=Math.min(img.naturalWidth,img.naturalHeight);
    minScale=cropSize/shortSide;
    maxScale=minScale*5; // ユーザーは最大5倍まで拡大可
    scale=minScale;
    // 画像中央をクロップ円の中央に合わせる
    const imgW=img.naturalWidth*scale;
    const imgH=img.naturalHeight*scale;
    imgPos.x=cropOrigin.x+cropSize/2-imgW/2;
    imgPos.y=cropOrigin.y+cropSize/2-imgH/2;
    zoom.min=String(1);
    zoom.max=String(maxScale/minScale);
    zoom.value=String(1);
  }

  // ドラッグ範囲を制限: 円の縁が常に画像の中にあるように
  function clampPos(){
    const imgW=img.naturalWidth*scale;
    const imgH=img.naturalHeight*scale;
    // 円の左端は imgPos.x ≤ cropOrigin.x が必要 (画像左端が円左端の左)
    // 円の右端は imgPos.x + imgW ≥ cropOrigin.x + cropSize が必要
    const minX=cropOrigin.x+cropSize-imgW;
    const maxX=cropOrigin.x;
    const minY=cropOrigin.y+cropSize-imgH;
    const maxY=cropOrigin.y;
    imgPos.x=Math.min(maxX,Math.max(minX,imgPos.x));
    imgPos.y=Math.min(maxY,Math.max(minY,imgPos.y));
  }

  function draw(){
    if(!img)return;
    ctx.save();
    ctx.scale(dpr,dpr);
    ctx.clearRect(0,0,stageW,stageH);
    // 暗いマスク (画像全体を最初に描く)
    const imgW=img.naturalWidth*scale;
    const imgH=img.naturalHeight*scale;
    ctx.globalAlpha=0.35;
    ctx.drawImage(img,imgPos.x,imgPos.y,imgW,imgH);
    // 円の中だけクリアして、画像を鮮明に描く
    ctx.globalAlpha=1;
    ctx.save();
    ctx.beginPath();
    ctx.arc(cropOrigin.x+cropSize/2,cropOrigin.y+cropSize/2,cropSize/2,0,Math.PI*2);
    ctx.clip();
    ctx.drawImage(img,imgPos.x,imgPos.y,imgW,imgH);
    ctx.restore();
    // 円の縁
    ctx.beginPath();
    ctx.arc(cropOrigin.x+cropSize/2,cropOrigin.y+cropSize/2,cropSize/2,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,.95)';
    ctx.lineWidth=2;
    ctx.stroke();
    ctx.restore();
  }

  function setScaleAround(newScale, anchorX, anchorY){
    newScale=Math.max(minScale,Math.min(maxScale,newScale));
    if(newScale===scale)return;
    // anchor (ステージ内位置) を画像内の同じ点に保ったまま拡大縮小
    const imgPxX=(anchorX-imgPos.x)/scale;
    const imgPxY=(anchorY-imgPos.y)/scale;
    scale=newScale;
    imgPos.x=anchorX-imgPxX*scale;
    imgPos.y=anchorY-imgPxY*scale;
    clampPos();
    // スライダーも同期
    zoom.value=String(scale/minScale);
    draw();
  }

  function onTouchStart(e){
    if(e.touches.length===1){
      dragStart={x:e.touches[0].clientX,y:e.touches[0].clientY,ox:imgPos.x,oy:imgPos.y};
      pinchStart=null;
    }else if(e.touches.length===2){
      const dx=e.touches[1].clientX-e.touches[0].clientX;
      const dy=e.touches[1].clientY-e.touches[0].clientY;
      pinchStart={dist:Math.hypot(dx,dy),scale:scale};
      dragStart=null;
    }
    if(e.cancelable)e.preventDefault();
  }
  function onTouchMove(e){
    if(pinchStart && e.touches.length===2){
      const dx=e.touches[1].clientX-e.touches[0].clientX;
      const dy=e.touches[1].clientY-e.touches[0].clientY;
      const dist=Math.hypot(dx,dy);
      const newScale=pinchStart.scale*(dist/pinchStart.dist);
      // 2本指の中点を anchor に
      const rect=stage.getBoundingClientRect();
      const ax=((e.touches[0].clientX+e.touches[1].clientX)/2)-rect.left;
      const ay=((e.touches[0].clientY+e.touches[1].clientY)/2)-rect.top;
      setScaleAround(newScale,ax,ay);
    }else if(dragStart && e.touches.length===1){
      const dx=e.touches[0].clientX-dragStart.x;
      const dy=e.touches[0].clientY-dragStart.y;
      imgPos.x=dragStart.ox+dx;
      imgPos.y=dragStart.oy+dy;
      clampPos();
      draw();
    }
    if(e.cancelable)e.preventDefault();
  }
  function onTouchEnd(e){
    if(e.touches.length===0){dragStart=null;pinchStart=null;}
    else if(e.touches.length===1 && pinchStart){
      // ピンチが片手になったらドラッグへ
      pinchStart=null;
      dragStart={x:e.touches[0].clientX,y:e.touches[0].clientY,ox:imgPos.x,oy:imgPos.y};
    }
  }

  // マウス対応 (PC で操作するときのため)
  let mouseDown=null;
  function onMouseDown(e){
    mouseDown={x:e.clientX,y:e.clientY,ox:imgPos.x,oy:imgPos.y};
  }
  function onMouseMove(e){
    if(!mouseDown)return;
    imgPos.x=mouseDown.ox+(e.clientX-mouseDown.x);
    imgPos.y=mouseDown.oy+(e.clientY-mouseDown.y);
    clampPos();
    draw();
  }
  function onMouseUp(){mouseDown=null;}
  function onWheel(e){
    if(e.cancelable)e.preventDefault();
    const rect=stage.getBoundingClientRect();
    const ax=e.clientX-rect.left;
    const ay=e.clientY-rect.top;
    const factor=e.deltaY<0?1.08:1/1.08;
    setScaleAround(scale*factor,ax,ay);
  }

  function onZoomInput(){
    // スライダー値は minScale 基準の倍率 (1〜maxScale/minScale)
    const r=parseFloat(zoom.value);
    const newScale=minScale*r;
    // 中央をアンカーにスケール変更
    setScaleAround(newScale, cropOrigin.x+cropSize/2, cropOrigin.y+cropSize/2);
  }

  function bindEvents(){
    stage.addEventListener('touchstart',onTouchStart,{passive:false});
    stage.addEventListener('touchmove',onTouchMove,{passive:false});
    stage.addEventListener('touchend',onTouchEnd);
    stage.addEventListener('touchcancel',onTouchEnd);
    stage.addEventListener('mousedown',onMouseDown);
    window.addEventListener('mousemove',onMouseMove);
    window.addEventListener('mouseup',onMouseUp);
    stage.addEventListener('wheel',onWheel,{passive:false});
    zoom.addEventListener('input',onZoomInput);
  }
  function unbindEvents(){
    stage.removeEventListener('touchstart',onTouchStart);
    stage.removeEventListener('touchmove',onTouchMove);
    stage.removeEventListener('touchend',onTouchEnd);
    stage.removeEventListener('touchcancel',onTouchEnd);
    stage.removeEventListener('mousedown',onMouseDown);
    window.removeEventListener('mousemove',onMouseMove);
    window.removeEventListener('mouseup',onMouseUp);
    stage.removeEventListener('wheel',onWheel);
    zoom.removeEventListener('input',onZoomInput);
  }

  function close(result){
    modal.classList.remove('on');
    unbindEvents();
    img=null;
    const r=resolvePromise;
    resolvePromise=null;
    if(r)r(result);
  }

  btnConfirm.addEventListener('click',()=>{
    // ステージ座標系 → 画像座標系へ変換
    // 円の中心 = cropOrigin + cropSize/2 (ステージ内)
    // 画像内の対応位置 = (cropOrigin - imgPos)/scale
    const sx=(cropOrigin.x-imgPos.x)/scale;
    const sy=(cropOrigin.y-imgPos.y)/scale;
    const sw=cropSize/scale;
    const sh=cropSize/scale;
    close({sx,sy,sw,sh});
  });
  btnCancel.addEventListener('click',()=>close(null));
  // 背景タップでキャンセル
  modal.addEventListener('click',e=>{
    // ステージ・ヘッダー・スライダー・ヒントの中ならスルー
    if(e.target===modal)close(null);
  });

  /**
   * クロップエディタを開く。
   * @param {File|string} input  File または dataURL
   * @returns {Promise<{sx,sy,sw,sh}|null>}  null はキャンセル
   */
  return async function openCropEditor(input){
    const dataUrl=typeof input==='string'?input:await readAsDataURL(input);
    img=await loadImage(dataUrl);
    modal.classList.add('on');
    // 表示後にレイアウトが確定するのを待ってからサイズ計算
    await new Promise(r=>requestAnimationFrame(r));
    setCanvasSize();
    fitInitial();
    clampPos();
    draw();
    bindEvents();
    return new Promise(res=>{resolvePromise=res;});
  };
})();

async function saveMemoFromModal(){
  const m=state.editingMemo;
  if(!m)return;
  const s=getSelectedShelf();
  if(!s)return;
  // 軽くバリデーション: noteなら text 必須、photoなら image 必須
  if(m.type==='note' && !(m.text||'').trim()){
    toast('メモ本文を入力してください');
    return;
  }
  if((m.type==='photo'||m.type==='photonote') && !m.image){
    toast('写真を選択してください');
    return;
  }
  // 保存
  const memo=Object.assign({},m);
  delete memo._new;
  memo.created=memo.created||Date.now();
  // sharedWith は配列を保証 + 存在しない or 自分自身のIDは掃除
  if(!Array.isArray(memo.sharedWith))memo.sharedWith=[];
  memo.sharedWith=memo.sharedWith.filter(id=>id!==s.id && state.shelves.some(x=>x.id===id));

  if(!s.cards)s.cards=[];
  if(m._new){
    s.cards.unshift(memo);
  }else{
    const idx=s.cards.findIndex(x=>x.id===memo.id);
    if(idx>=0)s.cards[idx]=memo;
    else s.cards.unshift(memo);
  }

  // 他のライブラリ: この memo.id の既存参照を全部消してから、sharedWith に含まれる所だけ参照を追加
  state.shelves.forEach(other=>{
    if(other.id===s.id)return;
    if(!Array.isArray(other.cards))other.cards=[];
    // 既存の参照(同じID)があれば、created を引き継いで残せる
    const existingRef=other.cards.find(c=>c.id===memo.id && c._ref);
    other.cards=other.cards.filter(c=>c.id!==memo.id);
    if(memo.sharedWith.includes(other.id)){
      other.cards.unshift({
        id:memo.id,
        _ref:true,
        _originShelf:s.id,
        // 既存の参照があればその時刻を残す(新着の重複発火を防ぐ)
        created:existingRef?existingRef.created:Date.now(),
      });
    }
  });

  // 保存ボタンのフィードバック
  const btn=$('memo-save');
  if(btn && !btn.dataset.saving){
    btn.dataset.saving='1';
    btn.disabled=true;
    btn.classList.add('saved');
    btn.innerHTML='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>';
  }

  const ok=await saveShelves();
  if(!ok){
    // 失敗: ボタンを戻す
    btn.innerHTML='保存';
    btn.classList.remove('saved');
    btn.disabled=false;
    delete btn.dataset.saving;
    return;
  }
  setTimeout(()=>{
    closeMemoModal();
    renderShelfList();
    renderMemoGrid();
  },500);
}

async function deleteMemoFromModal(){
  const m=state.editingMemo;
  if(!m || m._new)return;
  // 共有先がある場合は警告を強める
  const sw=Array.isArray(m.sharedWith)?m.sharedWith.filter(id=>state.shelves.some(x=>x.id===id)):[];
  const msg=sw.length>0
    ? `このメモを削除しますか？\n他の${sw.length}個の公式ライブラリにも共有中です。すべての共有先からも消えます。`
    : 'このメモを削除しますか？';
  if(!confirm(msg))return;
  const s=getSelectedShelf();
  if(!s)return;
  // マスターから削除
  s.cards=(s.cards||[]).filter(x=>x.id!==m.id);
  // 他のライブラリにある参照も全部消す
  state.shelves.forEach(other=>{
    if(other.id===s.id)return;
    if(!Array.isArray(other.cards))return;
    other.cards=other.cards.filter(c=>c.id!==m.id);
  });
  const ok=await saveShelves();
  if(!ok)return;
  closeMemoModal();
  renderShelfList();
  renderMemoGrid();
}
