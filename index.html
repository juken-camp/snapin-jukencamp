function renderListItems(wrap){
  wrap.innerHTML='';
  const items=state.current.items;
  items.forEach((it,i)=>{
    const row=document.createElement('div');
    const mark=it.mark||'check';
    const done=it.d===true;
    row.className='cl-row'+(done && mark==='check'?' done':'');
    row.dataset.i=i;

    const handle=document.createElement('div');
    handle.className='cl-handle';
    handle.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="5" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="19" r="1"/></svg>`;
    row.appendChild(handle);

    // 記号ボタン (タップで3状態を回す: □ → ☑ → 1. → □)
    const mk=document.createElement('button');
    if(mark==='number'){
      // 番号: リスト内で number 項目の何番目か
      let num=0;
      for(let k=0;k<=i;k++){
        if((items[k].mark||'check')==='number')num++;
      }
      mk.className='cl-mark num';
      mk.textContent=num+'.';
    }else if(done){
      mk.className='cl-mark check on';
      mk.innerHTML=`<span class="chk-box"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m5 13 4 4L19 7"/></svg></span>`;
    }else{
      mk.className='cl-mark check';
      mk.innerHTML=`<span class="chk-box"></span>`;
    }
    mk.addEventListener('click',()=>{
      const cur=state.current.items[i];
      const curMark=cur.mark||'check';
      const curDone=cur.d===true;
      if(curMark==='check' && !curDone){
        cur.d=true;
        cur.mark='check';
      }else if(curMark==='check' && curDone){
        cur.mark='number';
        delete cur.d;
      }else{
        cur.mark='check';
        cur.d=false;
      }
      renderListItems(wrap);
    });
    row.appendChild(mk);

    const inp=document.createElement('input');
    inp.className='cl-input'+(done && mark==='check'?' done':'');
    inp.value=it.t;
    inp.placeholder='項目';
    inp.addEventListener('input',e=>{state.current.items[i].t=e.target.value;});
    inp.addEventListener('keydown',e=>{
      if(e.key==='Enter'){
        e.preventDefault();
        // 直前の項目の記号を継承 (リストの見た目を作りやすくする)
        const prev=state.current.items[state.current.items.length-1];
        const inheritMark=(prev && prev.mark)?prev.mark:'check';
        const newItem={t:'',mark:inheritMark};
        if(inheritMark==='check')newItem.d=false;
        state.current.items.push(newItem);
        renderListItems(wrap);
        setTimeout(()=>{
          const inps=wrap.querySelectorAll('.cl-input');
          if(inps.length)inps[inps.length-1].focus();
        },50);
      }
    });
    row.appendChild(inp);

    const del=document.createElement('button');
    del.className='cl-del';
    del.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>`;
    del.addEventListener('click',()=>{
      state.current.items.splice(i,1);
      if(state.current.items.length===0)state.current.items=[{t:'',mark:'check',d:false}];
      renderListItems(wrap);
    });
    row.appendChild(del);

    wrap.appendChild(row);
  });
}

function saveCard(){
  const c=state.current;
  if(!c){toast('エラー');return;}
  if((c.type==='photo' || c.type==='photonote') && !c.image){toast('写真がありません');return;}
  if(c.type==='note' && !(c.text && c.text.trim())){toast('メモが空です');return;}
  if(c.type==='list'){
    c.items=(c.items||[]).filter(i=>i.t.trim()!=='');
    if(c.items.length===0){toast('項目を入れてください');return;}
  }
  if(c._new){
    c.created=Date.now();
    c.stage=0;
    c.lastReview=null;
    c.reviewCount=0;
  }
  delete c._new;

  const idx=state.cards.findIndex(x=>x.id===c.id);
  if(idx>=0)state.cards[idx]=c;
  else state.cards.unshift(c);
  save();

  // (OCR は AI 会話時にだけ実行する設計。投稿しただけでは API を呼ばない。)

  // 保存ボタンを ✓ に変えて「保存された」感を出す
  const btn=$('up-save-btn');
  if(btn && !btn.dataset.saving){
    btn.dataset.saving='1';
    btn.disabled=true;
    btn.classList.add('saved');
    btn.innerHTML='<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>';
    if(navigator.vibrate)navigator.vibrate(15);
    setTimeout(()=>{
      state.current=null;
      // screen-upload と screen-detail をスタックから除去してホームへ
      while(state.navStack.length>1 &&
        (state.navStack[state.navStack.length-1]==='screen-upload' ||
         state.navStack[state.navStack.length-1]==='screen-detail')){
        state.navStack.pop();
      }
      const prev=state.navStack[state.navStack.length-1]||'screen-home';
      goto(prev,false);
      // ボタンを元に戻す (次回開いた時のため)
      btn.innerHTML='保存';
      btn.classList.remove('saved');
      btn.disabled=false;
      delete btn.dataset.saving;
    },900);
  }else{
    state.current=null;
    // screen-upload と screen-detail をスタックから除去してホームへ
    while(state.navStack.length>1 &&
      (state.navStack[state.navStack.length-1]==='screen-upload' ||
       state.navStack[state.navStack.length-1]==='screen-detail')){
      state.navStack.pop();
    }
    const prev=state.navStack[state.navStack.length-1]||'screen-home';
    goto(prev,false);
  }
}

// 写真のOCR (バックグラウンド)
async function runOcrInBackground(cardId){
  const cIdx=state.cards.findIndex(x=>x.id===cardId);
  if(cIdx<0)return;
  const card=state.cards[cIdx];
  if(!card.image)return;

  // 塾生限定 (静かに失敗 = 何もしない)
  if(!canUseAI()){
    state.cards[cIdx].ocrFailed=true;
    save();
    return;
  }

  try{
    // data URL から base64 と mediaType を分離
    const m=card.image.match(/^data:([^;]+);base64,(.+)$/);
    if(!m)return;
    const mediaType=m[1];
    const data=m[2];

    const res=await fetch(AI_ENDPOINT,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-snapin-token':state.auth.token,
      },
      body:JSON.stringify({
        ocrImage:{mediaType,data},
      }),
    });
    if(!res.ok)throw new Error('OCR API error');
    const out=await res.json();
    const text=(out.content||'').trim();

    const cIdx2=state.cards.findIndex(x=>x.id===cardId);
    if(cIdx2<0)return;
    if(text && text!=='(文字なし)'){
      state.cards[cIdx2].ocrText=text;
    }else{
      state.cards[cIdx2].ocrFailed=true; // 再試行しない
    }
    save();
  }catch(e){
    // 静かに失敗 (オフライン時など)
    const cIdx2=state.cards.findIndex(x=>x.id===cardId);
    if(cIdx2>=0){
      state.cards[cIdx2].ocrFailed=true;
      save();
    }
  }
}

function cancelUpload(){
  state.current=null;
  back();
}

// OCRをもう一度実行 (同じ写真で読み取りなおす)
async function ocrRerun(){
  if(!state.current)return;
  const c=state.current;
  if(!c.image)return;
  const block=$('ocr-block');
  if(!block)return;
  const btns=block.querySelectorAll('.ocr-action');
  btns.forEach(b=>b.classList.add('loading'));
  block.classList.add('is-running');

  // ocrText を一旦クリアして再実行
  const cIdx=state.cards.findIndex(x=>x.id===c.id);
  if(cIdx>=0){
    delete state.cards[cIdx].ocrText;
    delete state.cards[cIdx].ocrFailed;
    save();
  }
  await runOcrInBackground(c.id);
  // 詳細画面を再描画
  const updated=state.cards.find(x=>x.id===c.id);
  if(updated){
    state.current=updated;
    openDetail(updated,state.current._origin||'mine');
  }
}

// 写真を撮り直す (新しい写真に差し替えてOCR再実行)
function ocrRetake(){
  if(!state.current)return;
  const c=state.current;
  // ファイル選択を呼び出す (iOS標準シート: ライブラリ/撮影/ファイル)
  const inp=document.createElement('input');
  inp.type='file';
  inp.accept='image/*';
  inp.addEventListener('change',async e=>{
    const file=e.target.files[0];
    if(!file)return;
    try{
      const newImage=await compressImage(file);
      const cIdx=state.cards.findIndex(x=>x.id===c.id);
      if(cIdx<0)return;
      state.cards[cIdx].image=newImage;
      delete state.cards[cIdx].ocrText;
      delete state.cards[cIdx].ocrFailed;
      save();
      // 画面を即時更新
      state.current=state.cards[cIdx];
      openDetail(state.cards[cIdx],state.current._origin||'mine');
      toast('読み取り中…');
      // バックグラウンドでOCR
      runOcrInBackground(c.id).then(()=>{
        const u=state.cards.find(x=>x.id===c.id);
        if(u && state.current && state.current.id===c.id){
          state.current=u;
          openDetail(u,state.current._origin||'mine');
        }
      });
    }catch(err){
      toast('写真の読み込みに失敗しました');
    }
  });
  inp.click();
}

let detailViewStart=0;

// チャットメッセージを統一形式の配列で取得 (旧 aiLog からの自動マイグレーション込み)
function getChatMessages(c){
  // 新形式 c.chat[] があればそれを使う
  if(c.chat && Array.isArray(c.chat))return c.chat;
  // 旧形式 c.aiLog[] から変換
  if(c.aiLog && Array.isArray(c.aiLog)){
    return c.aiLog.map(m=>({
      role:m.role==='user'?'user':'ai',
      text:m.text,
      t:m.t||Date.now(),
    }));
  }
  return [];
}

// 日付セパレーターのテキスト (今日/昨日/M月D日)
function chatDateLabel(ts){
  const d=new Date(ts);
  const now=new Date();
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const target=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const diff=Math.round((today-target)/86400000);
  if(diff===0)return '今日';
  if(diff===1)return '昨日';
  if(d.getFullYear()===now.getFullYear())return (d.getMonth()+1)+'月'+d.getDate()+'日';
  return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';
}
// 時刻表示 (HH:mm)
function chatTimeLabel(ts){
  const d=new Date(ts);
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}

function renderChatLog(c){
  const log=$('detail-chat-log');
  log.innerHTML='';
  const msgs=getChatMessages(c);
  if(msgs.length===0)return;

  let lastDate='';
  msgs.forEach((m,idx)=>{
    if(m.deleted)return;
    const t=m.t||Date.now();
    const dateLabel=chatDateLabel(t);
    // 日付が変わったらセパレーター挿入
    if(dateLabel!==lastDate){
      const sep=document.createElement('div');
      sep.className='chat-date-sep';
      sep.innerHTML=`<span>${dateLabel}</span>`;
      log.appendChild(sep);
      lastDate=dateLabel;
    }
    const div=document.createElement('div');
    const isUser=(m.role==='user' || m.role==='memo');
    div.className='msg '+(isUser?'u':'a');
    div.dataset.midx=idx;
    div.innerHTML=`
      <div class="msg-time">${chatTimeLabel(t)}</div>
      <div class="bubble">${linkify(m.text)}</div>
    `;
    log.appendChild(div);

    // ユーザー側(自分が送ったもの)は長押しで取り消し
    if(isUser)attachBubbleLongPress(div,c.id,idx);
  });
}

// バブル長押しで「取り消し」メニューを出す
function attachBubbleLongPress(msgEl,cardId,msgIdx){
  let pressTimer=null,startX=0,startY=0,moved=false;
  const xy=ev=>ev.touches?[ev.touches[0].clientX,ev.touches[0].clientY]:[ev.clientX,ev.clientY];
  const onStart=ev=>{
    [startX,startY]=xy(ev);
    moved=false;
    pressTimer=setTimeout(()=>{
      if(moved)return;
      if(navigator.vibrate)navigator.vibrate(20);
      showUnsendConfirm(cardId,msgIdx);
    },550);
  };
  const onMove=ev=>{
    const [x,y]=xy(ev);
    if(Math.abs(x-startX)>8 || Math.abs(y-startY)>8){moved=true;clearTimeout(pressTimer);}
  };
  const onEnd=()=>{clearTimeout(pressTimer);};
  msgEl.addEventListener('touchstart',onStart,{passive:true});
  msgEl.addEventListener('touchmove',onMove,{passive:true});
  msgEl.addEventListener('touchend',onEnd);
  msgEl.addEventListener('touchcancel',onEnd);
  msgEl.addEventListener('mousedown',onStart);
  msgEl.addEventListener('mousemove',onMove);
  msgEl.addEventListener('mouseup',onEnd);
}

function showUnsendConfirm(cardId,msgIdx){
  if(!confirm('このメッセージを取り消しますか?'))return;
  const cIdx=state.cards.findIndex(x=>x.id===cardId);
  if(cIdx<0)return;
  const c=state.cards[cIdx];
  // 旧aiLog形式を新chat形式に変換
  if(!c.chat){c.chat=getChatMessages(c);delete c.aiLog;}
  if(!c.chat[msgIdx])return;
  c.chat[msgIdx].deleted=true;
  save();
  state.current=Object.assign({},c,{_origin:state.current._origin});
  renderChatLog(c);
}

function openDetail(c,origin){
  state.current=Object.assign({},c,{_origin:origin});
  state.detailAiMode=false;
  const isOfficial=origin==='official';

  $('detail-img').classList.add('hide');

  let metaHtml=`<span>${fmtDate(c.date)}</span>`;
  if(isOfficial && state.currentOfficial){
    metaHtml=`<span class="src">${esc(state.currentOfficial.handle)}</span>`+metaHtml;
  }
  if(!isOfficial && c.type!=='list'){
    const stage=c.stage||0;
    const labels=['新規','学習中','学習中','定着中','定着中','ほぼ習得','習得済'];
    metaHtml+=`<span style="margin-left:auto;color:var(--g);font-size:11px;font-family:var(--font-jp);">${labels[stage]||''}</span>`;
  }
  $('detail-meta').innerHTML=metaHtml;

  let contentHtml='';

    $('detail-img').classList.remove('hide');
    const col=colorById(c.color);
    $('detail-img').style.background=col.bg;
    $('detail-img').innerHTML=`<img src="${c.image}" alt="">`;

  if(c.type==='note' || ((c.type==='photo'||c.type==='photonote') && c.text)){

      const col=colorById(c.color);
      const fz=autoFontSizeDetail(c.text||'');
      const isShort=fz>=24;
      const style=`background:${col.bg};color:${col.fg};font-size:${fz}px;padding:${isShort?'40px 24px':'24px 20px'};border-radius:12px;line-height:1.5;${isShort?'text-align:center;':''}`;

    }else{
      contentHtml=`<div class="detail-text">${linkify(c.text||'')}</div>`;
    }
  }else if(c.type==='list'){
    const title=c.title?`<div style="font-size:17px;font-weight:600;margin-bottom:14px;">${esc(c.title)}</div>`:'';
    const items=c.items||[];
    contentHtml=title+items.map((i,idx)=>{

      const done=i.d===true;

      }

        ${markHtml}
        <span>${esc(i.t)}</span>
      </div>
    `;}).join('');

  // 写真の場合、OCRテキストを下に表示
  if((c.type==='photo'||c.type==='photonote') && c.ocrText){
    // 公式メモはOCR再実行・撮り直し不可 (オリジナルを壊さないため)
    const actionsHtml=isOfficial?'':`
      <div class="ocr-actions">
        <button class="ocr-action" data-action="ocr-rerun">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 15.5-6.4L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15.5 6.4L3 16"/><path d="M3 21v-5h5"/></svg>
          もう一度読み取る
        </button>

          撮り直す
        </button>
      </div>`;

      <div class="ocr-label">写真の文字</div>

  // 公式コピーボタン (公式棚カード時のみ表示)

        // 番号項目はチェック動作なし (装飾のみ)
        if((it.mark||'check')==='number')return;
        state.current.items[idx].d=!state.current.items[idx].d;
        const i=state.cards.findIndex(x=>x.id===state.current.id);

          state.cards[i].items=state.current.items;
          save();

        openDetail(state.cards[i],'mine');
      });
    });
  }

  // 入力バーの状態リセット
  $('detail-input').value='';
  $('detail-input').placeholder=isOfficial?'(公式メモはコピー後に編集できます)':'メモを書く…';
  $('detail-input').style.height='auto';
  $('detail-ai-toggle').classList.remove('on');
  $('detail-input-send').style.background='var(--g)';

  // ピン留めメニューの表示・ラベル更新
  const pinBtn=$('menu-pin-btn');
  const pinLabel=$('menu-pin-label');
  if(pinBtn){
    pinBtn.style.display=isOfficial?'none':'';
    if(pinLabel)pinLabel.textContent=c.pinned?'ピン留めを外す':'ピン留め';
  }

  // 公式カードでは入力バー非表示
  $('detail-input-bar').style.display=isOfficial?'none':'';

  // タグ描画
  renderDetailTags(c);

  // 接触記録 (滞在時間)
  detailViewStart=Date.now();

  goto('screen-detail');
  attachDetailSwipe();
}

// 詳細画面のスワイプで前後カード移動
function attachDetailSwipe(){
  const scr=$('detail-scroll');
  if(scr._swipeAttached)return;
  scr._swipeAttached=true;

  let startX=0,startY=0,startT=0,tracking=false;

  scr.addEventListener('touchstart',e=>{
    if(state.current?._origin==='official')return;
    // 入力中はスキップ
    if(document.activeElement && document.activeElement.tagName==='TEXTAREA')return;
    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;
    startT=Date.now();
    tracking=true;
  },{passive:true});

  scr.addEventListener('touchend',e=>{
    if(!tracking)return;
    tracking=false;
    const dx=e.changedTouches[0].clientX-startX;
    const dy=e.changedTouches[0].clientY-startY;
    const dt=Date.now()-startT;
    if(dt>500)return; // 遅いスワイプは無効
    if(Math.abs(dx)<70)return; // 距離不足
    if(Math.abs(dy)>Math.abs(dx))return; // 縦方向の方が大きい

    // 接触記録
    recordViewExit();

    const curIdx=state.cards.findIndex(c=>c.id===state.current.id);
    if(curIdx<0)return;
    let nextIdx=null;
    if(dx<0 && curIdx<state.cards.length-1){
      nextIdx=curIdx+1; // 左スワイプ → 次
    }else if(dx>0 && curIdx>0){
      nextIdx=curIdx-1; // 右スワイプ → 前
    }
    if(nextIdx===null){
      // 端
      if(navigator.vibrate)navigator.vibrate(20);
      return;
    }
    if(navigator.vibrate)navigator.vibrate(10);
    openDetail(state.cards[nextIdx],'mine');
  },{passive:true});
}

// 詳細画面を離れた時、滞在時間が3秒以上なら静かに stage を進める
function recordViewExit(){
  if(!state.current || state.current._origin==='official' || detailViewStart===0)return;
  const elapsed=Date.now()-detailViewStart;
  detailViewStart=0;
  if(elapsed<3000)return;
  const c=state.cards.find(x=>x.id===state.current.id);
  if(!c)return;
  // 3秒以上見たカードは「軽い接触」として復習スケジュールを少し進める
  c.lastReview=Date.now();
  c.reviewCount=(c.reviewCount||0)+1;
  save();
}

async function detailSend(){
  const inp=$('detail-input');
  const v=inp.value.trim();
  if(!v)return;
  const cIdx=state.cards.findIndex(x=>x.id===state.current.id);
  if(cIdx<0)return;
  const c=state.cards[cIdx];

  // c.chat 配列を初期化(旧 aiLog があれば取り込んでマイグレーション)
  if(!c.chat){
    c.chat=getChatMessages(c);
    delete c.aiLog;
  }

  if(state.detailAiMode){
    // AIに質問
    const userMsg={role:'user',text:v,t:Date.now()};
    c.chat.push(userMsg);
    save();
    inp.value='';
    inp.style.height='auto';
    renderChatLog(c);

    // 「…」のプレースホルダーを追加
    const placeholderIdx=c.chat.length;
    c.chat.push({role:'ai',text:'…',t:Date.now(),pending:true});
    renderChatLog(c);
    $('detail-scroll').scrollTop=$('detail-scroll').scrollHeight;

    try{
      const answer=await callAI(v,c);
      const cIdx2=state.cards.findIndex(x=>x.id===state.current.id);
      if(cIdx2>=0){
        const c2=state.cards[cIdx2];
        if(c2.chat && c2.chat[placeholderIdx]){
          c2.chat[placeholderIdx]={role:'ai',text:answer,t:Date.now()};
        }else if(c2.chat){
          c2.chat.push({role:'ai',text:answer,t:Date.now()});
        }
        save();
        renderChatLog(c2);
      }
      $('detail-scroll').scrollTop=$('detail-scroll').scrollHeight;
    }catch(e){
      const cIdx3=state.cards.findIndex(x=>x.id===state.current.id);
      if(cIdx3>=0){
        const c3=state.cards[cIdx3];
        if(c3.chat && c3.chat[placeholderIdx]){
          c3.chat[placeholderIdx]={role:'ai',text:'エラー: '+e.message,t:Date.now()};
        }
        save();
        renderChatLog(c3);
      }
    }
  }else{
    // メモとして追記 (LINEで自分が投稿するイメージ)
    c.chat.push({role:'memo',text:v,t:Date.now()});
    save();
    inp.value='';
    inp.style.height='auto';
    renderChatLog(c);
    $('detail-scroll').scrollTop=$('detail-scroll').scrollHeight;
  }
}

// AI API呼び出し (本番: Vercel等のサーバレス関数を経由、デモ: ローカル応答)
const AI_ENDPOINT='/api/chat'; // 本番ではここをサーバレス関数のURLに

async function callAI(userMessage,cardContext){
  // 認証チェック (塾生限定)
  if(!canUseAI()){
    return '[AIモードは JUKEN CAMP の塾生のみ利用できます。\nログイン画面から「JUKEN CAMP 塾生はこちら」で認証してください。]';
  }

  // メッセージを組み立てる
  // - 写真メモなら画像を含める (Sonnet が直接見て答える)
  // - そうでなければテキストだけ
  let contextStr='';
  if(cardContext){
    if(cardContext.text)contextStr+='メモ内容: '+cardContext.text+'\n';
    if(cardContext.title)contextStr+='タイトル: '+cardContext.title+'\n';
    if(cardContext.items)contextStr+='リスト項目: '+cardContext.items.map(i=>i.t).join(', ')+'\n';
  }
  const systemPrompt='あなたは学習支援のアシスタントです。生徒が保存したメモについて、わかりやすく端的に答えてください。説教はせず、必要な情報を簡潔に伝えます。';

  // user メッセージの content を組み立てる
  let userContent;
  const hasImage=cardContext && cardContext.image && /^data:([^;]+);base64,(.+)$/.test(cardContext.image);
  if(hasImage){
    // 画像付き
    const m=cardContext.image.match(/^data:([^;]+);base64,(.+)$/);
    const mediaType=m[1];
    const data=m[2];
    const textPart=(contextStr?'コンテキスト:\n'+contextStr+'\n\n':'')+'質問: '+userMessage+'\n\n(添付の写真も参考にして答えてください。)';
    userContent=[
      {type:'image',source:{type:'base64',media_type:mediaType,data:data}},
      {type:'text',text:textPart},
    ];
  }else{
    userContent=(contextStr?'コンテキスト:\n'+contextStr+'\n\n':'')+'質問: '+userMessage;
  }

  try{
    const res=await fetch(AI_ENDPOINT,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-snapin-token':state.auth.token,
      },
      body:JSON.stringify({
        system:systemPrompt,
        messages:[{role:'user',content:userContent}],
      }),
    });
    if(res.status===401 || res.status===403){
      // 認証エラー: 塾生token が失効したかも
      state.auth=null;
      save();
      return '[認証が切れました。ログアウトしてもう一度「塾生はこちら」から入り直してください。]';
    }
    if(!res.ok)throw new Error('API error: '+res.status);
    const data=await res.json();
    return data.content || data.text || data.message || demoAI(userMessage,cardContext);
  }catch(e){
    // フォールバック (オフライン or 未デプロイ時)
    return demoAI(userMessage,cardContext);
  }
}

function demoAI(q,ref){
  let prefix='';
  if(ref){
    if(ref.type==='note')prefix='メモを見ました。';
    else if(ref.image)prefix='写真を見ました。';
    else if(ref.type==='list')prefix='リストを見ました。';
  }
  return prefix+'「'+q+'」についてですね。\n\n(現在はオフラインのデモ応答です。本番環境では Anthropic API に接続して、保存したメモを文脈にした回答を返します。)';
}

function renderLibrary(){
  // 未認証なら上部にバナー、それ以下のライブラリは「塾生限定」マークが付く
  const newSec=$('lib-new-section');
  if(newSec && !isStudent()){
    newSec.innerHTML=`
      <div class="lib-locked-banner">
        <div class="ttl">JUKEN CAMP 塾生のみ利用できます</div>
        <div class="sub">塾生は名前と誕生日を入れて<br>公式ライブラリに登録できます。</div>
        <button class="go-claim" data-action="goto-claim">塾生として入る</button>
      </div>
    `;
  }

  const distributed=OFFICIAL_SHELVES.filter(s=>canSeeShelfId(s.id));
  const subscribable=OFFICIAL_SHELVES.filter(s=>!canSeeShelfId(s.id));
  const subbed=subscribable.filter(s=>state.subscribed.includes(s.id));
  const avail=subscribable.filter(s=>!state.subscribed.includes(s.id));

  // 「新着メモ」セクションを描画 (配布型 + 登録ずみ購読型)
  if(isStudent()){
    const seenShelves=[...distributed,...subbed];
    renderLibNewSection(seenShelves);
  }

  const list=$('lib-list');
  list.innerHTML='';
  // 配布型を先に表示（登録ボタンなし）
  distributed.forEach(s=>list.appendChild(libItem(s,true)));
  // 購読型（登録ずみ → 未登録の順）
  if(distributed.length>0 && (subbed.length>0||avail.length>0)){
    const divider=document.createElement('div');
    divider.className='lib-divider';
    list.appendChild(divider);
  }
  subbed.forEach(s=>list.appendChild(libItem(s,true)));
  if(subbed.length>0 && avail.length>0){
    const divider=document.createElement('div');
    divider.className='lib-divider';
    list.appendChild(divider);
  }
  avail.forEach(s=>list.appendChild(libItem(s,false)));
}

// 配布型 + 登録ずみ購読型の棚で「新着」(lastSeen 以降に追加) を横スクロールで表示
function renderLibNewSection(seenShelves){
  const sec=$('lib-new-section');
  if(!sec)return;
  // 全棚の新着メモを集める {card, shelf}
  const items=[];
  for(const s of seenShelves){
    const lastSeen=state.shelfLastSeen[s.id]||0;
    if(lastSeen===0)continue;
    for(const c of (s.cards||[])){
      const t=c.created||c.t||0;
      if(t>lastSeen)items.push({card:c,shelf:s,t});
    }
  }
  // 新しい順に並べ、最大10件
  items.sort((a,b)=>b.t-a.t);
  const top=items.slice(0,10);
  if(top.length===0){sec.innerHTML='';return;}
  const cardsHtml=top.map(({card:c,shelf:s})=>{
    let thumb='';
    if(c.type==='photo'||c.type==='photonote'){
      thumb=`<img src="${c.image||''}" alt="">`;
    }else if(c.type==='note'){
      thumb=esc((c.text||'').slice(0,40));
    }else if(c.type==='list'){
      thumb=`<b>${esc(c.title||'リスト')}</b><br>${(c.items||[]).slice(0,2).map(i=>'・'+esc(i.t)).join('<br>')}`;
    }
    return `
      <div class="lib-new-card" data-shelf-id="${esc(s.id)}" data-card-id="${esc(c.id)}">
        <div class="lib-new-card-thumb">${thumb}</div>
        <div class="lib-new-card-foot">
          ${s.icon
            ? `<div class="av has-icon"><img src="${esc(s.icon)}" alt=""></div>`
            : `<div class="av">${esc((s.name||'?').slice(0,1))}</div>`
          }
          <span>${esc(s.name)}</span>
        </div>
      </div>
    `;
  }).join('');
  sec.innerHTML=`
    <div class="lib-new-block">
      <div class="lib-new-head">
        <span class="dot"></span>
        <span>新着 ${items.length} 件</span>
      </div>
      <div class="lib-new-strip">${cardsHtml}</div>
    </div>
  `;
  // クリックで該当棚を開く
  sec.querySelectorAll('.lib-new-card').forEach(el=>{
    el.addEventListener('click',()=>{
      const sid=el.dataset.shelfId;
      const s=OFFICIAL_SHELVES.find(x=>x.id===sid);
      if(s)openOfficial(s);
    });
  });
}

function libItem(s,subbed){
  const el=document.createElement('div');
  const locked=!canSeeShelfId(s.id); // 塾生でない or shelfIds に含まれない
  el.className='lib-item'+(locked?' locked':'');
  const newN=subbed?newCountForShelf(s):0;
  const badge=newN>0?`<span class="lib-new-badge">${newN>99?'99+':newN}</span>`:'';
  const avatar=s.icon
    ? `<div class="lib-avatar has-icon"><img src="${esc(s.icon)}" alt=""></div>`
    : `<div class="lib-avatar">${esc((s.name||'?').slice(0,1))}</div>`;
  // 配布型（管理画面からアクセス権が付与されている）かどうか
  const isDistributed=!locked; // canSeeShelfId=true === 配布型
  let actionHtml;
  if(locked){
    actionHtml=`<span class="lib-locked-icon">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      塾生限定
    </span>`;
  }else if(isDistributed){
    // 配布型は登録ボタン不要
    actionHtml='';
  }else{
    actionHtml=`<button class="lib-action ${subbed?'subbed':''}">${subbed?'登録ずみ':'登録'}</button>`;
  }
  el.innerHTML=`
    ${avatar}
    <div class="lib-info">
      <div class="lib-name">${esc(s.name)}${badge}</div>
      <div class="lib-handle">${esc(s.handle)}</div>
    </div>
    ${actionHtml}
  `;
  el.addEventListener('click',e=>{
    if(e.target.closest('.lib-action'))return;
    if(locked){
      // 未認証 → claim画面に誘導 (塾生になれば見える可能性があるので)
      // 認証済みで圏外 → 何もしない (鍵マークが既に示している)
      if(!isStudent())gotoClaim();
      return;
    }
    openOfficial(s);
  });
  const btn=el.querySelector('.lib-action');
  if(btn){
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      toggleSubById(s.id);
    });
  }
  return el;
}

function toggleSubById(id){
  const i=state.subscribed.indexOf(id);
  if(i>=0){
    state.subscribed.splice(i,1);
    // 解除時はその棚の lastSeen も消す (次に再登録した時に新着扱いされないため)
    delete state.shelfLastSeen[id];
  }else{
    state.subscribed.push(id);
    // 登録した瞬間を「見た」とする → 既存メモは新着扱いせず、以降の追加だけがバッジに反映される
    state.shelfLastSeen[id]=Date.now();
  }
  save();
  renderLibrary();
  updateHomeNewBadge();
  if(state.currentOfficial && state.currentOfficial.id===id)updateOfficialSubBtn();
  toast(i>=0?'解除しました':'登録しました');
}

function setScope(s){

  document.querySelectorAll('.scope-chip').forEach(c=>c.classList.toggle('on',c.dataset.scope===s));
  doSearch();

function doSearch(){
  const q=$('search-q').value.trim().toLowerCase();
  const out=$('search-results');
  const idle=$('search-idle');
  const scope=state.searchScope;
  const colorFilter=state.searchColor||null;
  const tagFilter=state.searchTag||null;

  // 色フィルターバーは常に描画 (タグバーも内部で呼ばれる)
  renderColorFilterBar();

  // 空クエリ + 色フィルターなし + タグフィルターなし → 待機画面
  if(!q && !colorFilter && !tagFilter){
    out.innerHTML='';
    renderSearchIdle();
    return;
  }
  // 何か検索条件があれば idle を隠す
  idle.innerHTML='';

  let results=[];
  if(scope==='all'||scope==='mine'||scope==='photo'||scope==='note'||scope==='list'){
    state.cards.forEach(c=>{
      if(scope==='photo' && c.type!=='photo' && c.type!=='photonote')return;
      if(scope==='note' && c.type!=='note')return;
      if(scope==='list' && c.type!=='list')return;
      if(colorFilter && (c.color||'default')!==colorFilter)return;
      if(tagFilter && !(c.tags||[]).includes(tagFilter))return;
      if(q){
        const aiText=(c.aiLog||[]).map(m=>m.text).join(' ');
        const hay=(c.text||'')+' '+(c.title||'')+' '+((c.items||[]).map(i=>i.t).join(' '))+' '+(c.ocrText||'')+' '+aiText+' '+((c.tags||[]).map(t=>'#'+t).join(' '));
        if(!hay.toLowerCase().includes(q))return;
      }
      results.push({card:c,origin:'mine'});
    });
  }
  if((scope==='all'||scope==='official') && !colorFilter){
    OFFICIAL_SHELVES.forEach(s=>{
      if(q && (s.name+' '+s.handle+' '+s.desc).toLowerCase().includes(q))results.push({shelf:s});
      // 配布型（canSeeShelfId）または購読済みのカードを検索対象にする
      if(canSeeShelfId(s.id) || state.subscribed.includes(s.id)){
        s.cards.forEach(c=>{
          if(!q){return;}
          const hay=(c.text||'')+' '+(c.title||'')+' '+((c.items||[]).map(i=>i.t).join(' '));
          if(hay.toLowerCase().includes(q))results.push({card:c,origin:'official',shelf:s});
        });
      }
    });
  }

  if(results.length===0){
    out.innerHTML=`<div class="search-empty">該当なし</div>`;
    return;
  }

  out.innerHTML='';
  results.filter(r=>r.shelf && !r.card).forEach(r=>{
    out.appendChild(libItem(r.shelf,state.subscribed.includes(r.shelf.id)));
  });
  const cardHits=results.filter(r=>r.card);
  if(cardHits.length){
    const grid=document.createElement('div');
    grid.className='grid';
    out.appendChild(grid);
    cardHits.forEach(r=>{
      const c=r.card;
      const card=document.createElement('div');
      card.className='card '+c.type;
      let inner='';
      if(c.type==='photo'||c.type==='photonote')inner=`<img src="${c.image||''}">`;
      else if(c.type==='note'){
        const col=colorById(c.color);
        inner=`<div class="ctxt" style="background:${col.bg};color:${col.fg};">${esc(c.text||'')}</div>`;
      }
      else if(c.type==='list'){
        const items=(c.items||[]).slice(0,4);
        let numCount=0;
        const itemsHtml=items.map((i,idx)=>{
          const m=i.mark||'check';
          const done=i.d===true;
          if(m==='number'){
            // 元のリストでの番号を計算
            let num=0;
            for(let k=0;k<=idx;k++){
              if(((c.items||[])[k].mark||'check')==='number')num++;
            }
            return `<div class="li"><div class="li-num">${num}.</div><span>${esc(i.t)}</span></div>`;
          }
          return `<div class="li ${done?'done':''}"><div class="chk"></div><span>${esc(i.t)}</span></div>`;
        }).join('');
        inner=`<div class="ctxt">${c.title?`<div style="font-weight:600;font-size:11px;margin-bottom:4px;">${esc(c.title)}</div>`:''}${itemsHtml}</div>`;
      }
      if(r.origin==='official')inner+=`<div class="card-source">${esc(r.shelf.handle)}</div>`;
      card.innerHTML=inner;
      card.addEventListener('click',()=>{
        if(r.origin==='official')state.currentOfficial=r.shelf;
        openDetail(c,r.origin);
      });
      grid.appendChild(card);
    });
  }
}

// カード全体からタグ一覧を収集
function getAllTags(){
  const set=new Set();
  state.cards.forEach(c=>(c.tags||[]).forEach(t=>set.add(t)));
  return Array.from(set).sort();
}

// 詳細画面のタグエリアを描画
function renderDetailTags(c){
  const area=$('detail-tags');
  const row=$('detail-tag-input-row');
  const isOfficial=state.current && state.current._origin==='official';
  if(!area)return;
  const tags=c.tags||[];
  area.innerHTML=tags.map((t,i)=>
    `<span class="detail-tag" data-tag-idx="${i}">#${esc(t)}`+
    (isOfficial?'':` <span class="detail-tag-del" data-tag-idx="${i}">✕</span>`)+
    `</span>`
  ).join('');
  // 公式メモはタグ追加不可
  if(row)row.style.display=isOfficial?'none':'';
  // 削除ボタン
  area.querySelectorAll('.detail-tag-del').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const idx=parseInt(btn.dataset.tagIdx);
      removeTag(idx);
    });
  });
}

function addTag(tagName){
  tagName=tagName.replace(/^#+/,'').trim().replace(/\s+/g,'');
  if(!tagName)return;
  const cIdx=state.cards.findIndex(x=>x.id===state.current.id);
  if(cIdx<0)return;
  if(!state.cards[cIdx].tags)state.cards[cIdx].tags=[];
  if(state.cards[cIdx].tags.includes(tagName)){toast('すでに追加されています');return;}
  state.cards[cIdx].tags.push(tagName);
  state.current.tags=state.cards[cIdx].tags;
  save();
  renderDetailTags(state.cards[cIdx]);
  renderTagFilterBar();
  toast('#'+tagName+' を追加しました');
}

function removeTag(idx){
  const cIdx=state.cards.findIndex(x=>x.id===state.current.id);
  if(cIdx<0)return;
  if(!state.cards[cIdx].tags)return;
  const removed=state.cards[cIdx].tags[idx];
  state.cards[cIdx].tags.splice(idx,1);
  state.current.tags=state.cards[cIdx].tags;
  save();
  renderDetailTags(state.cards[cIdx]);
  renderTagFilterBar();
  if(state.searchTag===removed){state.searchTag=null;doSearch();}
}

// ═══ SPACED REPETITION ═══
const REVIEW_INTERVALS=[1,3,7,14,30,60];

function getDueCards(){
  const now=Date.now();
  const DAY=86400000;
  return state.cards.filter(c=>{
    if(c.type==='list')return false;
    if(!c.text && !c.image)return false;
    const stage=c.stage||0;
    if(stage>=REVIEW_INTERVALS.length)return false;
    const last=c.lastReview||c.created||now;
    const interval=REVIEW_INTERVALS[stage]*DAY;
    return (now-last)>=interval;
  }).sort((a,b)=>(a.stage||0)-(b.stage||0));
}

function applyReviewGrade(card,grade){
  const idx=state.cards.findIndex(c=>c.id===card.id);
  if(idx<0)return;
  const c=state.cards[idx];
  const stage=c.stage||0;
  if(grade==='again'){
    c.stage=Math.max(0,stage-1);
  }else if(grade==='good'){
    c.stage=Math.min(REVIEW_INTERVALS.length,stage+1);
  }
  c.lastReview=Date.now();
  c.reviewCount=(c.reviewCount||0)+1;
  save();
}

// ═══ REVIEW MODE ═══
let revQueue=[];
let revIndex=0;
let revRevealed=false;

function startReview(){
  revQueue=getDueCards();
  if(revQueue.length===0){toast('見返すメモはありません');return;}
  revIndex=0;
  revRevealed=false;
  goto('screen-review');
  renderReviewCard();
}

function closeReview(){
  back();
  setTimeout(()=>renderHome(),50);
}

function renderReviewCard(){
  const stage=$('rev-stage');
  if(revIndex>=revQueue.length){
    stage.innerHTML=`
      <div class="review-done">
        <div class="review-done-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>
        </div>
        <h2>おつかれさま</h2>
        <button class="review-reveal" style="margin-top:24px;" id="rev-close-btn">メモに戻る</button>
      </div>
    `;
    $('rev-progress').style.width='100%';
    $('rev-close-btn').addEventListener('click',closeReview);
    return;
  }

  const c=revQueue[revIndex];
  $('rev-cur').textContent=revIndex+1;
  $('rev-total').textContent=revQueue.length;
  $('rev-progress').style.width=((revIndex/revQueue.length)*100)+'%';

  const hasImage=!!c.image;
  const hasText=!!c.text;

  if(!revRevealed){
    let cardHtml='';
    let prompt='';
    if(hasImage && hasText){
      prompt='思い出せますか?';
      cardHtml=`<img src="${c.image}">`;
    }else if(hasImage){
      prompt='なぜ保存したか思い出せますか?';
      cardHtml=`<img src="${c.image}">`;
    }else{
      prompt='読んで、要約を思い浮かべて';
      cardHtml=`<div class="rv-text">${esc(c.text)}</div>`;
    }
    stage.innerHTML=`
      <div class="review-prompt">${prompt}</div>
      <div class="review-card">${cardHtml}</div>
      <button class="review-reveal" id="rev-reveal-btn">${hasImage&&hasText?'答えを見る':'次へ'}</button>
    `;
    $('rev-reveal-btn').addEventListener('click',()=>{revRevealed=true;renderReviewCard();});
  }else{
    let html='<div style="display:flex;flex-direction:column;align-items:center;width:100%;max-width:340px;">';
    if(hasImage)html+=`<img src="${c.image}" style="max-height:25vh;border-radius:8px;margin-bottom:14px;object-fit:contain;">`;
    if(hasText)html+=`<div class="review-answer">${esc(c.text)}</div>`;
    else if(!hasImage)html+=`<div class="review-answer">(メモなし)</div>`;
    html+='</div>';
    stage.innerHTML=`
      <div class="review-prompt">思い出せましたか?</div>
      ${html}
      <div class="review-actions">
        <button class="review-btn again" data-grade="again">もう一度</button>
        <button class="review-btn good" data-grade="good">覚えた</button>
      </div>
    `;
    stage.querySelectorAll('[data-grade]').forEach(b=>{
      b.addEventListener('click',()=>{
        if(navigator.vibrate)navigator.vibrate(12);
        applyReviewGrade(revQueue[revIndex],b.dataset.grade);
        revIndex++;
        revRevealed=false;
        renderReviewCard();
      });
    });
  }
}

// ═══ UTILS ═══
function esc(s){
  if(s==null)return '';
  return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
// URLを安全にリンク化: 1) URLとテキストに分割 2) テキスト部分のみescape 3) URLは<a>に
function linkify(s){
  if(s==null)return '';
  const str=String(s);
  // http(s)://... または www. で始まるもの
  const re=/(https?:\/\/[^\s<>"]+|www\.[^\s<>"]+)/g;
  let out='', last=0, m;
  while((m=re.exec(str))!==null){
    out+=esc(str.slice(last,m.index));
    let url=m[0];
    // 末尾の句読点を除外 (日本語の「。、」や英語の.,;)
    let trail='';
    while(/[.,;:!?。、)）」』]$/.test(url)){
      trail=url.slice(-1)+trail;
      url=url.slice(0,-1);
    }
    const href=url.startsWith('www.')?'https://'+url:url;
    out+=`<a href="${esc(href)}" target="_blank" rel="noopener noreferrer" class="bubble-link">${esc(url)}</a>`+esc(trail);
    last=m.index+m[0].length;
  }
  out+=esc(str.slice(last));
  // 改行も保持
  return out;
}
function fmtDate(d){return d?d.replace(/-/g,'.'):'';}

function toast(msg){

}

// ═══ PULL TO REFRESH ═══
// 各 .scroll コンテナで、頂部から下に引っ張ると更新する
(function setupPullToRefresh(){
  const THRESHOLD=70;      // この距離以上引いたら更新
  const MAX_PULL=130;      // 最大変位
  let startY=0, lastY=0, pulling=false, target=null, indicator=null, refreshing=false;

  function makeIndicator(){
    const el=document.createElement('div');
    el.className='ptr-indicator';
    el.innerHTML=`<div class="ptr-spinner"></div>`;
    return el;
  }

  // iOS風のラバーバンド: 引くほど抵抗が増す
  // 0〜THRESHOLDまではほぼ1:1、それ以降は急速に抵抗増
  function rubberBand(dy){
    if(dy<=THRESHOLD)return dy*0.95;
    const excess=dy-THRESHOLD;
    // 超過分は対数的に減衰
    return THRESHOLD*0.95 + (MAX_PULL-THRESHOLD*0.95)*(1-Math.exp(-excess/80));
  }

  function activeScrollEl(){
    const screen=document.querySelector('.screen.active');
    if(!screen)return null;
    return screen.querySelector('.scroll');
  }

  function onStart(e){
    if(refreshing)return;
    // 選択モード中・モーダル中・追加シート中はPTRしない
    if(state.selectMode)return;
    if($('add-sheet') && $('add-sheet').classList.contains('on'))return;
    if($('color-sheet') && $('color-sheet').classList.contains('on'))return;
    const sc=activeScrollEl();
    if(!sc)return;
    // 詳細画面 / アップロード画面では更新の必要がないのでスキップ
    const screen=document.querySelector('.screen.active');
    if(screen && (screen.id==='screen-detail' || screen.id==='screen-upload' || screen.id==='screen-login' || screen.id==='screen-claim' || screen.id==='screen-review'))return;
    if(sc.scrollTop>0)return; // 頂部でないと開始しない
    target=sc;
    startY=e.touches[0].clientY;
    lastY=startY;
    pulling=false;
  }

  function onMove(e){
    if(!target||refreshing)return;
    const y=e.touches[0].clientY;
    const dy=y-startY;
    lastY=y;
    if(dy<=0){
      // 上方向は無視 (普通のスクロール)
      if(pulling){resetIndicator();pulling=false;}
      return;
    }
    // 下方向に少し動いたら pulling 開始 (反応を早く)
    if(dy>3){
      if(!pulling){
        pulling=true;
        if(!indicator){indicator=makeIndicator();document.querySelector('.app').appendChild(indicator);}
        indicator.style.display='flex';
        // ドラッグ中はトランジションを切る (指追従)
        indicator.classList.remove('snap');
        target.classList.remove('ptr-snap');
      }
    }
    if(!pulling)return;
    // iOS風のラバーバンド減衰 + 進度で回転 (回転はスピナー側に当てる)
    const pull=rubberBand(dy);
    const ratio=Math.min(1,pull/THRESHOLD);
    indicator.style.transform=`translate3d(0, ${pull}px, 0)`;
    const sp=indicator.querySelector('.ptr-spinner');
    // スピナーは引きながらフェードイン
    indicator.style.opacity=Math.min(1, dy/30).toFixed(2);
    if(sp)sp.style.transform=`rotate(${ratio*270}deg)`;
    indicator.classList.toggle('ready',pull>=THRESHOLD);
    // スクロール領域はインジケータと同じ動き (一体感を出す)
    target.style.transform=`translate3d(0, ${pull}px, 0)`;
    // 引っ張り中はネイティブスクロールを抑える
    if(e.cancelable)e.preventDefault();
  }

  function onEnd(){
    if(!target)return;
    if(!pulling){target=null;return;}
    // translate3d(0, Npx, 0) から N を抽出
    const tr=indicator.style.transform||'';
    const m=tr.match(/translate3d\(0(?:px)?,\s*(-?\d+(?:\.\d+)?)px/);
    const pulled=m?parseFloat(m[1]):0;
    // スナップアニメーションをON
    indicator.classList.add('snap');
    target.classList.add('ptr-snap');
    if(pulled>=THRESHOLD){
      doRefresh();
    }else{
      resetIndicator();
    }
    pulling=false;
  }

  function resetIndicator(){
    if(indicator){
      indicator.style.transform='translate3d(0, 0, 0)';
      indicator.style.opacity='0';
      indicator.classList.remove('ready');
      const sp=indicator.querySelector('.ptr-spinner');
      if(sp)sp.style.transform='';
      setTimeout(()=>{ if(indicator)indicator.style.display='none'; }, 300);
    }
    if(target){
      target.style.transform='';
      setTimeout(()=>{if(target)target.classList.remove('ptr-snap');target=null;}, 300);
    }
  }

  async function doRefresh(){
    refreshing=true;
    // インラインの rotate をクリアして CSS アニメーションに任せる
    const sp=indicator.querySelector('.ptr-spinner');
    if(sp)sp.style.transform='';
    indicator.classList.add('spinning');
    indicator.style.opacity='1';
    indicator.style.transform=`translate3d(0, ${THRESHOLD}px, 0)`;
    if(target)target.style.transform=`translate3d(0, ${THRESHOLD}px, 0)`;
    if(navigator.vibrate)navigator.vibrate(10);
    try{
      await refreshActiveScreen();
    }catch(err){
      console.warn('refresh failed',err);
    }
    // 少し見せてから戻す
    setTimeout(()=>{
      indicator.classList.remove('spinning');
      resetIndicator();
      refreshing=false;
    },350);
  }

  // 画面ごとの「更新」処理
  async function refreshActiveScreen(){
    const screen=document.querySelector('.screen.active');
    if(!screen)return;
    const id=screen.id;
    if(id==='screen-home'){
      await loadOfficialShelves();
      renderHome();
      updateHomeNewBadge();
    }else if(id==='screen-today'){
      renderToday();
    }else if(id==='screen-library'){
      await loadOfficialShelves();
      renderLibrary();
    }else if(id==='screen-official'){
      await loadOfficialShelves();
      // 同じIDの最新棚で再描画
      if(state.currentOfficial){
        const fresh=OFFICIAL_SHELVES.find(x=>x.id===state.currentOfficial.id);
        if(fresh)openOfficial(fresh);
      }
    }else if(id==='screen-search'){
      doSearch();
    }
  }

  document.addEventListener('touchstart',onStart,{passive:true});
  document.addEventListener('touchmove',onMove,{passive:false});
  document.addEventListener('touchend',onEnd);
  document.addEventListener('touchcancel',onEnd);
})();

// 起動
setupNavs();
loadOfficialShelves(); // 公式棚をサーバーから取得 (非同期、UIブロックしない)
if(load() && state.user){
  state.navStack=['screen-home'];
  goto('screen-home',false);
  // 起動時に塾生情報を最新化 (force=true、スロットリング無視)
  refreshMe(true);
}else{
  goto('screen-login',false);
}

// claim 入力フィールド: Enter で送信、誕生日は数字だけに
(function setupClaimInputs(){
  const nameInp=document.getElementById('claim-name');
  const bdInp=document.getElementById('claim-bd');
  if(!nameInp || !bdInp)return;
  nameInp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){
      e.preventDefault();
      bdInp.focus();
    }
  });
  bdInp.addEventListener('input',e=>{
    e.target.value=e.target.value.replace(/\D/g,'').slice(0,4);
  });
  bdInp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){
      e.preventDefault();
      doClaimSubmit();
    }
  });
})();

})();
</script>
