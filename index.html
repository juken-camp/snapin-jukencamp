<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SnapIn</title>
<meta name="theme-color" content="#FAFAF7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SnapIn">
<link rel="manifest" href='data:application/manifest+json;charset=utf-8,{"name":"SnapIn","short_name":"SnapIn","start_url":"./","display":"standalone","background_color":"%23FAFAF7","theme_color":"%231D9E75","orientation":"portrait","icons":[{"src":"data:image/svg+xml;charset=utf-8,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 512 512%22%3E%3Crect width=%22512%22 height=%22512%22 rx=%22112%22 fill=%22%231D9E75%22/%3E%3Ctext x=%22256%22 y=%22360%22 font-family=%22Georgia,serif%22 font-size=%22300%22 font-weight=%22600%22 font-style=%22italic%22 fill=%22white%22 text-anchor=%22middle%22%3ES%3C/text%3E%3C/svg%3E","sizes":"512x512","type":"image/svg+xml"}]}'>
<link rel="apple-touch-icon" href='data:image/svg+xml;charset=utf-8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="112" fill="%231D9E75"/><text x="256" y="360" font-family="Georgia,serif" font-size="300" font-weight="600" font-style="italic" fill="white" text-anchor="middle">S</text></svg>'>
<style>
:root{
  --g:#1D9E75; --gl:#E8F5EF; --gd:#0F6E56;
  --bg:#FAFAF7; --surface:#FFFFFF;
  --ink:#1A1A1A; --ink2:#5C5C5C; --ink3:#9A9A9A;
  --line:rgba(0,0,0,.08); --line2:rgba(0,0,0,.14);
  --amber:#E8A33D; --rose:#D6604D; --sky:#3F7FB8;
  --font-jp:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic Medium",sans-serif;
  --font-en:"Charter","Iowan Old Style","Georgia",serif;
  --shadow:0 1px 2px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.04);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);font-family:var(--font-jp);color:var(--ink);overscroll-behavior:none;-webkit-font-smoothing:antialiased;}
button{font-family:inherit;background:none;border:none;cursor:pointer;color:inherit;font-size:inherit;}
input,textarea{font-family:inherit;border:none;outline:none;background:none;color:inherit;}

.app{
  max-width:430px;
  margin:0 auto;
  height:100dvh;
  display:flex;
  flex-direction:column;
  background:var(--bg);
  position:relative;
  overflow:hidden;
  box-shadow:0 0 60px rgba(0,0,0,.15);
}

.screen{display:none;flex-direction:column;flex:1;overflow:hidden;min-height:0;}
.screen.active{display:flex;}

/* HEADER */
.hdr{
  padding:calc(env(safe-area-inset-top) + 4px) 14px 0;
  height:calc(54px + env(safe-area-inset-top));
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:var(--bg);
  flex-shrink:0;
}
.hdr-title{font-size:17px;font-weight:600;}
.logo{
  font-family:-apple-system,"Helvetica Neue",sans-serif;
  font-size:22px;
  font-weight:700;
  letter-spacing:-0.01em;
  display:flex;
  align-items:baseline;
  gap:0;
  color:var(--ink);
  white-space:nowrap;
  min-width:0;
  overflow:hidden;
}
.logo em{
  color:var(--g);
  font-style:normal;
  font-weight:700;
  margin-right:8px;
}
.logo-by, .page-sub{
  font-family:-apple-system,sans-serif;
  font-size:10px;
  font-weight:500;
  color:var(--ink3);
  letter-spacing:0.02em;
  font-style:normal;
  white-space:nowrap;
}
.hdr-icons{display:flex;gap:0;color:var(--ink2);align-items:center;flex-shrink:0;}
.hdr-icons button{
  width:34px;height:34px;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;
  transition:all .15s;
}
.hdr-icons button:active{color:var(--g);transform:scale(0.92);}
.hdr-icons button.on{color:var(--g);background:var(--gl);}
/* 目のマーク: 通常は普通の目、モザイクON時は斜線入り */
#mosaic-btn .eye-off{display:none;}
#mosaic-btn.on .eye-on{display:none;}
#mosaic-btn.on .eye-off{display:block;}

/* 戻るヘッダー */
.bhdr{
  padding:calc(env(safe-area-inset-top) + 4px) 8px 0;
  height:calc(52px + env(safe-area-inset-top));
  display:flex;
  align-items:center;
  gap:4px;
  background:var(--bg);
  flex-shrink:0;
}
.bhdr-back{padding:10px;color:var(--ink2);display:flex;align-items:center;}
.bhdr-back:active{color:var(--g);}
.bhdr-title{font-size:15px;font-weight:600;flex:1;}
.bhdr-action{
  font-size:13px;
  font-weight:600;
  padding:8px 14px;
  border-radius:18px;
  transition:background .1s, color .1s, transform .1s;
  color:var(--g);
}
.bhdr-action:active{
  background:var(--gl);
  transform:scale(0.94);
}
.bhdr-action.primary{
  background:var(--g);
  color:white;
  min-width:62px;
  text-align:center;
}
.bhdr-action.primary:active{
  background:var(--gd);
  transform:scale(0.94);
}
.bhdr-action.saved{
  background:var(--gd);
  font-size:18px;
  pointer-events:none;
  animation:save-pulse .35s ease-out;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}
@keyframes save-pulse{
  0%{transform:scale(0.85);}
  60%{transform:scale(1.12);}
  100%{transform:scale(1);}
}

/* BOTTOM NAV (4タブに削減: 棚 / 公式 / + / 探す) */
.bnav{
  display:flex;
  background:var(--surface);
  border-top:0.5px solid var(--line);
  padding:7px 12px max(18px,env(safe-area-inset-bottom));
  flex-shrink:0;
  position:relative;
  z-index:10;
}
.bnav-item{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
  padding:5px 0;
  color:var(--ink3);
  font-size:10px;
}
.bnav-item.on{color:var(--g);}
.bnav-item:active{transform:scale(0.92);}
.bnav-add-wrap{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  margin-top:-22px;
  position:relative;
  z-index:11;
}
.bnav-add{
  width:54px;
  height:54px;
  border-radius:50%;
  background:var(--g);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 4px 14px rgba(29,158,117,.4);
  transition:transform .15s;
  position:relative;
  z-index:12;
}
.bnav-add:active{transform:scale(0.92);}

/* SCROLL */
.scroll{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  min-height:0;
  padding-bottom:24px;
}
.scroll::-webkit-scrollbar{width:6px;}
.scroll::-webkit-scrollbar-thumb{background:var(--line2);border-radius:3px;}

/* HOME TOP */
.home-top{
  background:var(--surface);
  padding:14px 16px 12px;
  border-bottom:0.5px solid var(--line);
}
/* クイック追加: 一行 */
.quick-add{
  display:flex;
  align-items:center;
  gap:8px;
  background:var(--bg);
  border-radius:22px;
  padding:0 6px 0 16px;
  height:42px;
  margin-bottom:10px;
  transition:background 0.25s;
}
.quick-add.saved-flash,
.quick-add:has(.saved-flash){
  background:var(--gl);
}
.quick-add input.saved-flash::placeholder{
  color:var(--g);
  font-weight:600;
}
.quick-add input{
  flex:1;
  font-size:14px;
  color:var(--ink);
  background:transparent;
  height:100%;
}
.quick-add input::placeholder{color:var(--ink3);}
.quick-add-icons{display:flex;gap:2px;}
.quick-add-icon{
  width:32px;height:32px;
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  color:var(--ink3);
}
.quick-add-icon:active{color:var(--g);background:var(--gl);}
.quick-add-send{
  background:var(--g);
  color:white;
  width:32px;height:32px;
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;
}
.quick-add-send.hide{display:none;}

.home-row{display:flex;gap:8px;align-items:center;}
.search-bar{
  flex:1;
  height:36px;
  background:var(--bg);
  border-radius:18px;
  display:flex;
  align-items:center;
  padding:0 14px;
  gap:8px;
  color:var(--ink3);
  font-size:13px;
}
.view-tog{
  display:flex;
  background:var(--bg);
  border-radius:18px;
  padding:3px;
  gap:2px;
}
.view-tog button{
  width:32px;height:30px;
  border-radius:15px;
  display:flex;align-items:center;justify-content:center;
  color:var(--ink3);
}
.view-tog button.on{background:var(--surface);color:var(--g);box-shadow:0 1px 3px rgba(0,0,0,.08);}

/* ヘッダー内のグリッド/リール切替 */
.view-tog-hdr{
  background:transparent;
  padding:0;
  gap:0;
  margin-right:2px;
}
.view-tog-hdr button{
  width:34px;height:30px;
  border-radius:8px;
  color:var(--ink2);
  background:transparent;
  box-shadow:none;
}
.view-tog-hdr button.on{
  background:var(--gl);
  color:var(--g);
  box-shadow:none;
}

/* 復習ストリップ */
.review-strip{
  background:linear-gradient(135deg,#FFF8E8,#FEF3D6);
  padding:14px 18px;
  border-bottom:0.5px solid var(--line);
  cursor:pointer;
}
.review-strip:active{background:linear-gradient(135deg,#FEF3D6,#FCE9B8);}
.rs-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.rs-title{font-size:13px;font-weight:600;color:#7A5A1F;display:flex;align-items:center;gap:6px;}
.rs-count{font-family:var(--font-en);font-size:13px;color:#A57F2A;font-weight:600;}
.rs-body{display:flex;align-items:center;gap:10px;}
.rs-preview{display:flex;gap:5px;}
.rs-mini{
  width:34px;height:34px;border-radius:6px;background:white;
  overflow:hidden;display:flex;align-items:center;justify-content:center;
  font-size:8px;color:var(--ink2);padding:3px;
  text-align:center;line-height:1.2;
  box-shadow:0 1px 3px rgba(0,0,0,.06);
}
.rs-mini img{width:100%;height:100%;object-fit:cover;}
.rs-cta{margin-left:auto;color:var(--gd);display:flex;align-items:center;}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:2px;
  padding:2px;
}
.card{
  aspect-ratio:1;
  background:var(--surface);
  border-radius:2px;
  overflow:hidden;
  position:relative;
  cursor:pointer;
  transition:transform .12s;
  user-select:none;
  -webkit-user-select:none;
}
.card:active{transform:scale(0.96);}
.card img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;}
.card .ctxt{
  padding:10px;
  font-size:11px;
  line-height:1.5;
  color:var(--ink);
  height:100%;
  overflow:hidden;
  display:-webkit-box;
  -webkit-line-clamp:7;
  -webkit-box-orient:vertical;
  word-break:break-word;
  background:var(--surface);
}
.card.note .ctxt{background:#FFFDF5;}
.card.list .ctxt{background:#F4F8F3;font-size:10px;}
.card .li{display:flex;gap:4px;margin-bottom:3px;align-items:flex-start;}
.card .li .chk{width:9px;height:9px;border:1px solid var(--ink3);border-radius:2px;flex-shrink:0;margin-top:2px;}
.card .li.done .chk{background:var(--g);border-color:var(--g);}
.card .li.done{color:var(--ink3);text-decoration:line-through;}
.card .li .li-num{width:9px;font-size:9px;text-align:left;flex-shrink:0;color:var(--ink2);font-family:var(--font-en);}

.card-source{
  position:absolute;
  bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,.6));
  color:white;
  font-size:9px;
  padding:14px 6px 4px;
  pointer-events:none;
}

/* ピン留めバッジ */
.pin-badge{
  position:absolute;
  top:6px;left:6px;
  width:22px;height:22px;
  background:rgba(0,0,0,.55);
  color:#fff;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
  z-index:2;
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
}
.feed-item .pin-badge{top:14px;left:14px;width:28px;height:28px;}

/* グリッドの選択モード (長押しで起動、複数選択して削除) */
.card.selectable{cursor:pointer;}
.card.selected{outline:3px solid var(--g);outline-offset:-3px;}
.card .sel-mark{
  position:absolute;
  top:6px;right:6px;
  width:22px;height:22px;
  border-radius:50%;
  background:rgba(255,255,255,.85);
  border:1.5px solid rgba(0,0,0,.25);
  display:none;
  align-items:center;justify-content:center;
  z-index:3;
}
.grid.selecting .card .sel-mark{display:flex;}
.card.selected .sel-mark{
  background:var(--g);
  border-color:var(--g);
  color:#fff;
}

/* 選択モードの上部バー */
.select-bar{
  position:absolute;
  top:0;left:0;right:0;
  height:54px;
  background:var(--surface);
  display:flex;
  align-items:center;
  padding:0 14px;
  gap:12px;
  border-bottom:0.5px solid var(--line);
  z-index:10;
  animation:slideDown .15s ease-out;
}
@keyframes slideDown{from{transform:translateY(-100%);}to{transform:translateY(0);}}
.select-bar-cancel{
  background:none;border:none;
  color:var(--ink2);
  font-size:14px;
  padding:6px 4px;
}
.select-bar-count{
  flex:1;
  font-size:14px;
  font-weight:600;
}
.select-bar-delete{
  background:var(--rose);
  color:white;
  font-size:13px;
  font-weight:600;
  padding:8px 14px;
  border-radius:18px;
  border:none;
}
.select-bar-delete:disabled{opacity:.35;}

/* モザイク (思い出すモード): うっすらヒントが見える程度 */
.card.mosaic .ctxt,
.card.mosaic img{filter:blur(5px) saturate(0.9);}
.card.mosaic::before{
  content:"";
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(29,158,117,.15),rgba(15,110,86,.18));
  pointer-events:none;
  z-index:1;
}

/* リール(フィード)モードのモザイク */
.feed.mosaic .feed-item img,
.feed.mosaic .feed-note,
.feed.mosaic .feed-list{filter:blur(8px) saturate(0.9);}
.feed.mosaic .feed-item::before{
  content:"";
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(29,158,117,.12),rgba(15,110,86,.15));
  pointer-events:none;
  z-index:1;
}
.feed.mosaic .feed-item.tapped img,
.feed.mosaic .feed-item.tapped .feed-note,
.feed.mosaic .feed-item.tapped .feed-list{filter:none;}
.feed.mosaic .feed-item.tapped::before{display:none;}

/* FEED */
.feed{scroll-snap-type:y mandatory;background:#000;overflow-y:auto;}
.feed-item{
  scroll-snap-align:start;
  height:100%;
  width:100%;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}
.feed-item img{max-width:100%;max-height:100%;object-fit:contain;}
.feed-note{
  padding:40px 28px;
  font-size:20px;
  line-height:1.7;
  color:white;
  width:100%;
  background:linear-gradient(135deg,#1a3a2e,#0d2620);
  height:100%;
  display:flex;align-items:center;justify-content:center;
  text-align:center;
  white-space:pre-wrap;
}
.feed-list{
  padding:40px 28px;
  color:var(--feed-list-fg,#1A1A1A);
  width:100%;
  height:100%;
  background:#FFFDF5;
  display:flex;flex-direction:column;justify-content:center;
}
.feed-list h3{font-size:16px;margin-bottom:18px;color:inherit;opacity:0.7;font-weight:500;}
.feed-list .li{font-size:17px;padding:10px 0;border-bottom:0.5px solid rgba(0,0,0,.1);display:flex;gap:12px;align-items:center;}
.feed-list .li.done{opacity:0.4;text-decoration:line-through;}
.feed-list .li .chk{width:16px;height:16px;border:1.5px solid currentColor;opacity:0.5;border-radius:3px;flex-shrink:0;}
.feed-list .li.done .chk{background:var(--g);border-color:var(--g);opacity:1;}
.feed-list .li .li-num{width:16px;font-size:14px;text-align:center;flex-shrink:0;font-family:var(--font-en);opacity:0.85;}
.feed-meta{
  position:absolute;
  bottom:24px;left:18px;right:18px;
  color:rgba(255,255,255,.9);
  font-size:11px;
  font-family:var(--font-en);
  pointer-events:none;
}

/* EMPTY */
.empty{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:40px 30px;
  text-align:center;
  color:var(--ink3);
}
.empty-icon{
  width:72px;height:72px;
  border-radius:36px;
  background:var(--gl);
  display:flex;align-items:center;justify-content:center;
  color:var(--g);
  margin-bottom:16px;
}
.empty-title{font-size:16px;color:var(--ink);font-weight:600;margin-bottom:6px;}
.empty-sub{font-size:13px;line-height:1.6;}

/* ADD SHEET */
.sheet-mask{
  position:absolute;inset:0;
  background:rgba(0,0,0,.4);
  z-index:90;
  opacity:0;pointer-events:none;
  transition:opacity .2s;
}
.sheet-mask.on{opacity:1;pointer-events:auto;}
.sheet{
  position:absolute;
  left:0;right:0;bottom:0;
  background:var(--surface);
  border-radius:18px 18px 0 0;
  z-index:91;
  transform:translateY(100%);
  transition:transform .25s cubic-bezier(.2,.7,.3,1);
  max-height:80%;
  display:flex;
  flex-direction:column;
  padding-bottom:env(safe-area-inset-bottom);
}
.sheet.on{transform:translateY(0);}
.sheet-handle{width:38px;height:4px;background:var(--line2);border-radius:2px;margin:10px auto 0;}
.sheet-title{
  padding:12px 20px 4px;
  font-size:11px;color:var(--ink3);
  letter-spacing:0.1em;
  font-family:var(--font-en);
}
.sheet-options{
  padding:8px 16px 16px;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
}
.sheet-opt{
  background:var(--bg);
  border-radius:14px;
  padding:16px 10px;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:6px;
  text-align:left;
}
.sheet-opt:active{background:var(--gl);}
.sheet-opt-icon{
  width:34px;height:34px;
  border-radius:10px;
  background:var(--surface);
  display:flex;align-items:center;justify-content:center;
  color:var(--g);
}
.sheet-opt-title{font-size:13px;font-weight:600;color:var(--ink);}
.sheet-opt-desc{font-size:10px;color:var(--ink3);line-height:1.4;}

/* UPLOAD / EDIT */
.upload-body{
  flex:1;
  overflow-y:auto;
  padding:14px 18px 24px;
}
.up-photo{
  width:100%;
  aspect-ratio:1;
  background:var(--bg);
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  color:var(--ink3);
  margin-bottom:14px;
  overflow:hidden;
  position:relative;
}
.up-photo img{width:100%;height:100%;object-fit:cover;}
.up-photo .change{
  position:absolute;bottom:10px;right:10px;
  background:rgba(0,0,0,.6);color:white;
  font-size:11px;padding:6px 10px;border-radius:14px;
}
.up-text{
  width:100%;
  min-height:120px;
  font-size:15px;
  line-height:1.7;
  padding:14px 0;
  resize:none;
  display:block;
}
.up-text.title{font-size:17px;font-weight:500;min-height:auto;padding-bottom:4px;}

/* LIST EDITING */
.cl-row{
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 0;
  border-bottom:0.5px solid var(--line);
}
.cl-handle{color:var(--ink3);padding:4px;touch-action:none;}
.cl-mark{
  width:26px;height:26px;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  border-radius:6px;
  transition:background .12s;
  position:relative;
}
.cl-mark:active{background:var(--gl);}
.cl-mark.check .chk-box{
  width:22px;height:22px;
  border:1.5px solid var(--ink3);
  border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  color:#fff;
  background:transparent;
  transition:background .12s,border-color .12s;
}
.cl-mark.check.on .chk-box{
  background:var(--g);
  border-color:var(--g);
}
.cl-mark.num{
  font-family:var(--font-en);
  font-weight:500;
  font-size:14px;
  color:var(--ink2);
}
.cl-input{flex:1;font-size:15px;padding:4px 0;}
.cl-input.done{color:var(--ink3);text-decoration:line-through;}
.cl-row.done{}
.cl-del{color:var(--ink3);padding:4px;}
.cl-add{
  display:flex;
  align-items:center;
  gap:10px;
  padding:14px 0;
  color:var(--g);
  font-size:14px;
  width:100%;
}
.cl-add .plus{
  width:22px;height:22px;
  border:1.5px dashed var(--g);
  border-radius:5px;
  display:flex;align-items:center;justify-content:center;
}

/* DETAIL */
.detail-img{
  width:100%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  max-height:55vh;
}
.detail-img img{max-width:100%;max-height:55vh;object-fit:contain;}
.detail-body{padding:18px 18px 24px;}
.detail-meta{
  display:flex;
  gap:8px;
  align-items:center;
  margin-bottom:14px;
  font-size:11px;
  color:var(--ink3);
  font-family:var(--font-en);
}
.detail-meta .src{
  padding:3px 8px;
  background:var(--gl);
  color:var(--gd);
  border-radius:10px;
  font-size:10px;
  font-family:var(--font-jp);
}
.detail-text{
  font-size:16px;
  line-height:1.75;
  white-space:pre-wrap;
  word-break:break-word;
}
.ocr-block{
  margin-top:16px;
  padding:14px;
  background:var(--bg);
  border-radius:10px;
  border:1px dashed var(--line2);
}
.ocr-label{
  font-size:10px;
  color:var(--ink3);
  letter-spacing:0.1em;
  font-family:var(--font-en);
  margin-bottom:6px;
  text-transform:uppercase;
}
.ocr-text{
  font-size:13px;
  line-height:1.6;
  color:var(--ink2);
  white-space:pre-wrap;
  word-break:break-word;
}
.ocr-actions{
  display:flex;
  gap:8px;
  margin-top:10px;
  padding-top:10px;
  border-top:1px dashed var(--line);
}
.ocr-action{
  flex:1;
  padding:8px 10px;
  border-radius:8px;
  font-size:12px;
  color:var(--ink2);
  background:var(--surface);
  border:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:5px;
  transition:all .15s;
}
.ocr-action:active{
  background:var(--gl);
  color:var(--g);
  transform:scale(0.97);
}
.ocr-action.loading{
  color:var(--ink3);
  pointer-events:none;
}
.ocr-action.loading::after{
  content:'';
  width:11px;height:11px;
  border:1.5px solid var(--ink3);
  border-top-color:transparent;
  border-radius:50%;
  animation:ocr-spin 0.7s linear infinite;
  margin-left:4px;
}
@keyframes ocr-spin{to{transform:rotate(360deg);}}
.ocr-block.is-running .ocr-text{
  opacity:0.4;
}
#detail-chat-log{
  margin-top:18px;
  padding-bottom:8px;
}
#detail-chat-log:not(:empty){
  border-top:0.5px solid var(--line);
  padding-top:14px;
}
.detail-list-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 0;
  border-bottom:0.5px solid var(--line);
  font-size:15px;
}
.detail-list-item.done{color:var(--ink3);text-decoration:line-through;}
.detail-list-item .chk{
  width:22px;height:22px;
  border:1.5px solid var(--ink3);
  border-radius:5px;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  color:white;
}
.detail-list-item.done .chk{background:var(--g);border-color:var(--g);}
.detail-list-item .dli-num{
  width:22px;height:22px;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-en);
  font-weight:500;
  font-size:14px;
  color:var(--ink2);
}

/* 詳細画面の下部メモエリア (ボトムナビの上に配置、サイズ統一) */
.detail-input{
  background:var(--surface);
  border-top:0.5px solid var(--line);
  padding:7px 10px;
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
}
.detail-input-ai{
  width:38px;height:38px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--ink2);
  background:var(--bg);
  flex-shrink:0;
}
.detail-input-ai:active{transform:scale(0.92);}
.detail-input-ai.on{background:var(--g);color:white;}
.detail-input textarea{
  flex:1;
  background:var(--bg);
  border-radius:19px;
  padding:9px 14px;
  font-size:14px;
  max-height:120px;
  min-height:38px;
  line-height:1.5;
  resize:none;
}
.detail-input-send{
  width:38px;height:38px;
  border-radius:50%;
  background:var(--g);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  flex-shrink:0;
}
.detail-input-send.disabled{
  background:var(--ink3);
  opacity:0.5;
}

/* MENU */
.menu{
  position:absolute;
  top:50px;right:14px;
  background:var(--surface);
  border-radius:10px;
  box-shadow:0 4px 20px rgba(0,0,0,.15);
  padding:6px 0;
  z-index:60;
  min-width:140px;
  display:none;
}
.menu.on{display:block;}
.menu-item{
  padding:11px 16px;
  font-size:13px;
  display:flex;align-items:center;gap:10px;
  width:100%;
  text-align:left;
}
.menu-item:active{background:var(--bg);}
.menu-item.danger{color:var(--rose);}

/* CHAT */
.chat-body{
  flex:1;
  overflow-y:auto;
  padding:14px 16px;
  background:var(--bg);
  min-height:0;
}
.chat-ref{
  background:var(--surface);
  border-radius:12px;
  padding:10px;
  display:flex;
  gap:10px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
}
.chat-ref img{width:48px;height:48px;border-radius:8px;object-fit:cover;}
.chat-ref-text{flex:1;font-size:12px;color:var(--ink2);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;}
.msg{
  margin-bottom:6px;
  display:flex;
  align-items:flex-end;
  gap:6px;
}
.msg.u{justify-content:flex-end;}
.msg.a{justify-content:flex-start;}
.msg-time{
  font-size:10px;
  color:var(--ink3);
  flex-shrink:0;
  padding-bottom:2px;
  opacity:0.7;
}
.msg.u .msg-time{order:0;}
.msg.a .msg-time{order:1;}
.bubble{
  max-width:74%;
  padding:9px 13px;
  border-radius:18px;
  font-size:14px;
  line-height:1.55;
  white-space:pre-wrap;
  word-break:break-word;
  -webkit-user-select:none;
  user-select:none;
}
.msg.u .bubble{
  background:#1D9E75;
  color:white;
  border-bottom-right-radius:5px;
}
.msg.a .bubble{
  background:var(--surface);
  color:var(--ink);
  border-bottom-left-radius:5px;
  box-shadow:0 1px 2px rgba(0,0,0,.06);
}
.bubble-link{
  color:inherit;
  text-decoration:underline;
  text-underline-offset:2px;
  word-break:break-all;
}
.msg.u .bubble-link{color:#E8F5EF;}
.detail-text .bubble-link{color:var(--g);text-decoration:underline;}

/* 出典タグ (公式コピー元) */
.source-tag{
  margin-top:20px;
  padding:10px 14px;
  background:var(--gl);
  color:var(--gd);
  border-radius:10px;
  font-size:12px;
  display:flex;
  align-items:center;
  gap:8px;
  border-left:3px solid var(--g);
}
.source-tag svg{flex-shrink:0;}

/* 新着バッジ (ホームヘッダーの公式アイコン) */
.home-new-badge{
  position:absolute;
  top:2px;
  right:2px;
  min-width:16px;
  height:16px;
  padding:0 4px;
  background:var(--rose);
  color:white;
  font-size:10px;
  font-weight:700;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;
  font-variant-numeric:tabular-nums;
  pointer-events:none;
  box-sizing:border-box;
  letter-spacing:0;
}

/* 公式タブの各ライブラリ名の隣の新着バッジ */
.lib-new-badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:18px;
  height:18px;
  padding:0 5px;
  background:var(--rose);
  color:white;
  font-size:11px;
  font-weight:700;
  border-radius:9px;
  margin-left:8px;
  line-height:18px;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;
  font-variant-numeric:tabular-nums;
  vertical-align:middle;
  box-sizing:border-box;
}

/* プルダウン更新インジケーター (細いスピナー、円なし) */
.ptr-indicator{
  position:absolute;
  top:-32px;
  left:50%;
  margin-left:-13px;
  width:26px;
  height:26px;
  display:none;
  align-items:center;
  justify-content:center;
  color:var(--ink3);
  z-index:50;
  pointer-events:none;
  will-change:transform, opacity;
  opacity:0;
}
.ptr-indicator.snap{transition:transform .28s cubic-bezier(.16,1,.3,1), opacity .18s ease-out;}
.ptr-indicator.ready{color:var(--g);}
/* スピナー本体 */
.ptr-spinner{
  width:22px;
  height:22px;
  border-radius:50%;
  border:2px solid currentColor;
  border-top-color:transparent;
  transition:transform .12s ease-out;
}
.ptr-indicator.ready .ptr-spinner{transform:scale(1.1);}
.ptr-indicator.spinning .ptr-spinner{animation:ptr-spin 0.7s linear infinite;}
@keyframes ptr-spin{to{transform:rotate(360deg);}}
.scroll.ptr-snap{
  will-change:transform;
  transition:transform .28s cubic-bezier(.16,1,.3,1);
}
/* 日付セパレーター(中央に半透明丸タブ) */
.chat-date-sep{
  display:flex;
  justify-content:center;
  margin:14px 0 10px;
  position:sticky;
  top:8px;
  z-index:5;
  pointer-events:none;
}
.chat-date-sep span{
  background:rgba(60,60,60,0.55);
  color:white;
  font-size:11px;
  font-weight:500;
  padding:3px 12px;
  border-radius:11px;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  letter-spacing:0.02em;
}
.chat-input{
  display:flex;
  gap:8px;
  padding:10px 12px max(10px,env(safe-area-inset-bottom));
  background:var(--surface);
  border-top:0.5px solid var(--line);
  align-items:flex-end;
  flex-shrink:0;
}
.chat-input textarea{
  flex:1;
  background:var(--bg);
  border-radius:18px;
  padding:9px 14px;
  font-size:14px;
  max-height:100px;
  min-height:36px;
  line-height:1.5;
  resize:none;
}
.chat-send{
  width:36px;height:36px;
  border-radius:18px;
  background:var(--g);
  color:white;
  display:flex;align-items:center;justify-content:center;
}

/* LIBRARY */
.lib-section{
  padding:18px 18px 6px;
  font-size:10px;
  color:var(--ink3);
  letter-spacing:0.1em;
  font-family:var(--font-en);
}
.lib-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 18px;
  background:var(--surface);
  border-bottom:0.5px solid var(--line);
}
.lib-item:first-child{border-top:0.5px solid var(--line);}
.lib-item:active{background:var(--bg);}
#lib-list{margin-top:8px;}
.lib-avatar{
  width:44px;height:44px;
  border-radius:50%;
  background:var(--gl);
  display:flex;align-items:center;justify-content:center;
  color:var(--gd);
  font-weight:700;
  font-size:15px;
  flex-shrink:0;
  font-family:var(--font-en);
  overflow:hidden;
}
.lib-avatar.has-icon{background:transparent;}
.lib-avatar img{width:100%;height:100%;object-fit:cover;display:block;}
.lib-info{flex:1;min-width:0;}
.lib-name{font-size:14px;font-weight:600;}
.lib-handle{font-size:11px;color:var(--ink3);font-family:var(--font-en);}
.lib-action{
  padding:6px 14px;
  font-size:12px;
  font-weight:600;
  border-radius:14px;
  color:white;
  border:1px solid var(--g);
  background:var(--g);
  flex-shrink:0;
}
.lib-action:active{transform:scale(0.95);}
.lib-action.subbed{
  background:transparent;
  color:var(--ink3);
  border-color:var(--line2);
  font-weight:500;
}

/* 登録ずみ / 登録可能 の薄い区切り */
.lib-divider{
  height:1px;
  background:var(--line);
  margin:8px 20px;
}

/* 公式の新着セクション */
.lib-new-block{
  padding:14px 20px 18px;
}
.lib-new-head{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:13px;
  font-weight:600;
  color:var(--ink);
  margin:0 0 10px;
}
.lib-new-head .dot{
  width:6px;height:6px;border-radius:50%;background:var(--rose);
  animation:pulse-dot 1.6s ease-in-out infinite;
}
@keyframes pulse-dot{0%,100%{opacity:1;}50%{opacity:.4;}}
.lib-new-strip{
  display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;
  margin:0 -20px;padding:0 20px 4px;
}
.lib-new-strip::-webkit-scrollbar{display:none;}
.lib-new-card{
  width:130px;
  flex-shrink:0;
  background:var(--surface);
  border-radius:10px;
  overflow:hidden;
  box-shadow:var(--shadow);
  cursor:pointer;
}
.lib-new-card-thumb{
  height:90px;
  background:var(--gl);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  font-size:11px;color:var(--gd);
  padding:8px;
  text-align:center;
  line-height:1.4;
}
.lib-new-card-thumb img{width:100%;height:100%;object-fit:cover;}
.lib-new-card-foot{
  padding:7px 9px 8px;
  font-size:10px;
  color:var(--ink3);
  font-weight:500;
  border-top:0.5px solid var(--line);
  display:flex;align-items:center;gap:5px;
}
.lib-new-card-foot .av{
  width:18px;height:18px;border-radius:50%;
  background:var(--gl);color:var(--gd);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:700;
  flex-shrink:0;
  overflow:hidden;
}
.lib-new-card-foot .av.has-icon{background:transparent;}
.lib-new-card-foot .av img{width:100%;height:100%;object-fit:cover;display:block;}

/* 公式棚詳細 */
.official-simple-hdr{
  padding:18px;
  background:var(--surface);
  border-bottom:0.5px solid var(--line);
}
.os-name{font-size:18px;font-weight:600;margin-bottom:3px;}
.os-handle{font-size:11px;color:var(--ink3);font-family:var(--font-en);margin-bottom:8px;}
.os-avatar{
  width:64px;height:64px;
  border-radius:50%;
  background:var(--gl);
  color:var(--gd);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:700;
  margin-bottom:12px;
  overflow:hidden;
}
.os-avatar.has-icon{background:transparent;}
.os-avatar img{width:100%;height:100%;object-fit:cover;display:block;}
.os-desc{font-size:12px;color:var(--ink2);line-height:1.6;margin-bottom:12px;}
.os-meta{display:flex;gap:14px;font-size:10px;color:var(--ink3);font-family:var(--font-en);align-items:center;}
.os-sub{
  margin-left:auto;
  padding:6px 14px;
  font-size:12px;font-weight:600;
  border-radius:14px;
  color:white;
  background:var(--g);
  border:1px solid var(--g);
}
.os-sub.on{
  background:transparent;
  color:var(--ink3);
  border-color:var(--line2);
  font-weight:500;
}

/* REVIEW */
.review-bg{
  background:#0a0a0a;
  color:white;
  height:100%;
  display:flex;
  flex-direction:column;
  flex:1;
}
.review-top{
  padding:14px 18px;
  display:flex;
  align-items:center;
  gap:12px;
  flex-shrink:0;
}
.review-close{
  width:36px;height:36px;
  border-radius:18px;
  background:rgba(255,255,255,.1);
  color:white;
  display:flex;align-items:center;justify-content:center;
}
.review-progress{flex:1;height:3px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden;}
.review-progress-bar{height:100%;background:var(--g);width:0;transition:width .3s;}
.review-counter{font-family:var(--font-en);font-size:12px;color:rgba(255,255,255,.7);}
.review-stage{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:0 24px;
  text-align:center;
  min-height:0;
}
.review-prompt{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:20px;}
.review-card{
  width:100%;
  max-width:340px;
  background:#1a1a1a;
  border-radius:16px;
  padding:24px;
  margin-bottom:20px;
  min-height:240px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.review-card img{max-width:100%;max-height:40vh;border-radius:8px;}
.review-card .rv-text{font-size:18px;line-height:1.7;white-space:pre-wrap;text-align:left;width:100%;}
.review-reveal{
  padding:14px 32px;
  background:var(--g);
  color:white;
  border-radius:24px;
  font-size:15px;
  font-weight:600;
}
.review-answer{
  font-size:17px;
  line-height:1.7;
  white-space:pre-wrap;
  padding:16px;
  background:rgba(29,158,117,.12);
  border-radius:10px;
  border-left:3px solid var(--g);
  text-align:left;
  width:100%;
  max-height:30vh;
  overflow-y:auto;
}
.review-actions{
  padding:14px 12px max(20px,env(safe-area-inset-bottom));
  display:flex;
  gap:8px;
  flex-shrink:0;
}
.review-btn{
  flex:1;
  padding:14px 0;
  border-radius:14px;
  font-size:14px;
  font-weight:600;
  transition:transform .12s, filter .12s;
}
.review-btn:active{
  transform:scale(0.96);
  filter:brightness(1.15);
}
.review-btn.again{background:#3A2020;color:#FF8B7E;}
.review-btn.good{background:#1F3A2C;color:#7AE5A8;}
.review-done{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center;}
.review-done-icon{
  width:80px;height:80px;
  border-radius:40px;
  background:linear-gradient(135deg,var(--g),var(--gd));
  display:flex;align-items:center;justify-content:center;
  margin-bottom:20px;
  color:white;
}
.review-done h2{font-size:20px;margin-bottom:8px;font-weight:600;}

/* SEARCH */
.search-input-block{
  padding:14px 20px 10px;
}
.search-input-wrap{
  height:40px;
  background:var(--surface);
  border:0.5px solid var(--line2);
  border-radius:20px;
  padding:0 14px;
  display:flex;align-items:center;gap:8px;
}
.search-input-wrap input{flex:1;font-size:14px;}
.search-scope{
  display:flex;
  gap:6px;
  padding:6px 20px 14px;
  overflow-x:auto;
  scrollbar-width:none;
}
.search-scope::-webkit-scrollbar{display:none;}
.scope-chip{
  padding:6px 14px;
  background:var(--surface);
  border:0.5px solid var(--line2);
  border-radius:14px;
  font-size:12px;
  color:var(--ink2);
  white-space:nowrap;
  flex-shrink:0;
  font-weight:500;
}
.scope-chip.on{background:var(--g);color:white;border-color:var(--g);}
.search-empty{padding:40px 30px;text-align:center;color:var(--ink3);font-size:13px;}

/* 永続的な色フィルターバー (スコープ chips の下) */
.color-filter-row-wrap{
  display:flex;
  gap:6px;
  padding:0 20px 14px;
  overflow-x:auto;
  scrollbar-width:none;
}
.color-filter-row-wrap::-webkit-scrollbar{display:none;}

/* 探すページの待機状態 (キーワードなし) */
.search-idle-block{
  padding:0 20px 18px;
}
.search-idle-title{
  font-size:13px;
  font-weight:600;
  color:var(--ink2);
  margin-bottom:10px;
  display:flex;align-items:center;gap:6px;
}
.color-filter-chip{
  display:flex;align-items:center;gap:6px;
  padding:6px 12px 6px 8px;
  background:var(--surface);
  border:0.5px solid var(--line2);
  border-radius:14px;
  font-size:12px;
  color:var(--ink2);
  font-weight:500;
  flex-shrink:0;
  white-space:nowrap;
}
.color-filter-chip .swatch{
  width:14px;height:14px;border-radius:50%;
  border:0.5px solid rgba(0,0,0,.1);
}
.color-filter-chip.on{
  border-color:var(--g);
  background:var(--gl);
  color:var(--gd);
}
/* タグ行 (詳細画面) */
.detail-tags{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  padding:10px 20px 4px;
}
.detail-tag{
  display:inline-flex;
  align-items:center;
  gap:4px;
  padding:4px 10px;
  background:var(--gl);
  border:0.5px solid var(--g);
  border-radius:12px;
  font-size:12px;
  color:var(--gd);
  font-weight:500;
  white-space:nowrap;
}
.detail-tag-del{
  display:flex;align-items:center;justify-content:center;
  width:14px;height:14px;
  border-radius:50%;
  background:rgba(15,110,86,.15);
  color:var(--gd);
  font-size:10px;
  line-height:1;
  cursor:pointer;
  flex-shrink:0;
}
.detail-tag-del:active{background:var(--g);color:white;}
/* タグ入力行 (詳細画面) */
.detail-tag-input-row{
  display:flex;
  align-items:center;
  gap:6px;
  padding:4px 20px 10px;
}
.detail-tag-input-wrap{
  display:flex;
  align-items:center;
  gap:4px;
  flex:1;
  background:var(--bg);
  border-radius:16px;
  padding:5px 10px;
  border:0.5px solid var(--line2);
}
.detail-tag-input-wrap span{
  font-size:13px;
  color:var(--ink3);
  font-weight:600;
}
.detail-tag-input{
  flex:1;
  font-size:13px;
  color:var(--ink);
  background:transparent;
  border:none;
  outline:none;
  font-family:inherit;
}
.detail-tag-input::placeholder{color:var(--ink3);}
.detail-tag-add-btn{
  width:30px;height:30px;
  border-radius:50%;
  background:var(--g);
  color:white;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  border:none;cursor:pointer;
}
.detail-tag-add-btn:active{background:var(--gd);}
/* タグフィルター行 (探す画面) */
.tag-filter-row-wrap{
  display:flex;
  gap:6px;
  padding:0 20px 14px;
  overflow-x:auto;
  scrollbar-width:none;
}
.tag-filter-row-wrap::-webkit-scrollbar{display:none;}
.tag-filter-chip{
  display:inline-flex;
  align-items:center;
  gap:3px;
  padding:5px 12px;
  background:var(--surface);
  border:0.5px solid var(--line2);
  border-radius:13px;
  font-size:12px;
  color:var(--ink2);
  font-weight:500;
  flex-shrink:0;
  white-space:nowrap;
  cursor:pointer;
}
.tag-filter-chip .tag-hash{color:var(--g);font-weight:700;}
.tag-filter-chip.on{
  background:var(--gl);
  border-color:var(--g);
  color:var(--gd);
}
.pin-strip{
  display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;
  margin:0 -20px;padding:0 20px 4px;
}
.pin-strip::-webkit-scrollbar{display:none;}
.pin-card{
  width:90px;height:90px;
  flex-shrink:0;
  border-radius:10px;
  overflow:hidden;
  background:var(--surface);
  box-shadow:var(--shadow);
  position:relative;
  cursor:pointer;
}
.pin-card img{width:100%;height:100%;object-fit:cover;}
.pin-card .ctxt{
  padding:8px;font-size:10px;line-height:1.4;
  height:100%;display:-webkit-box;
  -webkit-line-clamp:5;-webkit-box-orient:vertical;
  overflow:hidden;
}
.pin-card .pin-badge{top:4px;left:4px;width:18px;height:18px;}

/* LOGIN */
.login-wrap{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:0 30px;
  background:var(--surface);
}
.login-logo{
  font-family:-apple-system,"Helvetica Neue",sans-serif;
  font-size:48px;
  font-weight:700;
  letter-spacing:-0.02em;
  margin-bottom:4px;
  display:flex;
  align-items:baseline;
  justify-content:center;
  color:var(--ink);
}
.login-logo em{
  color:var(--g);
  font-style:normal;
  font-weight:700;
}
.login-by{
  font-family:-apple-system,sans-serif;
  font-size:11px;
  font-weight:500;
  color:var(--ink3);
  letter-spacing:0.1em;
  text-align:center;
  margin-bottom:28px;
}
.login-tag{
  font-size:13px;
  color:var(--ink2);
  text-align:center;
  margin-bottom:50px;
}
.login-card{
  width:100%;
  padding:18px;
  background:var(--bg);
  border-radius:14px;
  margin-bottom:12px;
  text-align:left;
  border:1px solid transparent;
}
.login-card:active{background:var(--gl);border-color:var(--g);}
.login-card-title{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;}
.login-card-juken{
  background:var(--gl);
  color:var(--gd);
  margin-top:8px;
}
.login-card-juken:active{background:#D9EFE5;}

/* ════════════════════════════════════════════
   CLAIM (塾生認証)
   ════════════════════════════════════════════ */
.claim-wrap{
  flex:1;
  padding:24px 20px;
  display:flex;
  flex-direction:column;
  gap:14px;
  overflow-y:auto;
}
.claim-intro{
  font-size:14px;
  color:var(--ink2);
  line-height:1.7;
  margin-bottom:6px;
}
.claim-intro small{
  color:var(--ink3);
  font-size:12px;
}
.claim-field{
  display:flex;
  flex-direction:column;
  gap:6px;
}
.claim-field label{
  font-size:12px;
  color:var(--ink3);
  font-weight:500;
  padding-left:2px;
}
.claim-field input{
  width:100%;
  padding:14px 16px;
  font-size:16px;
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:12px;
  color:var(--ink);
  outline:none;
  transition:border-color .15s;
}
.claim-field input:focus{
  border-color:var(--g);
}
.claim-error{
  font-size:13px;
  color:var(--rose);
  background:#FCE8E5;
  padding:10px 14px;
  border-radius:10px;
  line-height:1.5;
}
.claim-error.hide{display:none;}
.claim-submit{
  width:100%;
  padding:15px;
  background:var(--g);
  color:#fff;
  font-size:15px;
  font-weight:600;
  border-radius:12px;
  margin-top:8px;
  transition:background .15s;
}
.claim-submit:active{background:var(--gd);}
.claim-submit:disabled{opacity:.5;}
.claim-help{
  font-size:12px;
  color:var(--ink3);
  text-align:center;
  margin-top:8px;
}

/* 公式タブ: 未認証 / 塾生限定の見せ方 */
.lib-locked-banner{
  margin:14px 16px;
  padding:18px 18px;
  background:var(--gl);
  border-radius:14px;
  text-align:center;
}
.lib-locked-banner .ttl{
  font-size:14px;
  font-weight:600;
  color:var(--gd);
  margin-bottom:6px;
}
.lib-locked-banner .sub{
  font-size:12px;
  color:var(--ink2);
  line-height:1.6;
  margin-bottom:12px;
}
.lib-locked-banner .go-claim{
  display:inline-block;
  padding:10px 22px;
  background:var(--g);
  color:#fff;
  font-size:13px;
  font-weight:600;
  border-radius:10px;
}
.lib-locked-banner .go-claim:active{background:var(--gd);}
.lib-item.locked .lib-action{
  background:transparent;
  color:var(--ink3);
  pointer-events:none;
}
.lib-locked-icon{
  display:inline-flex;
  align-items:center;
  gap:4px;
  font-size:11px;
  color:var(--ink3);
}

/* ════════════════════════════════════════════
   TODAY (今日)
   ════════════════════════════════════════════ */
.today-hero{
  padding:20px 20px 18px;
  background:transparent;
}
.today-date{
  font-family:var(--font-en);
  font-size:11px;
  color:var(--ink3);
  letter-spacing:0.15em;
  margin-bottom:4px;
}
.today-title{
  font-size:22px;
  font-weight:700;
  letter-spacing:-0.01em;
  margin-bottom:6px;
  line-height:1.4;
}
.today-title.long{
  font-size:17px;
  font-weight:600;
  letter-spacing:0;
}
.today-title.xlong{
  font-size:15px;
  font-weight:600;
  letter-spacing:0;
}
.today-sub{
  font-size:12px;
  color:var(--ink2);
  line-height:1.6;
}
.today-sub:empty{display:none;}

.today-block{
  padding:20px 20px 10px;
}
.today-block-head{
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:6px;
  margin-bottom:10px;
}
.today-block-title{
  font-size:13px;
  font-weight:700;
  letter-spacing:0.02em;
  display:flex;
  align-items:center;
  gap:8px;
}
.today-block-icon{
  width:24px;height:24px;
  border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  color:white;
}
.today-block-icon.review{background:var(--amber);}
.today-block-icon.tasks{background:var(--sky);}
.today-block-icon.new{background:var(--g);}
.today-block-icon.past{background:#7A8B9C;}
.today-block-icon.forgotten{background:#9C7BB8;}
.today-block-count{
  font-family:var(--font-en);
  font-size:13px;
  color:var(--ink3);
}

/* 復習開始 大ボタン */
.today-review-card{
  margin:0 20px 18px;
  background:linear-gradient(135deg,#FFF4DA,#FFE9B4);
  border-radius:16px;
  padding:18px 18px 16px;
  display:flex;
  align-items:center;
  gap:14px;
  cursor:pointer;
  transition:transform .1s;
}
.today-review-card:active{transform:scale(0.98);}
.today-review-icon{
  width:52px;height:52px;
  border-radius:14px;
  background:white;
  display:flex;align-items:center;justify-content:center;
  color:var(--amber);
  flex-shrink:0;
  box-shadow:0 2px 6px rgba(0,0,0,.06);
}
.today-review-info{flex:1;}
.today-review-title{
  font-size:15px;
  font-weight:700;
  color:#7A5A1F;
  margin-bottom:2px;
}
.today-review-sub{
  font-size:12px;
  color:#A57F2A;
}
.today-review-arrow{color:#A57F2A;}

.today-review-empty{
  margin:0 20px 18px;
  padding:18px;
  background:var(--surface);
  border:1px dashed var(--line2);
  border-radius:14px;
  text-align:center;
  font-size:13px;
  color:var(--ink3);
  line-height:1.6;
}

/* 今日のタスク (リスト型カードの open items を集約) */
.today-tasks{
  background:var(--surface);
  margin:0 14px 18px;
  border-radius:14px;
  overflow:hidden;
  box-shadow:var(--shadow);
}
.today-task{
  display:flex;
  align-items:flex-start;
  gap:12px;
  padding:14px 16px;
  border-bottom:0.5px solid var(--line);
  cursor:pointer;
}
.today-task:last-child{border-bottom:none;}
.today-task:active{background:var(--bg);}
.today-task .tchk{
  width:22px;height:22px;
  border:1.5px solid var(--ink3);
  border-radius:6px;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  color:white;
  margin-top:1px;
}
.today-task.done .tchk{background:var(--g);border-color:var(--g);}
.today-task.done .ttxt{color:var(--ink3);text-decoration:line-through;}
.today-task-body{flex:1;min-width:0;}
.ttxt{font-size:14px;line-height:1.5;}
.tlist{
  font-size:10px;
  color:var(--ink3);
  font-family:var(--font-en);
  letter-spacing:0.05em;
  margin-top:3px;
}

/* 今日新しく保存したカード (横スクロール) */
.today-newcards{
  display:flex;
  gap:8px;
  padding:0 20px 18px;
  overflow-x:auto;
  scrollbar-width:none;
}
.today-newcards::-webkit-scrollbar{display:none;}
.today-more-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  margin:4px 20px 22px;
  padding:11px 14px;
  background:var(--surface);
  border:0.5px solid var(--line2);
  border-radius:10px;
  color:var(--ink2);
  font-size:13px;
  font-weight:500;
  width:calc(100% - 40px);
  transition:background .12s, transform .08s;
}
.today-more-btn:active{background:var(--gl);transform:scale(0.98);}
.today-newcard{
  width:110px;
  aspect-ratio:1;
  flex-shrink:0;
  border-radius:10px;
  overflow:hidden;
  background:var(--surface);
  box-shadow:var(--shadow);
  position:relative;
  cursor:pointer;
}
.today-newcard img{width:100%;height:100%;object-fit:cover;}
.today-newcard .ctxt{
  padding:10px;
  font-size:11px;
  line-height:1.5;
  height:100%;
  overflow:hidden;
  display:-webkit-box;
  -webkit-line-clamp:6;
  -webkit-box-orient:vertical;
}
.today-newcard.note .ctxt{background:#FFFDF5;}
.today-newcard.list .ctxt{background:#F4F8F3;font-size:10px;}

.today-empty-block{
  padding:20px;
  text-align:center;
  color:var(--ink3);
  font-size:12px;
  line-height:1.7;
}

/* COLOR PICKER */
.color-picker{
  padding:14px 16px 20px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}
.color-swatch{
  aspect-ratio:1;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  font-weight:600;
  border:2px solid transparent;
  transition:transform .1s;
}
.color-swatch:active{transform:scale(0.94);}
.color-swatch.selected{border-color:var(--g);}

.toast{
  position:absolute;
  bottom:90px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:rgba(26,26,26,.92);
  color:white;
  padding:10px 18px;
  border-radius:20px;
  font-size:13px;
  z-index:200;
  opacity:0;
  pointer-events:none;
  transition:all .25s;
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

.hide{display:none !important;}
</style>
</head>
<body>
<div class="app">

<!-- LOGIN -->
<div class="screen active" id="screen-login">
  <div class="login-wrap">
    <div class="login-logo">Snap<em>In</em></div>
    <div class="login-by">by JUKEN CAMP</div>
    <div class="login-tag">点数アップを逃さないメモ＆ライブラリ</div>
    <button class="login-card" data-action="login-personal">
      <div class="login-card-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
        SnapInをはじめる
      </div>
    </button>
    <button class="login-card login-card-juken" data-action="goto-claim">
      <div class="login-card-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        JUKEN CAMP 塾生はこちら
      </div>
    </button>
  </div>
</div>

<!-- CLAIM (塾生認証) -->
<div class="screen" id="screen-claim">
  <div class="bhdr">
    <button class="bhdr-back" data-action="back">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <div class="bhdr-title">塾生として入る</div>
  </div>
  <div class="claim-wrap">
    <div class="claim-intro">
      フルネームと誕生日を入れてください。<br>
      <small>例: 山田太郎 / 0401 (4月1日)</small>
    </div>
    <div class="claim-field">
      <label>名前 (スペースなし)</label>

    <div class="claim-field">
      <label>誕生日 4桁 (MMDD)</label>
      <input id="claim-bd" type="tel" inputmode="numeric" maxlength="4" placeholder="例: 1117" autocomplete="off">
    </div>
    <div class="claim-error hide" id="claim-error"></div>
    <button class="claim-submit" id="claim-submit" data-action="claim-submit">
      入る
    </button>
    <div class="claim-help">
      うまく入れない時は、塾の先生に確認してください。
    </div>
  </div>
</div>

<!-- HOME -->
<div class="screen" id="screen-home">
  <div class="hdr">
    <div class="logo">Snap<em>In</em><span class="logo-by">by JUKEN CAMP</span></div>
    <div class="hdr-icons">
      <div class="view-tog view-tog-hdr">
        <button id="vt-grid" class="on" data-action="view-grid" aria-label="グリッド">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </button>
        <button id="vt-reel" data-action="view-reel" aria-label="リール">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="3" width="12" height="18" rx="2"/><path d="M12 7v10"/></svg>
        </button>
      </div>
      <button data-action="toggle-mosaic" id="mosaic-btn" aria-label="思い出す">
        <svg class="eye-on" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
        <svg class="eye-off" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/><path d="M3 3l18 18" stroke-linecap="round"/></svg>
      </button>
      <button data-action="logout-confirm" aria-label="ログアウト">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5M21 12H9"/></svg>
      </button>
    </div>
  </div>

  <div class="home-top">
    <div class="quick-add">
      <input id="quick-input" placeholder="今すぐメモする">
      <div class="quick-add-icons" id="quick-icons">
        <button class="quick-add-icon" data-action="quick-photo" aria-label="写真">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </button>
        <button class="quick-add-icon" data-action="quick-list" aria-label="リスト">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        </button>
      </div>
      <button class="quick-add-send hide" id="quick-send" data-action="quick-save" aria-label="保存">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg>
      </button>
    </div>
  </div>

  <div class="scroll" id="home-scroll">
    <div class="grid" id="grid-home"></div>
    <div class="feed hide" id="feed-home"></div>

<script>
(function(){
'use strict';

const STORAGE_KEY='snapin_v3';
const $=id=>document.getElementById(id);

const state={
  user:null,
  cards:[],
  subscribed:[],
  view:'grid',
  navStack:['screen-login'],
  current:null,
  searchScope:'all',
  chatRef:null,
  currentOfficial:null,
  mosaicMode:false,
  detailAiMode:false,  // 詳細画面でAI送信モードか
  photoMode:null,      // クイック写真撮影中 'photo' | 'photonote' | null
  selectMode:false,    // グリッドの複数選択モード
  selectedIds:new Set(),
  pastMoreOpen:false,  // 今日タブの「もっと前の保存を見る」展開状態
  shelfLastSeen:{},    // 公式棚ごとに最後に開いた時刻 (新着判定用)
  searchColor:null,    // 探すページの色フィルター
  searchTag:null,      // 探すページのタグフィルター
  // ─── JUKEN CAMP 塾生認証 ───
  auth:null,           // { token, role, studentId, name, group, shelfIds, aiEnabled } または null
  deviceId:null,       // この端末のID (claim時に使う、localStorage永続)
};

function save(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify({
    user:state.user,
    cards:state.cards,
    subscribed:state.subscribed,
    shelfLastSeen:state.shelfLastSeen,
    auth:state.auth,
    deviceId:state.deviceId,
  }));
}
function load(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return false;
    const d=JSON.parse(raw);
    state.user=d.user||null;
    state.cards=d.cards||[];
    state.subscribed=d.subscribed||[];
    state.shelfLastSeen=d.shelfLastSeen||{};
    state.auth=d.auth||null;
    state.deviceId=d.deviceId||null;
    return true;
  }catch(e){return false;}
}

// deviceId を初期化 (永続的にこの端末を識別)
function ensureDeviceId(){
  if(state.deviceId)return state.deviceId;
  // ランダム16文字
  const bytes=new Uint8Array(12);
  crypto.getRandomValues(bytes);
  const hex=Array.from(bytes).map(b=>b.toString(16).padStart(2,'0')).join('');
  state.deviceId='dev_'+hex;
  save();
  return state.deviceId;
}

// 認証状態のショートカット
function isStudent(){
  return state.auth && state.auth.token && (state.auth.role==='student' || state.auth.role==='admin');
}
function canUseAI(){
  if(!state.auth || !state.auth.token)return false;
  if(state.auth.role==='admin')return true;
  return state.auth.aiEnabled === true;
}
function canSeeShelfId(shelfId){
  if(!state.auth || !state.auth.token)return false;
  if(state.auth.role==='admin')return true;
  return Array.isArray(state.auth.shelfIds) && state.auth.shelfIds.includes(shelfId);
}

// メモカードの色パレット (タグの代わりに色で分類)
const CARD_COLORS=[
  {id:'default',name:'白',bg:'#FFFDF5',fg:'#1A1A1A'},
  {id:'yellow', name:'黄',bg:'#FFF6D6',fg:'#5A4818'},
  {id:'pink',   name:'桃',bg:'#FCE6E8',fg:'#6B2030'},
  {id:'blue',   name:'青',bg:'#E0EDF8',fg:'#1F3A5C'},
  {id:'green',  name:'緑',bg:'#E0F1E4',fg:'#1F4E2C'},
  {id:'purple', name:'紫',bg:'#EBE0F2',fg:'#3D2657'},
  {id:'gray',   name:'灰',bg:'#ECEDEE',fg:'#3A3F44'},
];
function colorById(id){return CARD_COLORS.find(c=>c.id===id)||CARD_COLORS[0];}

// 文字量に応じて文字サイズを自動調整 (Facebook風)
// グリッド用 (小さいサムネ): 短い=大、長い=小
function autoFontSize(text,minSize,maxSize){
  if(!text)return minSize;
  const len=text.length;
  if(len<=12)return maxSize;
  if(len<=25)return Math.round(maxSize-(maxSize-minSize)*0.35);
  if(len<=60)return Math.round(maxSize-(maxSize-minSize)*0.7);
  return minSize;
}
// 詳細表示用 (大画面)
function autoFontSizeDetail(text){
  if(!text)return 16;
  const len=text.length;
  if(len<=15)return 38;
  if(len<=30)return 30;
  if(len<=60)return 24;
  if(len<=120)return 20;
  return 16;
}

// 公式棚デモデータ
// 公式棚データ。起動時に /api/shelves から取得する。
// (Vercel Redis に保存されているデータをロード)
let OFFICIAL_SHELVES=[];

// 各ライブラリ内の参照(_ref)を、他ライブラリのマスター実体に解決して展開する。
// これでクロスポストされたメモが各ライブラリのカード一覧に正しく現れる。
function resolveShelfRefs(shelves){
  if(!Array.isArray(shelves))return;
  // 全ライブラリの実体カードをIDで索引
  const byId=new Map();
  for(const s of shelves){
    for(const c of (s.cards||[])){
      if(c && !c._ref && c.id)byId.set(c.id,c);
    }
  }
  // 各ライブラリの参照を実体に置き換える
  for(const s of shelves){
    if(!Array.isArray(s.cards))continue;
    s.cards=s.cards.map(c=>{
      if(!c)return null;
      if(!c._ref)return c;
      const origin=byId.get(c.id);
      if(!origin)return null; // 解決できない参照は除外
      // 実体の中身 + 参照側の created (= このライブラリに共有された時刻)
      // _sharedRef フラグで「他から来たメモ」と区別できるようにする
      return Object.assign({},origin,{
        created:c.created||origin.created,
        _sharedRef:true,
        _originShelf:c._originShelf,
      });
    }).filter(Boolean);
  }
}

async function loadOfficialShelves(){
  try{
    const res=await fetch('/api/shelves');
    if(!res.ok)return;
    const data=await res.json();
    OFFICIAL_SHELVES=Array.isArray(data.shelves)?data.shelves:[];
    // クロスポスト: 参照を実体に解決
    resolveShelfRefs(OFFICIAL_SHELVES);
    // 表示中の画面があれば再描画
    if(document.getElementById('screen-library')?.classList.contains('active')){
      renderLibrary();
    }
    // ホームのヘッダーバッジも更新
    updateHomeNewBadge();
  }catch(err){
    console.warn('公式棚の取得に失敗:',err);
  }
}

// その棚に「新着メモが何件あるか」を返す
function newCountForShelf(s){
  if(!s||!Array.isArray(s.cards))return 0;
  // 配布型（canSeeShelfId）または購読済みの棚だけカウント
  const isDistributed=canSeeShelfId(s.id);
  if(!isDistributed && !state.subscribed.includes(s.id))return 0;
  const lastSeen=state.shelfLastSeen[s.id]||0;
  if(lastSeen===0)return 0;
  let n=0;
  for(const c of s.cards){
    const t=c.created||c.t||0;
    if(t>lastSeen)n++;
  }
  return n;
}

// 配布型 + 登録済み購読型ライブラリの新着合計 (ホーム上部に表示)
function totalNewCount(){
  let n=0;
  // 配布型（canSeeShelfId）
  for(const s of OFFICIAL_SHELVES){
    if(canSeeShelfId(s.id))n+=newCountForShelf(s);
  }
  // 購読型（subscribed、ただし配布型と重複しないよう除外）
  for(const id of state.subscribed){
    if(canSeeShelfId(id))continue; // 配布型は上でカウント済み
    const s=OFFICIAL_SHELVES.find(x=>x.id===id);
    if(s)n+=newCountForShelf(s);
  }
  return n;
}

// 棚を開いた / 登録した時に「最後に見た時刻」を更新
function markShelfSeen(shelfId){
  if(!shelfId)return;
  state.shelfLastSeen[shelfId]=Date.now();
  save();
  updateHomeNewBadge();
}

// ナビバー「公式」の新着バッジを更新
function updateHomeNewBadge(){
  const n=totalNewCount();
  // ナビバーは複数画面に存在するので querySelectorAll で全部更新
  document.querySelectorAll('#bnav-library-badge').forEach(el=>{
    if(n>0){
      el.textContent=n>99?'99+':String(n);
      el.classList.remove('hide');
    }else{
      el.classList.add('hide');
    }
  });
}

// ═══ NAVIGATION ═══
function navHtml(active){
  const items=[
    {id:'home',label:'メモ',svg:'<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>'},
    {id:'today',label:'今日',svg:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>'},
    {id:'add',label:'',svg:''},
    {id:'search',label:'探す',svg:'<circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>'},
    {id:'library',label:'公式',svg:'<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>'},
  ];
  return items.map(i=>{
    if(i.id==='add'){
      return `<div class="bnav-add-wrap"><button class="bnav-add" data-action="open-add" aria-label="追加">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      </button></div>`;

// 塾生情報を最新化 (admin で shelfIds や aiEnabled が変わった時に反映)
// スロットリング: 直近30秒に更新済みなら何もしない
let _lastMeRefresh=0;
const ME_REFRESH_INTERVAL=30000; // 30秒

async function refreshMe(force){
  if(!state.auth || !state.auth.token)return;
  const now=Date.now();
  if(!force && now-_lastMeRefresh<ME_REFRESH_INTERVAL)return;
  _lastMeRefresh=now;
  try{
    const res=await fetch('/api/me',{
      headers:{'x-snapin-token':state.auth.token},
    });
    if(res.status===401){
      // token自体が無効 → ログアウト相当
      state.auth=null;
      save();
      return;
    }
    if(!res.ok)return;
    const data=await res.json();
    if(!data.ok){
      // claim_lost / revoked / not_found → ログアウト相当
      if(['claim_lost','revoked','student_not_found'].includes(data.reason)){
        state.auth=null;
        save();
        // 公式タブにいたら再描画して鍵マークに切り替え
        if(document.getElementById('screen-library')?.classList.contains('active')){
          renderLibrary();
        }
      }
      return;
    }
    if(data.role==='admin'){
      // 管理者tokenはサーバー側に保存されないので、ローカル情報のまま維持
      return;
    }
    // 塾生: shelfIds と aiEnabled をローカルに反映
    const s=data.student;
    if(!s)return;
    state.auth.shelfIds=Array.isArray(s.shelfIds)?s.shelfIds:[];
    state.auth.aiEnabled=s.aiEnabled!==false;
    state.auth.name=s.name||state.auth.name;
    state.auth.group=s.group||'';
    save();
    // 公式タブを開いている時は反映のため再描画
    if(document.getElementById('screen-library')?.classList.contains('active')){
      renderLibrary();
    }
    updateHomeNewBadge();
  }catch(e){
    // 静かに失敗 (オフライン等)
  }
}

function goto(id,push){
  if(push===undefined)push=true;
  // ホーム以外に移ったら選択モードを解除
  if(id!=='screen-home' && state.selectMode){
    state.selectMode=false;
    state.selectedIds=new Set();
    hideSelectBar();
  }
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const sc=$(id);
  if(!sc)return;
  sc.classList.add('active');
  if(push && state.navStack[state.navStack.length-1]!==id){
    state.navStack.push(id);
  }
  // 画面遷移ごとに塾生情報を最新化 (スロットリングあり)
  // 公式タブは即時更新 (admin変更を即座に反映したいので)
  refreshMe(id==='screen-library');
  if(id==='screen-home'){renderHome();updateHomeNewBadge();}
  if(id==='screen-today')renderToday();
  if(id==='screen-library'){
    loadOfficialShelves();  // 開くたびに最新を取得
    renderLibrary();
  }
  if(id==='screen-search'){
    // タブを開いた時は色フィルターをクリアして idle を再描画
    state.searchColor=null;
    state.searchTag=null;
    doSearch();
  }
}

function back(){
  $('detail-menu')?.classList.remove('on');
  if(state.navStack.length>1){
    state.navStack.pop();
    const prev=state.navStack[state.navStack.length-1];
    goto(prev,false);
  }else{
    goto('screen-home');
  }
}

// 塾生として claim を試みる (名前+誕生日4桁)
async function doClaimSubmit(){
  const nameInp=$('claim-name');
  const bdInp=$('claim-bd');
  const errEl=$('claim-error');
  const btn=$('claim-submit');
  if(!nameInp || !bdInp)return;

  const name=(nameInp.value||'').trim();
  const bd=(bdInp.value||'').trim();
  errEl.classList.add('hide');

  if(!name){
    errEl.textContent='名前を入れてください。';
    errEl.classList.remove('hide');
    return;
  }
  if(!/^\d{4}$/.test(bd)){
    errEl.textContent='誕生日は4桁の数字 (MMDD) で入れてください。';
    errEl.classList.remove('hide');
    return;
  }

  const deviceId=ensureDeviceId();
  btn.disabled=true;
  btn.textContent='確認中…';

  try{
    const res=await fetch('/api/claim',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name,birthday:bd,deviceId}),
    });
    const data=await res.json();
    if(!data.ok){
      let msg='うまく確認できませんでした。';
      if(data.reason==='not_found')msg='名前または誕生日が一致しません。先生に確認してください。';
      else if(data.reason==='already_claimed')msg='この名前はすでに他の端末で使われています。\n機種変などで使えなくなった場合は先生に連絡してください。';
      else if(data.reason==='revoked')msg='現在このアカウントは利用できません。先生に確認してください。';
      else if(data.reason==='bad_request')msg='入力に不備があります。もう一度確認してください。';
      errEl.textContent=msg;
      errEl.classList.remove('hide');
      btn.disabled=false;
      btn.textContent='入る';
      return;
    }
    // 成功: token と生徒情報を保存
    state.auth={
      token:data.token,
      role:'student',
      studentId:data.student.id,
      name:data.student.name,
      group:data.student.group||'',
      shelfIds:data.student.shelfIds||[],
      aiEnabled:data.student.aiEnabled!==false,
    };
    // 既存のuser情報も保持 (personal モードと共存)
    if(!state.user){
      state.user={mode:'personal',name:data.student.name,handle:'@'+data.student.id};
    }
    save();
    state.navStack=['screen-home'];
    goto('screen-home',false);
    toast(`ようこそ ${data.student.name} さん`);
  }catch(e){
    errEl.textContent='通信エラーです。電波の良い場所でもう一度お試しください。';
    errEl.classList.remove('hide');
    btn.disabled=false;
    btn.textContent='入る';
  }
}

function gotoClaim(){

  $('claim-bd').value='';

function pickTodayMessage(band,now){
  const pool=TODAY_MESSAGES[band]||TODAY_MESSAGES.noon;
  // 日付を seed にして、同じ日に何度開いても同じメッセージ
  const seed=now.getFullYear()*10000+(now.getMonth()+1)*100+now.getDate();
  return pool[seed%pool.length];
}

function getForgottenCards(){
  const now=Date.now();
  const DAY=86400000;
  const startOfToday=new Date();
  startOfToday.setHours(0,0,0,0);
  return state.cards.filter(c=>{
    if(c.type==='list')return false; // タスクは別管理
    const created=c.created||0;
    if(created>=startOfToday.getTime())return false; // 今日の保存は除外
    const lastTouch=c.lastReview||created;
    // 14日以上見ていない && 過去2回未満の復習
    return (now-lastTouch)>=14*DAY && (c.reviewCount||0)<3;
  }).sort((a,b)=>{
    // 古いものから優先
    const la=a.lastReview||a.created||0;
    const lb=b.lastReview||b.created||0;
    return la-lb;
  }).slice(0,8);
}

function getTodayCards(){
  const startOfToday=new Date();
  startOfToday.setHours(0,0,0,0);
  const t=startOfToday.getTime();
  return state.cards.filter(c=>(c.created||0)>=t);
}

// daysAgo=1 → 昨日, 2 → 2日前 ...
function getCardsForDayOffset(daysAgo){
  const start=new Date();
  start.setHours(0,0,0,0);
  const end=start.getTime() - (daysAgo-1)*86400000;
  const begin=start.getTime() - daysAgo*86400000;
  return state.cards.filter(c=>{
    const cr=c.created||0;
    return cr>=begin && cr<end;
  });
}

function getTodayOpenTasks(){
  // 全リストカードの未完項目を集約 (最大20件)
  // ※ 番号項目(mark:'number')は「やること」じゃないので除外
  const out=[];
  for(const c of state.cards){
    if(c.type!=='list')continue;
    for(const item of (c.items||[])){
      const mark=item.mark||'check';
      if(mark==='number')continue;
      if(!item.d && item.t.trim()){
        out.push({card:c,item});
        if(out.length>=20)return out;
      }
    }
  }
  return out;
}

// ═══ HOME ═══
function sortPinnedFirst(cards){
  // 元の順序を保ちつつ、ピン留めを先頭に
  return [...cards].sort((a,b)=>{
    const pa=a.pinned?1:0, pb=b.pinned?1:0;
    return pb-pa;
  });
}

function renderHome(){
  const empty=$('empty-home');
  const grid=$('grid-home');
  const feed=$('feed-home');

  if(state.cards.length===0){
    empty.classList.remove('hide');
    grid.classList.add('hide');
    feed.classList.add('hide');
  }else{
    empty.classList.add('hide');
    const sorted=sortPinnedFirst(state.cards);
    if(state.view==='grid'){
      grid.classList.remove('hide');
      feed.classList.add('hide');
      renderGrid(grid,sorted,'mine');
    }else{
      feed.classList.remove('hide');
      grid.classList.add('hide');
      renderFeed(feed,sorted);
    }
  }
  $('mosaic-btn').classList.toggle('on',state.mosaicMode);
}

// ═══ GRID ═══
function renderGrid(el,cards,origin){
  el.innerHTML='';
  // ホーム以外の呼び出し (公式棚など) では選択モードは使わない
  const isHome=(el.id==='grid-home' && origin==='mine');
  cards.forEach((c,idx)=>{
    const card=document.createElement('div');
    card.className='card '+c.type;
    if(state.mosaicMode && origin==='mine')card.classList.add('mosaic');
    if(isHome && state.selectMode){
      card.classList.add('selectable');
      if(state.selectedIds.has(c.id))card.classList.add('selected');
    }
    card.dataset.idx=idx;
    card.dataset.id=c.id;
    card.dataset.origin=origin;

    let inner='';
    if(c.type==='photo' || c.type==='photonote'){
      const col=colorById(c.color);
      card.style.background=col.bg;
      inner=`<img src="${c.image||''}" alt="">`;
      if(c.text)inner+=`<div class="card-source">${esc(c.text.slice(0,30))}</div>`;
    }else if(c.type==='note'){
      const col=colorById(c.color);
      const fz=autoFontSize(c.text||'',11,17);
      const centered=fz>=15;
      const style=`background:${col.bg};color:${col.fg};font-size:${fz}px;${centered?'display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.4;-webkit-line-clamp:initial;':''}`;
      inner=`<div class="ctxt" style="${style}">${esc(c.text||'')}</div>`;
    }else if(c.type==='list'){
      const itemsArr=(c.items||[]).slice(0,5);
      const itemsHtml=itemsArr.map((i,idx)=>{
        const m=i.mark||'check';
        const done=i.d===true;
        if(m==='number'){
          let num=0;
          for(let k=0;k<=idx;k++){
            if(((c.items||[])[k].mark||'check')==='number')num++;
          }
          return `<div class="li"><div class="li-num">${num}.</div><span>${esc(i.t)}</span></div>`;
        }
        return `<div class="li ${done?'done':''}"><div class="chk"></div><span>${esc(i.t)}</span></div>`;
      }).join('');
      const title=c.title?`<div style="font-weight:600;font-size:11px;margin-bottom:4px;color:var(--gd);">${esc(c.title)}</div>`:'';
      inner=`<div class="ctxt">${title}${itemsHtml}</div>`;
    }
    // ピン留めバッジ
    if(origin==='mine' && c.pinned){
      inner+=`<div class="pin-badge"><svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M16 3l5 5-4 1-3 5-2-2-5 5-2-2 5-5-2-2 5-3z"/></svg></div>`;
    }
    // 選択マーク (常に DOM に置いて CSS で表示制御)
    if(isHome){
      inner+=`<div class="sel-mark"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m5 13 4 4L19 7"/></svg></div>`;
    }
    card.innerHTML=inner;
    el.appendChild(card);
  });

  // 選択モードのときはグリッドにマーカークラスを付ける
  if(isHome){
    el.classList.toggle('selecting',!!state.selectMode);
  }

  if(origin==='mine'){
    el.querySelectorAll('.card').forEach(card=>{
      const c=state.cards.find(x=>x.id===card.dataset.id);
      if(!c)return;

      // 長押しで選択モードに入る (ホームのみ)
      if(isHome){
        attachGridLongPress(card,c);
      }

      card.addEventListener('click',()=>{
        // 選択モード中はタップでトグル
        if(isHome && state.selectMode){
          toggleSelect(c.id);
          return;
        }
        if(state.mosaicMode){
          if(card.classList.contains('mosaic')){
            card.classList.remove('mosaic');
          }else{
            openDetail(c,'mine');
          }
        }else{
          openDetail(c,'mine');
        }
      });
    });
  }else{
    el.querySelectorAll('.card').forEach(card=>{
      card.addEventListener('click',()=>{
        const c=cards[parseInt(card.dataset.idx)];
        openDetail(c,'official');
      });
    });
  }
}

// 長押しで選択モード入り (グリッドのみ)
function attachGridLongPress(cardEl,c){
  let pressTimer=null,startX=0,startY=0,moved=false;
  const xy=ev=>ev.touches?[ev.touches[0].clientX,ev.touches[0].clientY]:[ev.clientX,ev.clientY];
  const onStart=ev=>{
    if(state.selectMode)return; // 既に選択モードなら長押し不要
    [startX,startY]=xy(ev);
    moved=false;
    pressTimer=setTimeout(()=>{
      if(moved)return;
      if(navigator.vibrate)navigator.vibrate(20);
      enterSelectMode(c.id);
    },500);
  };
  const onMove=ev=>{
    const [x,y]=xy(ev);
    if(Math.abs(x-startX)>8 || Math.abs(y-startY)>8){
      moved=true;
      clearTimeout(pressTimer);
    }
  };
  const onEnd=()=>{ clearTimeout(pressTimer); };
  cardEl.addEventListener('touchstart',onStart,{passive:true});
  cardEl.addEventListener('touchmove',onMove,{passive:true});
  cardEl.addEventListener('touchend',onEnd);
  cardEl.addEventListener('touchcancel',onEnd);
  cardEl.addEventListener('mousedown',onStart);
  cardEl.addEventListener('mousemove',onMove);
  cardEl.addEventListener('mouseup',onEnd);
  cardEl.addEventListener('mouseleave',onEnd);
}

function enterSelectMode(firstId){
  state.selectMode=true;
  state.selectedIds=new Set([firstId]);
  showSelectBar();
  renderHome();
}
function exitSelectMode(){
  state.selectMode=false;
  state.selectedIds=new Set();
  hideSelectBar();
  renderHome();
}
function toggleSelect(id){
  if(state.selectedIds.has(id))state.selectedIds.delete(id);
  else state.selectedIds.add(id);
  if(state.selectedIds.size===0){
    exitSelectMode();
    return;
  }
  // バーの件数を更新 + カードの見た目を更新
  updateSelectBarCount();
  const card=$('grid-home').querySelector(`.card[data-id="${CSS.escape(id)}"]`);
  if(card)card.classList.toggle('selected',state.selectedIds.has(id));
}
function showSelectBar(){
  let bar=$('select-bar');
  if(!bar){
    bar=document.createElement('div');
    bar.id='select-bar';
    bar.className='select-bar';
    bar.innerHTML=`
      <button class="select-bar-cancel" data-action="exit-select">キャンセル</button>
      <div class="select-bar-count" id="select-bar-count">1件選択中</div>
      <button class="select-bar-delete" data-action="delete-selected">削除</button>
    `;
    document.querySelector('.app').appendChild(bar);
  }
  bar.style.display='flex';
  updateSelectBarCount();
}
function hideSelectBar(){
  const bar=$('select-bar');
  if(bar)bar.style.display='none';
}
function updateSelectBarCount(){
  const el=$('select-bar-count');
  if(el)el.textContent=state.selectedIds.size+'件選択中';
}
function deleteSelected(){
  const n=state.selectedIds.size;
  if(n===0)return;
  if(!confirm(`${n}件のメモを削除しますか?`)){return;}
  state.cards=state.cards.filter(c=>!state.selectedIds.has(c.id));
  save();
  toast(`${n}件削除しました`);
  exitSelectMode();
}

function onFilePick(e){
  const file=e.target.files[0];
  if(!file){
    state.current=null;

  // 画像ファイルでなければ弾く (Filesアプリから非画像を選んだ場合の保険)

  // 画像を圧縮 (長辺1280px、JPEG 0.85品質、サイズ超過なら自動で品質下げて再試行)

    state.current.image=compressed;

  }).catch(err=>{
    toast('画像の読み込みに失敗しました');
    state.current=null;
    state.photoMode=null;
  });
  e.target.value='';
}

// data URL のおおよそのバイト数
function dataUrlBytes(dataUrl){
  const i=dataUrl.indexOf(',');
  if(i<0)return 0;
  return Math.floor((dataUrl.length-i-1)*3/4);
}

// Image を読み込む
function loadImage(src){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>res(img);
    img.onerror=()=>rej(new Error('画像読み込み失敗'));
    img.src=src;
  });
}

// 圧縮処理 (長辺・品質を指定して JPEG dataURL を返す)
function compressOnce(dataUrl,maxSide,quality){
  return loadImage(dataUrl).then(img=>{
    let w=img.naturalWidth, h=img.naturalHeight;
    const long=Math.max(w,h);
    if(long>maxSide){
      if(w>h){h=Math.round(h*maxSide/w);w=maxSide;}
      else{w=Math.round(w*maxSide/h);h=maxSide;}
    }
    const canvas=document.createElement('canvas');
    canvas.width=w; canvas.height=h;
    const ctx=canvas.getContext('2d');
    ctx.imageSmoothingEnabled=true;
    ctx.imageSmoothingQuality='high';
    ctx.fillStyle='#fff';
    ctx.fillRect(0,0,w,h);
    ctx.drawImage(img,0,0,w,h);
    return canvas.toDataURL('image/jpeg',quality);
  });
}

// 賢い圧縮: ターゲット (1.5MB以下) を超えたら品質・寸法を下げて再試行
async function smartCompressImage(file){
  const reader=new FileReader();
  const dataUrl=await new Promise((res,rej)=>{
    reader.onload=ev=>res(ev.target.result);
    reader.onerror=()=>rej(new Error('読み込み失敗'));
    reader.readAsDataURL(file);
  });
  const TARGET_BYTES=1.5*1024*1024;
  let side=1600, q=0.85;
  for(let i=0;i<4;i++){
    try{
      const out=await compressOnce(dataUrl,side,q);
      if(dataUrlBytes(out)<=TARGET_BYTES)return out;
      // 大きすぎる: まず品質を下げる、それでも大きければ寸法も下げる
      q-=0.15;
      if(q<0.5){q=0.55;side=Math.floor(side*0.75);}
    }catch(e){
      // 圧縮失敗時は元の dataUrl を返す (最終手段)
      return dataUrl;
    }
  }
  // 最終 fallback: 強めの圧縮
  try{return await compressOnce(dataUrl,1000,0.55);}
  catch(e){return dataUrl;}
}

function renderUpload(){

  if(!c){back();return;}
  const body=$('up-body');
  $('up-title').textContent=c._new?'新しい保存':'編集';
  body.innerHTML='';

  if(c.type==='photo' || c.type==='photonote'){
    const wrap=document.createElement('div');
    wrap.className='up-photo';
    if(c.image)wrap.innerHTML=`<img src="${c.image}">`;
    const change=document.createElement('button');
    change.className='change';
    change.textContent='写真を変える';
    change.addEventListener('click',()=>{
      state.photoMode=c.type;
      $('file-input').click();
    });
    wrap.appendChild(change);
    body.appendChild(wrap);

    // 写真+メモ なら textarea
    const ta=document.createElement('textarea');
    ta.className='up-text';
    ta.placeholder='メモをする';
    ta.value=c.text||'';
    ta.addEventListener('input',e=>{
      state.current.text=e.target.value;
      // テキストが入ったら自動的に photonote 扱いに
      if(e.target.value.trim() && state.current.type==='photo'){
        state.current.type='photonote';
      }
    });
    body.appendChild(ta);
  }else if(c.type==='note'){
    const ta=document.createElement('textarea');
    ta.className='up-text';
    ta.id='up-note-area';
    ta.placeholder='メモを書く…';
    ta.style.minHeight='240px';
    ta.style.padding='20px';
    ta.style.borderRadius='12px';
    ta.style.lineHeight='1.5';
    const applyStyle=()=>{
      const col=colorById(c.color);
      ta.style.background=col.bg;
      ta.style.color=col.fg;
      const fz=autoFontSizeDetail(ta.value);
      ta.style.fontSize=fz+'px';
      ta.style.textAlign=fz>=24?'center':'left';
    };
    ta.value=c.text||'';
    applyStyle();
    ta.addEventListener('input',e=>{
      state.current.text=e.target.value;
      applyStyle();
    });

      const inheritMark=(prev && prev.mark)?prev.mark:'check';

      state.current.items.push(newItem);
