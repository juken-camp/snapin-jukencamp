<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>SnapIn</title>
<meta name="theme-color" content="#1D9E75">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="SnapIn">
<style>
/* ═══════════════════════════════════════════
   SnapIn MVP — 思想
   ─ 個人の知識庫。SNSではない。
   ─ 撮る／書く／残す／見返す。それだけ。
   ─ AIは詳細画面からのみ呼ぶ知識司書。
   ═══════════════════════════════════════════ */
:root{
  --g:#1D9E75; --gl:#E1F5EE; --gd:#0F6E56;
  --bg:#FAFAFA; --surface:#FFF;
  --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.15);
  --text:#1a1a1a; --text2:#6b6b6b; --text3:#a8a8a8;
  --red:#E24B4A; --amber:#EF9F27; --blue:#378ADD;
  --r:14px; --rs:10px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#000;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",system-ui,sans-serif;color:var(--text);overscroll-behavior:none;-webkit-font-smoothing:antialiased;}
button,input,textarea{font-family:inherit;}
button{border:none;background:none;cursor:pointer;color:inherit;}

/* ─── Shell ─── */
.app{max-width:420px;margin:0 auto;height:100dvh;background:var(--surface);display:flex;flex-direction:column;position:relative;overflow:hidden;box-shadow:0 0 32px rgba(0,0,0,0.12);}

/* ─── Header ─── */
.hdr{height:52px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border);flex-shrink:0;background:var(--surface);z-index:5;}
.logo{font-size:20px;font-weight:700;letter-spacing:-0.5px;}
.logo em{color:var(--g);font-style:normal;}
.hdr-actions{display:flex;gap:14px;color:var(--text2);}
.hdr-actions button{display:flex;align-items:center;padding:4px;}
.hdr-actions button:active{opacity:0.5;}

/* ─── Bottom Nav ─── */
.bnav{display:flex;justify-content:space-around;padding:8px 0 calc(8px + var(--safe-bottom));border-top:0.5px solid var(--border);background:var(--surface);flex-shrink:0;z-index:5;}
.bnav button{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 14px;font-size:9.5px;color:var(--text3);font-weight:500;}
.bnav button.on{color:var(--g);}
.bnav svg{display:block;}

/* ─── Screens ─── */
.screen{display:none;flex-direction:column;flex:1;min-height:0;overflow:hidden;background:var(--surface);}
.screen.on{display:flex;}

/* ─── View Toggle (Grid/Feed) ─── */
.view-bar{padding:10px 16px 8px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.search-input{flex:1;height:34px;border-radius:10px;background:var(--bg);border:0.5px solid var(--border);padding:0 12px 0 32px;font-size:13px;outline:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%236b6b6b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='8'/><line x1='21' y1='21' x2='16.65' y2='16.65'/></svg>");background-repeat:no-repeat;background-position:11px center;}
.view-toggle{display:flex;border:0.5px solid var(--border2);border-radius:9px;overflow:hidden;flex-shrink:0;}
.view-toggle button{width:34px;height:32px;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--text3);}
.view-toggle button.on{background:var(--g);color:#fff;}

/* ─── Grid ─── */
.grid-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;padding:3px;}
.gi{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;cursor:pointer;background:var(--bg);display:flex;align-items:center;justify-content:center;}
.gi:active{opacity:0.78;}
.gi img{width:100%;height:100%;object-fit:cover;display:block;}
.gi-text{width:100%;height:100%;padding:10px;display:flex;flex-direction:column;justify-content:center;font-size:11px;line-height:1.45;color:var(--text);text-align:left;word-break:break-word;overflow:hidden;}
.gi-text.short{justify-content:center;text-align:center;font-size:13px;font-weight:600;}
.gi-list{font-size:10px;}
.gi-list-row{display:flex;align-items:center;gap:4px;line-height:1.5;}
.gi-list-row.done{opacity:0.45;text-decoration:line-through;}
.gi-check{width:8px;height:8px;border:1px solid var(--text2);border-radius:2px;flex-shrink:0;}
.gi-check.on{background:var(--g);border-color:var(--g);}
.gi-badge{position:absolute;top:5px;right:5px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,0.5);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.gi-dot{position:absolute;top:5px;left:5px;width:7px;height:7px;border-radius:50%;background:var(--g);box-shadow:0 0 0 1.5px #fff;}
.gi.drag{opacity:0.4;}
.gi.drag-over{outline:2px solid var(--g);outline-offset:-2px;}

/* ─── Empty ─── */
.empty{padding:80px 32px;text-align:center;color:var(--text3);}
.empty-emoji{font-size:48px;margin-bottom:12px;opacity:0.5;}
.empty-text{font-size:13px;line-height:1.7;}

/* ─── FAB ─── */
.fab{position:absolute;right:18px;bottom:calc(78px + var(--safe-bottom));width:56px;height:56px;border-radius:50%;background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(29,158,117,0.45);z-index:10;transition:transform 0.15s;}
.fab:active{transform:scale(0.92);}

/* ─── FAB Menu ─── */
.fab-menu{position:absolute;right:18px;bottom:calc(146px + var(--safe-bottom));display:none;flex-direction:column;gap:8px;z-index:11;}
.fab-menu.on{display:flex;}
.fab-item{display:flex;align-items:center;gap:10px;background:var(--surface);padding:10px 16px 10px 12px;border-radius:28px;box-shadow:0 4px 16px rgba(0,0,0,0.12);font-size:13px;font-weight:500;white-space:nowrap;animation:popIn 0.18s ease-out backwards;}
.fab-item:nth-child(1){animation-delay:0.02s;}
.fab-item:nth-child(2){animation-delay:0.05s;}
.fab-item:nth-child(3){animation-delay:0.08s;}
.fab-item:nth-child(4){animation-delay:0.11s;}
.fab-item-icon{width:32px;height:32px;border-radius:50%;background:var(--gl);color:var(--gd);display:flex;align-items:center;justify-content:center;}
@keyframes popIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fab-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.25);z-index:9;display:none;}
.fab-backdrop.on{display:block;}

/* ─── Feed (リール風) ─── */
.feed-wrap{flex:1;overflow:hidden;position:relative;background:#000;}
.feed-scroller{height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.feed-scroller::-webkit-scrollbar{display:none;}
.feed-item{height:100%;scroll-snap-align:start;position:relative;display:flex;align-items:center;justify-content:center;}
.feed-item img{max-width:100%;max-height:100%;object-fit:contain;}
.feed-text{padding:32px;color:#fff;font-size:20px;line-height:1.6;font-weight:500;max-width:100%;text-align:center;}
.feed-list{padding:32px;color:#fff;font-size:16px;line-height:1.9;width:100%;}
.feed-list-row{display:flex;gap:10px;align-items:flex-start;}
.feed-list-row.done{opacity:0.5;text-decoration:line-through;}
.feed-meta{position:absolute;top:14px;left:14px;right:14px;display:flex;justify-content:space-between;align-items:center;color:rgba(255,255,255,0.85);font-size:11px;z-index:3;}
.feed-meta-date{background:rgba(0,0,0,0.4);backdrop-filter:blur(8px);padding:4px 10px;border-radius:12px;}
.feed-meta-count{background:rgba(0,0,0,0.4);backdrop-filter:blur(8px);padding:4px 10px;border-radius:12px;}
.feed-actions{position:absolute;bottom:calc(28px + var(--safe-bottom));right:14px;display:flex;flex-direction:column;gap:14px;z-index:3;}
.feed-act{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.15);backdrop-filter:blur(10px);color:#fff;display:flex;align-items:center;justify-content:center;border:0.5px solid rgba(255,255,255,0.2);}
.feed-act:active{transform:scale(0.92);}
.feed-note{position:absolute;left:14px;right:74px;bottom:calc(28px + var(--safe-bottom));color:#fff;font-size:13px;line-height:1.5;background:rgba(0,0,0,0.4);backdrop-filter:blur(8px);padding:8px 12px;border-radius:12px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.feed-empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(255,255,255,0.6);padding:32px;text-align:center;}

/* ─── Compose Sheet ─── */
.sheet{position:absolute;inset:0;background:var(--surface);z-index:20;display:none;flex-direction:column;animation:slideUp 0.25s cubic-bezier(.25,.9,.3,1);}
.sheet.on{display:flex;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.sheet-hdr{height:52px;padding:0 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border);flex-shrink:0;}
.sheet-back{font-size:14px;color:var(--text2);padding:6px 4px;}
.sheet-title{font-size:14px;font-weight:600;}
.sheet-save{font-size:14px;color:var(--g);font-weight:600;padding:6px 4px;}
.sheet-save:disabled{color:var(--text3);}
.sheet-body{flex:1;overflow-y:auto;padding:14px;}

/* ─── Compose: Photo Preview ─── */
.compose-photo{width:100%;border-radius:var(--r);background:var(--bg);margin-bottom:12px;overflow:hidden;position:relative;display:none;}
.compose-photo.on{display:block;}
.compose-photo img{width:100%;display:block;}
.compose-photo-remove{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,0.55);color:#fff;display:flex;align-items:center;justify-content:center;}

/* ─── Compose: Text ─── */
.compose-text{width:100%;min-height:120px;border:none;outline:none;font-size:16px;line-height:1.7;resize:none;padding:6px 4px;background:transparent;}
.compose-text::placeholder{color:var(--text3);}

/* ─── Compose: List ─── */
.list-rows{display:flex;flex-direction:column;gap:2px;}
.list-row{display:flex;align-items:center;gap:10px;padding:6px 4px;border-radius:8px;}
.list-row.drag-source{opacity:0.35;}
.list-row.drag-over{background:var(--gl);}
.list-handle{color:var(--text3);cursor:grab;touch-action:none;padding:4px 2px;}
.list-check{width:20px;height:20px;border:1.5px solid var(--text2);border-radius:5px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;}
.list-check.on{background:var(--g);border-color:var(--g);}
.list-input{flex:1;border:none;outline:none;font-size:15px;line-height:1.5;padding:6px 0;background:transparent;}
.list-input.done{text-decoration:line-through;color:var(--text3);}
.list-del{color:var(--text3);padding:4px;opacity:0;transition:opacity 0.15s;}
.list-row:focus-within .list-del{opacity:1;}
.list-add{display:flex;align-items:center;gap:10px;padding:8px 4px;color:var(--text3);font-size:14px;}
.list-add::before{content:"";width:20px;height:20px;border:1.5px dashed var(--text3);border-radius:5px;}

/* ─── Compose: Photo+Memo combined ─── */
.compose-memo{width:100%;min-height:40px;border:none;outline:none;font-size:14px;line-height:1.5;padding:8px 4px;background:transparent;border-top:0.5px solid var(--border);margin-top:8px;resize:none;}

/* ─── Detail Screen ─── */
.detail-hdr{height:52px;padding:0 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border);flex-shrink:0;}
.detail-back{padding:6px 4px;color:var(--text);}
.detail-menu{padding:6px 4px;color:var(--text2);}
.detail-body{flex:1;overflow-y:auto;padding:18px 16px 32px;}
.detail-photo{width:100%;border-radius:var(--r);background:var(--bg);margin-bottom:14px;overflow:hidden;}
.detail-photo img{width:100%;display:block;}
.detail-text{font-size:16px;line-height:1.75;white-space:pre-wrap;word-break:break-word;}
.detail-date{font-size:11px;color:var(--text3);margin-top:18px;padding-top:14px;border-top:0.5px solid var(--border);}
.detail-list{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.detail-list-row{display:flex;align-items:center;gap:10px;padding:8px 4px;border-radius:8px;cursor:pointer;}
.detail-list-row.done .detail-list-text{text-decoration:line-through;color:var(--text3);}
.detail-list-text{flex:1;font-size:15px;line-height:1.5;}

/* ─── AI Button ─── */
.detail-ai{position:absolute;right:18px;bottom:calc(28px + var(--safe-bottom));display:flex;align-items:center;gap:8px;padding:12px 18px 12px 14px;background:var(--g);color:#fff;border-radius:28px;font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(29,158,117,0.4);z-index:5;}
.detail-ai:active{transform:scale(0.96);}

/* ─── Shelves Screen ─── */
.shelves-tabs{display:flex;padding:8px 14px 4px;gap:6px;flex-shrink:0;}
.shelf-tab{flex:1;padding:8px;text-align:center;font-size:12px;font-weight:600;color:var(--text2);border-radius:8px;background:var(--bg);}
.shelf-tab.on{background:var(--g);color:#fff;}
.shelves-wrap{flex:1;overflow-y:auto;padding:8px 14px 24px;}
.shelf{padding:14px;background:var(--bg);border-radius:var(--r);margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.shelf-icon{width:46px;height:46px;border-radius:12px;background:var(--gl);color:var(--gd);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.shelf-info{flex:1;min-width:0;}
.shelf-name{font-size:14px;font-weight:600;margin-bottom:2px;}
.shelf-handle{font-size:11px;color:var(--text2);font-family:'SF Mono',Menlo,monospace;}
.shelf-desc{font-size:11px;color:var(--text3);margin-top:3px;line-height:1.5;}
.shelf-action{padding:6px 12px;font-size:11px;font-weight:600;border-radius:14px;flex-shrink:0;}
.shelf-action.sub{background:var(--g);color:#fff;}
.shelf-action.unsub{background:var(--bg);color:var(--text2);border:0.5px solid var(--border2);}

/* ─── Shelf Detail ─── */
.shelf-detail-hdr-info{flex:1;text-align:center;}
.shelf-detail-name{font-size:14px;font-weight:600;}
.shelf-detail-handle{font-size:10px;color:var(--text3);font-family:'SF Mono',Menlo,monospace;margin-top:1px;}

/* ─── Settings ─── */
.settings-wrap{flex:1;overflow-y:auto;padding:14px;}
.settings-section{margin-bottom:24px;}
.settings-section-title{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:0.5px;text-transform:uppercase;padding:0 4px 8px;}
.settings-card{background:var(--bg);border-radius:var(--r);overflow:hidden;}
.settings-row{padding:14px 14px;display:flex;align-items:center;gap:12px;border-bottom:0.5px solid var(--border);cursor:pointer;}
.settings-row:last-child{border-bottom:none;}
.settings-row-label{flex:1;font-size:14px;}
.settings-row-value{font-size:13px;color:var(--text3);}
.settings-name-input{flex:1;border:none;outline:none;background:transparent;font-size:14px;text-align:right;color:var(--text2);}
.settings-foot{padding:24px 16px;text-align:center;color:var(--text3);font-size:11px;line-height:1.7;}

/* ─── Toast ─── */
.toast{position:absolute;left:50%;bottom:calc(96px + var(--safe-bottom));transform:translate(-50%,20px);background:rgba(0,0,0,0.85);color:#fff;font-size:12.5px;font-weight:500;padding:10px 18px;border-radius:24px;opacity:0;pointer-events:none;transition:all 0.25s;z-index:100;backdrop-filter:blur(8px);}
.toast.on{opacity:1;transform:translate(-50%,0);}

/* ─── AI Chat (called from detail) ─── */
.ai-hdr{height:52px;padding:0 14px;display:flex;align-items:center;gap:10px;border-bottom:0.5px solid var(--border);flex-shrink:0;}
.ai-hdr-title{flex:1;font-size:14px;font-weight:600;}
.ai-hdr-sub{font-size:10px;color:var(--text3);font-weight:400;margin-left:6px;}
.ai-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
.ai-msg{max-width:84%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.6;word-break:break-word;}
.ai-msg.user{align-self:flex-end;background:var(--g);color:#fff;border-bottom-right-radius:6px;}
.ai-msg.ai{align-self:flex-start;background:var(--bg);color:var(--text);border-bottom-left-radius:6px;}
.ai-msg.ai.thinking{color:var(--text3);font-style:italic;}
.ai-ctx{align-self:center;font-size:11px;color:var(--text3);background:var(--gl);padding:6px 12px;border-radius:12px;}
.ai-input-bar{padding:8px 10px calc(8px + var(--safe-bottom));border-top:0.5px solid var(--border);display:flex;gap:8px;align-items:flex-end;flex-shrink:0;background:var(--surface);}
.ai-input{flex:1;border:1px solid var(--border2);border-radius:18px;padding:9px 14px;font-size:14px;line-height:1.4;outline:none;resize:none;max-height:96px;background:var(--bg);}
.ai-send{width:38px;height:38px;border-radius:50%;background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ai-send:disabled{background:var(--text3);}

/* ─── Lightbox ─── */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.95);display:none;align-items:center;justify-content:center;z-index:200;}
.lightbox.on{display:flex;}
.lightbox img{max-width:100%;max-height:100%;}

/* ─── Detail menu sheet ─── */
.menu-sheet-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.4);z-index:30;display:none;}
.menu-sheet-backdrop.on{display:block;}
.menu-sheet{position:absolute;left:14px;right:14px;bottom:calc(20px + var(--safe-bottom));background:var(--surface);border-radius:16px;z-index:31;display:none;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.2);}
.menu-sheet.on{display:block;}
.menu-sheet button{display:flex;width:100%;padding:16px;font-size:15px;text-align:left;border-bottom:0.5px solid var(--border);}
.menu-sheet button:last-child{border-bottom:none;}
.menu-sheet button.danger{color:var(--red);}
</style>
</head>
<body>

<div class="app">

<!-- ═════════════════════════════════════════
     ホーム（自分の知識庫）
     ═════════════════════════════════════════ -->
<section class="screen on" id="screen-home">
  <header class="hdr">
    <div class="logo">Snap<em>In</em></div>
    <div class="hdr-actions">
      <button onclick="goTo('shelves')" aria-label="棚">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9h18M3 15h18M3 4h18v16H3z"/></svg>
      </button>
      <button onclick="goTo('settings')" aria-label="設定">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <div class="view-bar">
    <input class="search-input" id="search-input" type="search" placeholder="自分の知識庫を検索…" oninput="onSearch(this.value)">
    <div class="view-toggle">
      <button id="vt-grid" class="on" onclick="setViewMode('grid')" aria-label="グリッド">

<script>
/* ═══════════════════════════════════════════
   SnapIn MVP — script
   設計思想：
   ─ 個人データは完全ローカル（localStorage）
   ─ 公式棚はread-only（このMVPではモックデータ）
   ─ AIはカード詳細から手動で呼ぶ知識司書
   ─ SNS要素（いいね・フォロー・人気）は一切なし
   ═══════════════════════════════════════════ */

// ─── State ───
const S = {
  notes: [],          // 自分のノート（写真/テキスト/リスト）
  trash: [],          // ゴミ箱
  subscribedShelves: [], // 購読中の公式棚ハンドル
  shelfCopiedIds: [], // 棚からコピーしたノートIDの記録
  profile: { name: '' },
  viewMode: 'grid',
  searchQuery: '',
  currentDetailId: null,
  currentShelf: null,
  composing: null,    // { mode: 'photo'|'text'|'list', editingId?: string, photoData?, memo?, text?, items? }
  shelvesTab: 'sub',
};

// ─── Mock 公式棚（JUKEN CAMP）───
// 実運用ではここをFirestore/APIから取得する。
const OFFICIAL_SHELVES = [
  {
    handle: '@jukencamp-english',
    name: 'JUKEN CAMP 英語',
    emoji: '🔤',
    desc: '中3向け。基本文法・頻出単語・長文対策。',
    notes: [
      { type:'text', text:'be動詞 + 一般動詞の使い分け\n\n・主語 + be動詞 + 名詞/形容詞 → He is a student.\n・主語 + 一般動詞 → He plays soccer.\n\n両方は同時に使えない（× He is plays soccer.）' },
      { type:'text', text:'関係代名詞 who / which / that\n\n・who → 人\n・which → モノ\n・that → どちらでも可\n\n例：The boy who runs fast is Tom.' },
      { type:'text', text:'頻出単語 50（テスト直前）\n\nimportant / develop / improve / community / environment / education / experience / opportunity ...' },
    ]
  },
  {
    handle: '@jukencamp-math',
    name: 'JUKEN CAMP 数学',
    emoji: '📐',
    desc: '二次関数、図形、確率の頻出パターン。',
    notes: [
      { type:'text', text:'二次関数 y=ax²+bx+c\n\n頂点の x 座標 = -b/2a\n\n増減：a>0 なら下に凸（最小値あり）\na<0 なら上に凸（最大値あり）' },
      { type:'list', items:[
        { text:'三平方の定理を覚える', done:false },
        { text:'正弦定理・余弦定理を覚える', done:false },
        { text:'円周角の定理を覚える', done:false },
        { text:'相似比と面積比・体積比', done:false },
      ]},
    ]
  },
  {
    handle: '@jukencamp-minatogawa3',
    name: 'JUKEN CAMP 港川中3',
    emoji: '🏫',
    desc: '港川中3年生向け。定期テスト範囲のまとめ。',
    notes: [
      { type:'text', text:'10月の定期テスト範囲\n\n英語：Unit 5〜7\n数学：二次関数全般\n国語：「故郷」 / 古文「徒然草」\n理科：化学変化と原子\n社会：明治維新〜大正デモクラシー' },
    ]
  },
  {
    handle: '@jukencamp-history',
    name: 'JUKEN CAMP 歴史',
    emoji: '🌏',
    desc: '日本史の頻出年号・人物のまとめ。',
    notes: [
      { type:'text', text:'明治維新の流れ\n\n1853 ペリー来航\n1854 日米和親条約\n1858 日米修好通商条約\n1867 大政奉還\n1868 戊辰戦争・五箇条の御誓文' },
    ]
  },
];

// ─── Persistence ───
const LS_KEY = 'snapin_mvp_v1';
function saveState(){
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({
      notes: S.notes,
      trash: S.trash,
      subscribedShelves: S.subscribedShelves,
      shelfCopiedIds: S.shelfCopiedIds,
      profile: S.profile,
    }));
  } catch(e) { console.warn('save failed', e); }
}
function loadState(){
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    if (d.notes) S.notes = d.notes;
    if (d.trash) S.trash = d.trash;
    if (d.subscribedShelves) S.subscribedShelves = d.subscribedShelves;
    if (d.shelfCopiedIds) S.shelfCopiedIds = d.shelfCopiedIds;
    if (d.profile) S.profile = { ...S.profile, ...d.profile };
  } catch(e) { console.warn('load failed', e); }
}
loadState();

// ─── Navigation ───
function goTo(name){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  document.getElementById('screen-' + name).classList.add('on');
  if (name === 'home') { renderGrid(); if (S.viewMode === 'feed') renderFeed(); }
  if (name === 'shelves') renderShelves();
  if (name === 'settings') renderSettings();
}

// ─── Home: View Mode ───
function setViewMode(mode){
  S.viewMode = mode;
  document.getElementById('vt-grid').classList.toggle('on', mode==='grid');
  document.getElementById('vt-feed').classList.toggle('on', mode==='feed');
  document.getElementById('grid-wrap').style.display = mode==='grid' ? '' : 'none';
  document.getElementById('feed-wrap').style.display = mode==='feed' ? '' : 'none';
  if (mode === 'feed') renderFeed();
}

// ─── Search ───
function onSearch(q){
  S.searchQuery = q.trim().toLowerCase();
  if (S.viewMode === 'grid') renderGrid();
  else renderFeed();
}
function matchesSearch(n){
  if (!S.searchQuery) return true;
  const q = S.searchQuery;
  const text = (n.text || '') + ' ' + (n.memo || '');
  if (text.toLowerCase().includes(q)) return true;
  if (n.items && n.items.some(it => it.text.toLowerCase().includes(q))) return true;
  return false;
}

// ─── Grid Render ───
function renderGrid(){
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty-home');
  const list = S.notes.filter(matchesSearch);

  if (S.notes.length === 0) {
    grid.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = list.map((n, idx) => renderGridItem(n, idx)).join('');

  // ドラッグ並び替え（HTML5 DnD）
  grid.querySelectorAll('.gi').forEach(el => {
    el.draggable = true;
    el.addEventListener('dragstart', e => {
      el.classList.add('drag');
      e.dataTransfer.setData('text/plain', el.dataset.id);
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragend', () => el.classList.remove('drag'));
    el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over'); });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', e => {
      e.preventDefault();
      el.classList.remove('drag-over');
      const fromId = e.dataTransfer.getData('text/plain');
      const toId = el.dataset.id;
      reorderNotes(fromId, toId);
    });
  });
}

function renderGridItem(n, idx){
  const fromShelf = n.fromShelf ? `<div class="gi-badge" title="棚から">📚</div>` : '';
  const newDot = (Date.now() - n.id < 1000*60*60*24) ? '<div class="gi-dot"></div>' : '';
  let inner;
  if (n.type === 'photo') {
    inner = `<img src="${n.photoData}" alt="">`;
  } else if (n.type === 'list') {
    const rows = n.items.slice(0, 6).map(it =>
      `<div class="gi-list-row ${it.done ? 'done' : ''}"><div class="gi-check ${it.done?'on':''}"></div><span>${escapeHtml(truncate(it.text, 18))}</span></div>`
    ).join('');
    inner = `<div class="gi-text gi-list">${rows}</div>`;
  } else {
    const short = (n.text || '').length < 24;
    inner = `<div class="gi-text ${short?'short':''}">${escapeHtml(truncate(n.text || '', 90))}</div>`;
  }
  return `<div class="gi" data-id="${n.id}" onclick="openDetail('${n.id}')">${inner}${fromShelf}${newDot}</div>`;
}

function reorderNotes(fromId, toId){
  if (fromId === toId) return;
  const fromIdx = S.notes.findIndex(n => String(n.id) === fromId);
  const toIdx = S.notes.findIndex(n => String(n.id) === toId);
  if (fromIdx < 0 || toIdx < 0) return;
  const [item] = S.notes.splice(fromIdx, 1);
  S.notes.splice(toIdx, 0, item);
  saveState();
  renderGrid();
}

// ─── Feed Render (リール風) ───
function renderFeed(){
  const sc = document.getElementById('feed-scroller');
  const list = S.notes.filter(matchesSearch);
  if (list.length === 0) {
    sc.innerHTML = `<div class="feed-empty"><div style="font-size:48px;opacity:0.3;margin-bottom:14px">📥</div>まだ何もありません。<br>右下の <strong style="color:#fff">+</strong> から保存できます。</div>`;
    return;
  }
  sc.innerHTML = list.map((n, idx) => renderFeedItem(n, idx, list.length)).join('');
}

function renderFeedItem(n, idx, total){
  const date = new Date(n.id).toLocaleDateString('ja-JP', { month:'numeric', day:'numeric' });
  let body = '';
  if (n.type === 'photo') {
    body = `<img src="${n.photoData}" alt="">`;
  } else if (n.type === 'list') {
    const rows = n.items.map(it =>
      `<div class="feed-list-row ${it.done?'done':''}"><span>${it.done?'✓':'○'}</span><span>${escapeHtml(it.text)}</span></div>`
    ).join('');
    body = `<div class="feed-list">${rows}</div>`;
  } else {
    body = `<div class="feed-text">${escapeHtml(n.text || '')}</div>`;
  }
  const memo = (n.type === 'photo' && n.memo) ? `<div class="feed-note">${escapeHtml(n.memo)}</div>` : '';
  return `
    <div class="feed-item" data-id="${n.id}">
      <div class="feed-meta">
        <div class="feed-meta-date">${date}</div>
        <div class="feed-meta-count">${idx+1} / ${total}</div>
      </div>
      ${body}
      ${memo}
      <div class="feed-actions">
        <button class="feed-act" onclick="openDetail('${n.id}')" aria-label="開く">

function onPhotoSelected(input, source){
  const file = input.files && input.files[0];
  input.value = ''; // 同じファイル再選択を許可
  if (!file) {
    composeCancel();
    return;
  }
  const reader = new FileReader();
  reader.onload = (e) => {
    compressImage(e.target.result, 1400, 0.82).then(data => {
      if (!S.composing) S.composing = { mode: 'photo', editingId: null };

      document.getElementById('compose-sheet').classList.add('on');
    });
  };
  reader.readAsDataURL(file);
}

function compressImage(dataUrl, maxPx, quality){
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      let { width: w, height: h } = img;
      if (w > maxPx || h > maxPx) {
        const r = Math.min(maxPx / w, maxPx / h);
        w = Math.round(w * r); h = Math.round(h * r);
      }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

// ─── List rows ───
function listAddRow(text, focus, done){
  const wrap = document.getElementById('list-rows');
  const row = document.createElement('div');
  row.className = 'list-row';
  row.draggable = true;
  row.innerHTML = `
    <span class="list-handle" aria-label="並び替え">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </span>
    <button class="list-check ${done?'on':''}" onclick="listToggleCheck(this)">${done?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>':''}</button>
    <input class="list-input ${done?'done':''}" type="text" value="${escapeAttr(text||'')}" placeholder="項目を入力" onkeydown="listOnKey(event, this)">
    <button class="list-del" onclick="listRemoveRow(this)" aria-label="削除">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  `;
  wrap.appendChild(row);
  setupListDnd(row);
  if (focus) setTimeout(() => row.querySelector('.list-input').focus(), 80);
}

function listToggleCheck(btn){
  const on = btn.classList.toggle('on');
  btn.innerHTML = on ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' : '';
  const input = btn.parentElement.querySelector('.list-input');
  input.classList.toggle('done', on);
}

function listOnKey(e, input){
  if (e.key === 'Enter') {
    e.preventDefault();
    listAddRow('', true);
  } else if (e.key === 'Backspace' && input.value === '') {
    const row = input.closest('.list-row');
    const all = document.querySelectorAll('#list-rows .list-row');
    if (all.length > 1) {
      const prev = row.previousElementSibling;
      row.remove();
      if (prev) prev.querySelector('.list-input').focus();
    }
  }
}

function listRemoveRow(btn){
  btn.closest('.list-row').remove();
}

function setupListDnd(row){
  row.addEventListener('dragstart', e => {
    row.classList.add('drag-source');
    e.dataTransfer.effectAllowed = 'move';
    // identify by index at drag time
    const all = [...document.querySelectorAll('#list-rows .list-row')];
    e.dataTransfer.setData('text/plain', String(all.indexOf(row)));
  });
  row.addEventListener('dragend', () => row.classList.remove('drag-source'));
  row.addEventListener('dragover', e => { e.preventDefault(); row.classList.add('drag-over'); });
  row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
  row.addEventListener('drop', e => {
    e.preventDefault();
    row.classList.remove('drag-over');
    const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
    const all = [...document.querySelectorAll('#list-rows .list-row')];
    const toIdx = all.indexOf(row);
    if (isNaN(fromIdx) || fromIdx === toIdx) return;
    const wrap = document.getElementById('list-rows');
    const src = all[fromIdx];
    if (fromIdx < toIdx) wrap.insertBefore(src, row.nextSibling);
    else wrap.insertBefore(src, row);
  });
}

// ─── Compose Save ───
function composeSave(){
  if (!S.composing) return;
  const { mode, editingId } = S.composing;
  let note;
  if (mode === 'photo' || mode === 'library') {
    if (!S.composing.photoData) {
      showToast('写真がありません');
      return;
    }
    note = {
      id: editingId || Date.now(),
      type: 'photo',
      photoData: S.composing.photoData,
      memo: document.getElementById('compose-memo').value.trim(),
      chatHistory: [],
    };
  } else if (mode === 'text') {
    const text = document.getElementById('compose-text').value.trim();
    if (!text) { showToast('メモが空です'); return; }
    note = {
      id: editingId || Date.now(),
      type: 'text',
      text,
      chatHistory: [],
    };
  } else if (mode === 'list') {
    const items = [...document.querySelectorAll('#list-rows .list-row')].map(r => ({
      text: r.querySelector('.list-input').value.trim(),
      done: r.querySelector('.list-check').classList.contains('on'),
    })).filter(it => it.text);
    if (items.length === 0) { showToast('項目を1つ以上入れてください'); return; }
    note = {
      id: editingId || Date.now(),
      type: 'list',
      items,
      chatHistory: [],
    };
  }

  if (editingId) {
    // keep chatHistory and other meta
    const existing = S.notes.find(n => n.id === editingId);
    if (existing) {
      Object.assign(existing, note, { chatHistory: existing.chatHistory || [], fromShelf: existing.fromShelf });
    }
  } else {
    S.notes.unshift(note);
  }
  saveState();
  composeCancel();
  goTo('home');
  showToast(editingId ? '更新しました' : '保存しました');
}

  a.href = url;
  a.download = `snapin-backup-${new Date().toISOString().slice(0,10)}.json`;

function importData(input){
  const file = input.files && input.files[0];
  input.value = '';
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!confirm('読み込むと現在のデータが置き換えられます。続行しますか？')) return;
      if (data.notes) S.notes = data.notes;
      if (data.trash) S.trash = data.trash;
      if (data.subscribedShelves) S.subscribedShelves = data.subscribedShelves;
      if (data.profile) S.profile = { ...S.profile, ...data.profile };
      saveState();
      renderSettings();
      showToast('読み込みました');
    } catch(err) {
      showToast('読み込みに失敗しました');
    }
  };
  reader.readAsText(file);
}

function renderAIBody(n){
  const body = document.getElementById('ai-body');
  // コンテキスト表示
  let ctxLabel;
  if (n.type === 'photo') ctxLabel = '写真について話します' + (n.memo ? `「${truncate(n.memo,20)}」` : '');
  else if (n.type === 'text') ctxLabel = `「${truncate(n.text, 24)}」について`;
  else ctxLabel = `リストについて`;

  let html = `<div class="ai-ctx">${escapeHtml(ctxLabel)}</div>`;
  (n.chatHistory || []).forEach(m => {
    html += `<div class="ai-msg ${m.role==='user'?'user':'ai'}">${escapeHtml(m.content)}</div>`;
  });
  if (!n.chatHistory || n.chatHistory.length === 0) {
    html += `<div class="ai-msg ai">このカードについて、何か聞きたいことはありますか？</div>`;
  }
  body.innerHTML = html;
  body.scrollTop = body.scrollHeight;
}
function aiAutoResize(el){
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 96) + 'px';
}
async function aiSend(){
  const input = document.getElementById('ai-input');
  const msg = input.value.trim();
  if (!msg) return;
  const n = S.notes.find(x => x.id === S.currentDetailId);
  if (!n) return;
  if (!n.chatHistory) n.chatHistory = [];
  n.chatHistory.push({ role:'user', content: msg });
  input.value = '';
  aiAutoResize(input);
  renderAIBody(n);

  // Thinking indicator
  const body = document.getElementById('ai-body');
  const thinking = document.createElement('div');
  thinking.className = 'ai-msg ai thinking';
  thinking.textContent = '考え中…';
  body.appendChild(thinking);
  body.scrollTop = body.scrollHeight;

  // MVPでは実APIに繋がない（プレースホルダ）。
  // 将来：fetch('/api/claude', { method:'POST', body: JSON.stringify({ note: n, history: n.chatHistory }) })
  await new Promise(r => setTimeout(r, 600));
  thinking.remove();
  const reply = mockAIReply(n, msg);
  n.chatHistory.push({ role:'assistant', content: reply });
  saveState();
  renderAIBody(n);
}
function mockAIReply(note, userMsg){
  // 実運用ではここを Anthropic API（/api/claude）に置き換える
  if (note.type === 'photo') {
    return `（MVPデモ）写真を見て「${truncate(userMsg,30)}」に答えるには、Anthropic API への接続が必要です。実装時はこのカードの photoData と memo を context として送信してください。`;
  } else if (note.type === 'list') {
    return `（MVPデモ）リスト ${note.items.length} 項目を踏まえて「${truncate(userMsg,30)}」に回答する箇所です。`;
  } else {
    return `（MVPデモ）メモ「${truncate(note.text, 24)}」に対して「${truncate(userMsg,30)}」に答える箇所です。実装時に Anthropic API へつないでください。`;
  }
}

// ─── Utilities ───
function escapeHtml(s){
  return String(s || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function escapeAttr(s){
  return String(s || '').replace(/"/g, '&quot;').replace(/&/g, '&amp;');
}
function truncate(s, n){
  s = String(s || '');
  return s.length > n ? s.slice(0, n) + '…' : s;
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  clearTimeout(showToast._tid);
  showToast._tid = setTimeout(() => t.classList.remove('on'), 1800);
}
