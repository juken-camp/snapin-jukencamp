// ═══ UPLOAD/EDIT ═══
function renderUpload(){
  const c=state.current;
  if(!c){back();return;}
  const body=$('up-body');
  $('up-title').textContent=c._new?'新しい保存':'編集';
  body.innerHTML='';

  if(c.type==='photo' || c.type==='photonote'){
    const wrap=document.createElement('div');
    wrap.className='up-photo';
    if(c.image)wrap.innerHTML=`<img src="${c.image}">`;
    const change=document.createElement('button');
    change.className='change';
    change.textContent='写真を変える';
    change.addEventListener('click',()=>{
      state.photoMode=c.type;
      $('file-input').click();
    });
    wrap.appendChild(change);
    body.appendChild(wrap);

    // 写真+メモ なら textarea
    const ta=document.createElement('textarea');
    ta.className='up-text';
    ta.placeholder='一言メモ (任意)';
    ta.value=c.text||'';
    ta.addEventListener('input',e=>{
      state.current.text=e.target.value;
      // テキストが入ったら自動的に photonote 扱いに
      if(e.target.value.trim() && state.current.type==='photo'){
        state.current.type='photonote';
      }
    });
    body.appendChild(ta);
  }else if(c.type==='note'){
    const ta=document.createElement('textarea');
    ta.className='up-text';
    ta.id='up-note-area';
    ta.placeholder='メモを書く…';
    ta.style.minHeight='240px';
    ta.style.padding='20px';
    ta.style.borderRadius='12px';
    ta.style.lineHeight='1.5';
    const applyStyle=()=>{
      const col=colorById(c.color);
      ta.style.background=col.bg;
      ta.style.color=col.fg;
      const fz=autoFontSizeDetail(ta.value);
      ta.style.fontSize=fz+'px';
      ta.style.textAlign=fz>=24?'center':'left';
    };
    ta.value=c.text||'';
    applyStyle();
    ta.addEventListener('input',e=>{
      state.current.text=e.target.value;
      applyStyle();
    });
    body.appendChild(ta);

    // 色選択ボタン (横スクロール)
    const colorRow=document.createElement('div');
    colorRow.style.cssText='display:flex;gap:8px;overflow-x:auto;padding:14px 0 4px;scrollbar-width:none;';
    CARD_COLORS.forEach(col=>{
      const sw=document.createElement('button');
      sw.style.cssText=`flex-shrink:0;width:38px;height:38px;border-radius:50%;background:${col.bg};color:${col.fg};font-size:11px;font-weight:600;border:2px solid ${(c.color||'default')===col.id?'var(--g)':'transparent'};display:flex;align-items:center;justify-content:center;`;
      sw.textContent=col.name;
      sw.addEventListener('click',()=>{
        state.current.color=col.id;
        renderUpload();
        setTimeout(()=>{
          const t=$('up-note-area');
          if(t)t.focus();
        },50);
      });
      colorRow.appendChild(sw);
    });
    body.appendChild(colorRow);
  }else if(c.type==='list'){
    const titleInp=document.createElement('input');
    titleInp.className='up-text title';
    titleInp.placeholder='リストのタイトル (任意)';
    titleInp.value=c.title||'';
    titleInp.addEventListener('input',e=>{state.current.title=e.target.value;});
    body.appendChild(titleInp);

    const itemsWrap=document.createElement('div');
    itemsWrap.id='cl-items';
    body.appendChild(itemsWrap);
    renderListItems(itemsWrap);

    const addBtn=document.createElement('button');
    addBtn.className='cl-add';
    addBtn.innerHTML=`<div class="plus"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg></div>項目を追加`;
    addBtn.addEventListener('click',()=>{
      state.current.items.push({t:'',d:false});
      renderListItems(itemsWrap);
      setTimeout(()=>{
        const inps=itemsWrap.querySelectorAll('.cl-input');
        if(inps.length)inps[inps.length-1].focus();
      },50);
    });
    body.appendChild(addBtn);
  }
}

function renderListItems(wrap){
  wrap.innerHTML='';
  state.current.items.forEach((it,i)=>{
    const row=document.createElement('div');
    row.className='cl-row';
    row.dataset.i=i;

    const handle=document.createElement('div');
    handle.className='cl-handle';
    handle.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="5" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="19" r="1"/></svg>`;
    row.appendChild(handle);

    const chk=document.createElement('button');
    chk.className='cl-chk'+(it.d?' on':'');
    if(it.d)chk.innerHTML=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m5 13 4 4L19 7"/></svg>`;
    chk.addEventListener('click',()=>{
      state.current.items[i].d=!state.current.items[i].d;
      renderListItems(wrap);
    });
    row.appendChild(chk);

    const inp=document.createElement('input');
    inp.className='cl-input'+(it.d?' done':'');
    inp.value=it.t;
    inp.placeholder='項目';
    inp.addEventListener('input',e=>{state.current.items[i].t=e.target.value;});
    inp.addEventListener('keydown',e=>{
      if(e.key==='Enter'){
        e.preventDefault();
        state.current.items.push({t:'',d:false});
        renderListItems(wrap);
        setTimeout(()=>{
          const inps=wrap.querySelectorAll('.cl-input');
          if(inps.length)inps[inps.length-1].focus();
        },50);
      }
    });
    row.appendChild(inp);

    const del=document.createElement('button');
    del.className='cl-del';
    del.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>`;
    del.addEventListener('click',()=>{
      state.current.items.splice(i,1);
      if(state.current.items.length===0)state.current.items=[{t:'',d:false}];
      renderListItems(wrap);
    });
    row.appendChild(del);

    wrap.appendChild(row);
  });
}

function saveCard(){
  const c=state.current;
  if(!c){toast('エラー');return;}
  if((c.type==='photo' || c.type==='photonote') && !c.image){toast('写真がありません');return;}
  if(c.type==='note' && !(c.text && c.text.trim())){toast('メモが空です');return;}
  if(c.type==='list'){
    c.items=(c.items||[]).filter(i=>i.t.trim()!=='');
    if(c.items.length===0){toast('項目を入れてください');return;}
  }
  if(c._new){
    c.created=Date.now();
    c.stage=0;
    c.lastReview=null;
    c.reviewCount=0;
  }
  delete c._new;

  const idx=state.cards.findIndex(x=>x.id===c.id);
  if(idx>=0)state.cards[idx]=c;
  else state.cards.unshift(c);
  save();
  toast('保存しました');
  state.current=null;
  while(state.navStack.length>1 && state.navStack[state.navStack.length-1]==='screen-upload'){
    state.navStack.pop();
  }
  const prev=state.navStack[state.navStack.length-1]||'screen-home';
  goto(prev,false);
}

function cancelUpload(){
  state.current=null;
  back();
}

// ═══ DETAIL ═══
let detailViewStart=0;
function openDetail(c,origin){
  state.current=Object.assign({},c,{_origin:origin});
  state.detailAiMode=false;
  const isOfficial=origin==='official';

  $('detail-img').classList.add('hide');

  let metaHtml=`<span>${fmtDate(c.date)}</span>`;
  if(isOfficial && state.currentOfficial){
    metaHtml=`<span class="src">${esc(state.currentOfficial.handle)}</span>`+metaHtml;
  }
  if(!isOfficial && c.type!=='list'){
    const stage=c.stage||0;
    const labels=['新規','学習中','学習中','定着中','定着中','ほぼ習得','習得済'];
    metaHtml+=`<span style="margin-left:auto;color:var(--g);font-size:11px;font-family:var(--font-jp);">${labels[stage]||''}</span>`;
  }
  $('detail-meta').innerHTML=metaHtml;

  let contentHtml='';
  if(c.image){
    $('detail-img').classList.remove('hide');
    $('detail-img').innerHTML=`<img src="${c.image}" alt="">`;
  }
  if(c.type==='note' || ((c.type==='photo'||c.type==='photonote') && c.text)){
    if(c.type==='note'){
      const col=colorById(c.color);
      const fz=autoFontSizeDetail(c.text||'');
      const isShort=fz>=24;
      const style=`background:${col.bg};color:${col.fg};font-size:${fz}px;padding:${isShort?'40px 24px':'24px 20px'};border-radius:12px;line-height:1.5;${isShort?'text-align:center;':''}`;
      contentHtml=`<div class="detail-text" style="${style}">${esc(c.text||'')}</div>`;
    }else{
      contentHtml=`<div class="detail-text">${esc(c.text||'')}</div>`;
    }
  }else if(c.type==='list'){
    const title=c.title?`<div style="font-size:17px;font-weight:600;margin-bottom:14px;">${esc(c.title)}</div>`:'';
    contentHtml=title+(c.items||[]).map((i,idx)=>`
      <div class="detail-list-item ${i.d?'done':''}" data-list-idx="${idx}">
        <div class="chk">${i.d?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m5 13 4 4L19 7"/></svg>':''}</div>
        <span>${esc(i.t)}</span>
      </div>
    `).join('');
  }

  // 公式コピーボタン (公式棚カード時のみ表示)
  if(isOfficial){
    contentHtml+=`<button class="login-card" style="margin-top:18px;background:var(--gl);" data-action="copy-to-shelf">
      <div class="login-card-title" style="color:var(--gd);">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        自分の棚にコピー
      </div>
    </button>`;
  }

  $('detail-content').innerHTML=contentHtml;
  $('detail-chat-log').innerHTML='';

  // 過去のAI会話を復元
  if(c.aiLog && c.aiLog.length>0){
    const log=$('detail-chat-log');
    c.aiLog.forEach(m=>{
      const div=document.createElement('div');
      div.className='msg '+(m.role==='user'?'u':'a');
      div.innerHTML=`<div class="bubble">${esc(m.text)}</div>`;
      log.appendChild(div);
    });
  }

  // リスト項目クリック (自分の棚のみ)
  if(!isOfficial){
    $('detail-content').querySelectorAll('.detail-list-item').forEach(el=>{
      el.addEventListener('click',()=>{
        const idx=parseInt(el.dataset.listIdx);
        state.current.items[idx].d=!state.current.items[idx].d;
        const i=state.cards.findIndex(x=>x.id===state.current.id);
        if(i>=0){
          state.cards[i].items=state.current.items;
          save();
        }
        openDetail(state.cards[i],'mine');
      });
    });
  }

  // 入力バーの状態リセット
  $('detail-input').value='';
  $('detail-input').placeholder=isOfficial?'(公式カードはコピー後に編集できます)':'メモを書く…';
  $('detail-input').style.height='auto';
  $('detail-ai-toggle').classList.remove('on');
  $('detail-input-send').style.background='var(--g)';

  // 公式カードでは入力バー非表示
  $('detail-input-bar').style.display=isOfficial?'none':'';

  // 接触記録 (滞在時間)
  detailViewStart=Date.now();

  goto('screen-detail');
}

// 詳細画面を離れた時、滞在時間が3秒以上なら静かに stage を進める
function recordViewExit(){
  if(!state.current || state.current._origin==='official' || detailViewStart===0)return;
  const elapsed=Date.now()-detailViewStart;
  detailViewStart=0;
  if(elapsed<3000)return;
  const c=state.cards.find(x=>x.id===state.current.id);
  if(!c)return;
  // 3秒以上見たカードは「軽い接触」として復習スケジュールを少し進める
  c.lastReview=Date.now();
  c.reviewCount=(c.reviewCount||0)+1;
  save();
}

function toggleAiMode(){
  state.detailAiMode=!state.detailAiMode;
  $('detail-ai-toggle').classList.toggle('on',state.detailAiMode);
  const inp=$('detail-input');
  inp.placeholder=state.detailAiMode?'AIに質問して送信…':'メモを書く…';
  // 送信ボタンの色も変える
  $('detail-input-send').style.background=state.detailAiMode?'var(--sky)':'var(--g)';
  inp.focus();
  if(state.detailAiMode){
    toast('AIモード: 質問を書いて送ると AI に聞きます');
  }
}

function detailSend(){
  const inp=$('detail-input');
  const v=inp.value.trim();
  if(!v)return;
  const cIdx=state.cards.findIndex(x=>x.id===state.current.id);
  if(cIdx<0)return;
  const c=state.cards[cIdx];

  if(state.detailAiMode){
    // AIに質問
    if(!c.aiLog)c.aiLog=[];
    c.aiLog.push({role:'user',text:v,t:Date.now()});
    save();

    const log=$('detail-chat-log');
    const uMsg=document.createElement('div');
    uMsg.className='msg u';
    uMsg.innerHTML=`<div class="bubble">${esc(v)}</div>`;
    log.appendChild(uMsg);
    inp.value='';
    inp.style.height='auto';

    // AIの返答 (デモ)
    const aMsg=document.createElement('div');
    aMsg.className='msg a';
    aMsg.innerHTML=`<div class="bubble">…考えています</div>`;
    log.appendChild(aMsg);
    $('detail-scroll').scrollTop=$('detail-scroll').scrollHeight;
    setTimeout(()=>{
      const answer=demoAI(v,c);
      aMsg.querySelector('.bubble').textContent=answer;
      // 永続化
      const cIdx2=state.cards.findIndex(x=>x.id===state.current.id);
      if(cIdx2>=0){
        if(!state.cards[cIdx2].aiLog)state.cards[cIdx2].aiLog=[];
        state.cards[cIdx2].aiLog.push({role:'assistant',text:answer,t:Date.now()});
        save();
      }
      $('detail-scroll').scrollTop=$('detail-scroll').scrollHeight;
    },800);
  }else{
    // メモとしてカードに追記
    const prev=c.text||'';
    c.text=prev?prev+'\n'+v:v;
    state.current.text=c.text;
    save();
    inp.value='';
    inp.style.height='auto';
    // テキスト部分を更新
    const detailText=$('detail-content').querySelector('.detail-text');
    if(detailText){
      detailText.textContent=c.text;
      // 自動サイズ再計算
      if(c.type==='note'){
        const fz=autoFontSizeDetail(c.text);
        detailText.style.fontSize=fz+'px';
        detailText.style.textAlign=fz>=24?'center':'left';
      }
    }else{
      // 写真のみだった場合、再描画
      openDetail(c,'mine');
    }
    toast('追記しました');
  }
}

function demoAI(q,ref){
  let prefix='';
  if(ref){
    if(ref.type==='note')prefix='メモを見ました。';
    else if(ref.image)prefix='写真を見ました。';
    else if(ref.type==='list')prefix='リストを見ました。';
  }
  return prefix+'「'+q+'」についてですね。\n\n(デモ応答です。本番ではAnthropic APIを使い、保存したカードを文脈にした回答を返します。)';
}

function editCard(){
  $('detail-menu').classList.remove('on');
  if(state.current._origin==='official'){toast('公式カードは編集できません');return;}
  const c=Object.assign({},state.current);
  delete c._origin;
  c._new=false;
  state.current=c;
  renderUpload();
  goto('screen-upload');
}

function deleteCard(){
  $('detail-menu').classList.remove('on');
  if(state.current._origin==='official'){toast('公式カードは削除できません');return;}
  if(!confirm('このカードを削除しますか?'))return;
  state.cards=state.cards.filter(x=>x.id!==state.current.id);
  save();
  toast('削除しました');
  back();
}

// カラーピッカー
function openColorPicker(){
  $('detail-menu').classList.remove('on');
  if(!state.current || state.current._origin==='official'){
    toast('公式カードは色を変えられません');
    return;
  }
  const picker=$('color-picker');
  picker.innerHTML='';
  const curColor=state.current.color||'default';
  CARD_COLORS.forEach(c=>{
    const sw=document.createElement('button');
    sw.className='color-swatch'+(c.id===curColor?' selected':'');
    sw.style.background=c.bg;
    sw.style.color=c.fg;
    sw.textContent=c.name;
    sw.addEventListener('click',()=>{
      const idx=state.cards.findIndex(x=>x.id===state.current.id);
      if(idx<0)return;
      state.cards[idx].color=c.id;
      state.current.color=c.id;
      save();
      closeColorPicker();
      openDetail(state.cards[idx],'mine');
    });
    picker.appendChild(sw);
  });
  $('color-mask').classList.add('on');
  $('color-sheet').classList.add('on');
}

function closeColorPicker(){
  $('color-mask').classList.remove('on');
  $('color-sheet').classList.remove('on');
}

function copyToShelf(){
  const c=Object.assign({},state.current);
  delete c._origin;
  c.id='c_'+Date.now();
  c.date=new Date().toISOString().slice(0,10);
  c.created=Date.now();
  c.stage=0;
  c.lastReview=null;
  c.reviewCount=0;
  state.cards.unshift(c);
  save();
  toast('自分の棚にコピーしました');
}

// ═══ LIBRARY ═══
function renderLibrary(){
  const subbed=OFFICIAL_SHELVES.filter(s=>state.subscribed.includes(s.id));
  const avail=OFFICIAL_SHELVES.filter(s=>!state.subscribed.includes(s.id));

  const subList=$('lib-subscribed');
  const availList=$('lib-available');

  subList.innerHTML='';
  if(subbed.length>0){
    const h=document.createElement('div');
    h.className='lib-section';
    h.textContent='登録中';
    subList.appendChild(h);
    subbed.forEach(s=>subList.appendChild(libItem(s,true)));
  }
  availList.innerHTML='';
  avail.forEach(s=>availList.appendChild(libItem(s,false)));
}

function libItem(s,subbed){
  const el=document.createElement('div');
  el.className='lib-item';
  el.innerHTML=`
    <div class="lib-avatar">${esc(s.name.slice(0,1))}</div>
    <div class="lib-info">
      <div class="lib-name">${esc(s.name)}</div>
      <div class="lib-handle">${esc(s.handle)}</div>
    </div>
    <button class="lib-action ${subbed?'subbed':''}">${subbed?'登録中':'登録'}</button>
  `;
  el.addEventListener('click',e=>{
    if(e.target.closest('.lib-action'))return;
    openOfficial(s);
  });
  el.querySelector('.lib-action').addEventListener('click',e=>{
    e.stopPropagation();
    toggleSubById(s.id);
  });
  return el;
}

function toggleSubById(id){
  const i=state.subscribed.indexOf(id);
  if(i>=0)state.subscribed.splice(i,1);
  else state.subscribed.push(id);
  save();
  renderLibrary();
  if(state.currentOfficial && state.currentOfficial.id===id)updateOfficialSubBtn();
  toast(i>=0?'解除しました':'登録しました');
}

function openOfficial(s){
  state.currentOfficial=s;
  $('os-name').textContent=s.name;
  $('os-handle').textContent=s.handle;
  $('os-desc').textContent=s.desc;
  $('os-count').textContent=s.cards.length;
  updateOfficialSubBtn();
  renderGrid($('off-grid'),s.cards,'official');
  goto('screen-official');
}

function updateOfficialSubBtn(){
  if(!state.currentOfficial)return;
  const subbed=state.subscribed.includes(state.currentOfficial.id);
  const btn=$('os-sub');
  btn.textContent=subbed?'登録中':'登録';
  btn.classList.toggle('on',subbed);
}

// ═══ SEARCH ═══
function setScope(s){
  state.searchScope=s;
  document.querySelectorAll('.scope-chip').forEach(c=>c.classList.toggle('on',c.dataset.scope===s));
  doSearch();
}

function doSearch(){
  const q=$('search-q').value.trim().toLowerCase();
  const out=$('search-results');
  if(!q){out.innerHTML='';return;}
  const scope=state.searchScope;
  let results=[];

  if(scope==='all'||scope==='mine'||scope==='photo'||scope==='note'||scope==='list'){
    state.cards.forEach(c=>{
      if(scope==='photo' && c.type!=='photo' && c.type!=='photonote')return;
      if(scope==='note' && c.type!=='note')return;
      if(scope==='list' && c.type!=='list')return;
      const hay=(c.text||'')+' '+(c.title||'')+' '+((c.items||[]).map(i=>i.t).join(' '));
      if(hay.toLowerCase().includes(q))results.push({card:c,origin:'mine'});
    });
  }
  if(scope==='all'||scope==='official'){
    OFFICIAL_SHELVES.forEach(s=>{
      if((s.name+' '+s.handle+' '+s.desc).toLowerCase().includes(q))results.push({shelf:s});
      if(state.subscribed.includes(s.id)){
        s.cards.forEach(c=>{
          const hay=(c.text||'')+' '+(c.title||'')+' '+((c.items||[]).map(i=>i.t).join(' '));
          if(hay.toLowerCase().includes(q))results.push({card:c,origin:'official',shelf:s});
        });
      }
    });
  }

  if(results.length===0){
    out.innerHTML=`<div class="search-empty">該当なし</div>`;
    return;
  }

  out.innerHTML='';
  results.filter(r=>r.shelf && !r.card).forEach(r=>{
    out.appendChild(libItem(r.shelf,state.subscribed.includes(r.shelf.id)));
  });
  const cardHits=results.filter(r=>r.card);
  if(cardHits.length){
    const grid=document.createElement('div');
    grid.className='grid';
    out.appendChild(grid);
    cardHits.forEach(r=>{
      const c=r.card;
      const card=document.createElement('div');
      card.className='card '+c.type;
      let inner='';
      if(c.type==='photo'||c.type==='photonote')inner=`<img src="${c.image||''}">`;
      else if(c.type==='note')inner=`<div class="ctxt">${esc(c.text||'')}</div>`;
      else if(c.type==='list'){
        const items=(c.items||[]).slice(0,4).map(i=>`<div class="li ${i.d?'done':''}"><div class="chk"></div><span>${esc(i.t)}</span></div>`).join('');
        inner=`<div class="ctxt">${c.title?`<div style="font-weight:600;font-size:11px;margin-bottom:4px;">${esc(c.title)}</div>`:''}${items}</div>`;
      }
      if(r.origin==='official')inner+=`<div class="card-source">${esc(r.shelf.handle)}</div>`;
      card.innerHTML=inner;
      card.addEventListener('click',()=>{
        if(r.origin==='official')state.currentOfficial=r.shelf;
        openDetail(c,r.origin);
      });
      grid.appendChild(card);
    });
  }
}

// ═══ SPACED REPETITION ═══
const REVIEW_INTERVALS=[1,3,7,14,30,60];

function getDueCards(){
  const now=Date.now();
  const DAY=86400000;
  return state.cards.filter(c=>{
    if(c.type==='list')return false;
    if(!c.text && !c.image)return false;
    const stage=c.stage||0;
    if(stage>=REVIEW_INTERVALS.length)return false;
    const last=c.lastReview||c.created||now;
    const interval=REVIEW_INTERVALS[stage]*DAY;
    return (now-last)>=interval;
  }).sort((a,b)=>(a.stage||0)-(b.stage||0));
}

function applyReviewGrade(card,grade){
  const idx=state.cards.findIndex(c=>c.id===card.id);
  if(idx<0)return;
  const c=state.cards[idx];
  const stage=c.stage||0;
  if(grade==='again'){
    c.stage=Math.max(0,stage-1);
  }else if(grade==='good'){
    c.stage=Math.min(REVIEW_INTERVALS.length,stage+1);
  }
  c.lastReview=Date.now();
  c.reviewCount=(c.reviewCount||0)+1;
  save();
}

// ═══ REVIEW MODE ═══
let revQueue=[];
let revIndex=0;
let revRevealed=false;

function startReview(){
  revQueue=getDueCards();
  if(revQueue.length===0){toast('見返すカードはありません');return;}
  revIndex=0;
  revRevealed=false;
  goto('screen-review');
  renderReviewCard();
}

function closeReview(){
  back();
  setTimeout(()=>renderHome(),50);
}

function renderReviewCard(){
  const stage=$('rev-stage');
  if(revIndex>=revQueue.length){
    stage.innerHTML=`
      <div class="review-done">
        <div class="review-done-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>
        </div>
        <h2>おつかれさま</h2>
        <button class="review-reveal" style="margin-top:24px;" id="rev-close-btn">棚に戻る</button>
      </div>
    `;
    $('rev-progress').style.width='100%';
    $('rev-close-btn').addEventListener('click',closeReview);
    return;
  }

  const c=revQueue[revIndex];
  $('rev-cur').textContent=revIndex+1;
  $('rev-total').textContent=revQueue.length;
  $('rev-progress').style.width=((revIndex/revQueue.length)*100)+'%';

  const hasImage=!!c.image;
  const hasText=!!c.text;

  if(!revRevealed){
    let cardHtml='';
    let prompt='';
    if(hasImage && hasText){
      prompt='思い出せますか?';
      cardHtml=`<img src="${c.image}">`;
    }else if(hasImage){
      prompt='なぜ保存したか思い出せますか?';
      cardHtml=`<img src="${c.image}">`;
    }else{
      prompt='読んで、要約を思い浮かべて';
      cardHtml=`<div class="rv-text">${esc(c.text)}</div>`;
    }
    stage.innerHTML=`
      <div class="review-prompt">${prompt}</div>
      <div class="review-card">${cardHtml}</div>
      <button class="review-reveal" id="rev-reveal-btn">${hasImage&&hasText?'答えを見る':'次へ'}</button>
    `;
    $('rev-reveal-btn').addEventListener('click',()=>{revRevealed=true;renderReviewCard();});
  }else{
    let html='<div style="display:flex;flex-direction:column;align-items:center;width:100%;max-width:340px;">';
    if(hasImage)html+=`<img src="${c.image}" style="max-height:25vh;border-radius:8px;margin-bottom:14px;object-fit:contain;">`;
    if(hasText)html+=`<div class="review-answer">${esc(c.text)}</div>`;
    else if(!hasImage)html+=`<div class="review-answer">(メモなし)</div>`;
    html+='</div>';
    stage.innerHTML=`
      <div class="review-prompt">思い出せましたか?</div>
      ${html}
      <div class="review-actions">
        <button class="review-btn again" data-grade="again">もう一度</button>
        <button class="review-btn good" data-grade="good">覚えた</button>
      </div>
    `;
    stage.querySelectorAll('[data-grade]').forEach(b=>{
      b.addEventListener('click',()=>{
        applyReviewGrade(revQueue[revIndex],b.dataset.grade);
        revIndex++;
        revRevealed=false;
        renderReviewCard();
      });
    });
  }
}

// ═══ UTILS ═══
function esc(s){
  if(s==null)return '';
  return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtDate(d){return d?d.replace(/-/g,'.'):'';}
let toastT=null;
function toast(msg){
  const t=$('toast');
  t.textContent=msg;
  t.classList.add('on');
  clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove('on'),1800);
}

function setView(v){
  state.view=v;
  $('vt-grid').classList.toggle('on',v==='grid');
  $('vt-reel').classList.toggle('on',v==='reel');
  renderHome();
}

function toggleEditMode(){
  state.editMode=!state.editMode;
  renderHome();
}
function toggleMosaic(){
  state.mosaicMode=!state.mosaicMode;
  renderHome();
}

// ═══ EVENT DELEGATION ═══
document.addEventListener('click',e=>{
  const t=e.target.closest('[data-action]');
  if(!t)return;
  const a=t.dataset.action;

  // 詳細画面を離れる前に滞在時間を記録
  const isLeavingDetail=['back','nav-home','nav-library','nav-search','close-review','toggle-menu','edit-card','delete-card'].indexOf(a)>=0;
  if(isLeavingDetail && document.getElementById('screen-detail').classList.contains('active')){
    if(a!=='toggle-menu')recordViewExit();
  }

  switch(a){
    case 'login-personal':login('personal');break;
    case 'login-official':login('official');break;
    case 'logout-confirm':logoutConfirm();break;
    case 'nav-home':goto('screen-home');break;
    case 'nav-today':goto('screen-today');break;
    case 'nav-library':goto('screen-library');break;
    case 'nav-search':goto('screen-search');break;
    case 'back':back();break;
    case 'open-add':openAddSheet();break;
    case 'close-add':closeAddSheet();break;
    case 'create-photo':startCreate('photo');break;
    case 'create-note':startCreate('note');break;
    case 'create-photonote':startCreate('photonote');break;
    case 'create-list':startCreate('list');break;
    case 'save-card':saveCard();break;
    case 'cancel-upload':cancelUpload();break;
    case 'goto-search':goto('screen-search');break;
    case 'view-grid':setView('grid');break;
    case 'view-reel':setView('reel');break;
    case 'toggle-edit':toggleEditMode();break;
    case 'toggle-mosaic':toggleMosaic();break;
    case 'start-review':startReview();break;
    case 'close-review':closeReview();break;
    case 'toggle-menu':$('detail-menu').classList.toggle('on');e.stopPropagation();break;
    case 'edit-card':editCard();break;
    case 'delete-card':deleteCard();break;
    case 'copy-to-shelf':copyToShelf();break;
    case 'open-color-picker':openColorPicker();break;
    case 'close-color':closeColorPicker();break;
    case 'toggle-sub':if(state.currentOfficial)toggleSubById(state.currentOfficial.id);break;
    case 'toggle-ai-mode':toggleAiMode();break;
    case 'detail-send':detailSend();break;
    case 'quick-photo':quickPhoto();break;
    case 'quick-list':quickList();break;
    case 'quick-save':quickSave();break;
  }
});

document.addEventListener('click',e=>{
  if(!e.target.closest('.menu')&&!e.target.closest('[data-action="toggle-menu"]')){
    const m=$('detail-menu');
    if(m)m.classList.remove('on');
  }
});

document.addEventListener('click',e=>{
  const c=e.target.closest('.scope-chip');
  if(!c)return;
  setScope(c.dataset.scope);
});

// 入力ハンドラ
$('search-q').addEventListener('input',doSearch);

$('quick-input').addEventListener('input',onQuickInput);
$('quick-input').addEventListener('keydown',e=>{
  if(e.key==='Enter' && !e.shiftKey){
    e.preventDefault();
    quickSave();
  }
});

$('detail-input').addEventListener('input',e=>{
  e.target.style.height='auto';
  e.target.style.height=Math.min(120,e.target.scrollHeight)+'px';
});
$('detail-input').addEventListener('keydown',e=>{
  if(e.key==='Enter' && !e.shiftKey && (e.metaKey || e.ctrlKey)){
    // Cmd/Ctrl+Enter で送信
    e.preventDefault();
    detailSend();
  }
});

$('file-input').addEventListener('change',onFilePick);

// 起動
setupNavs();
if(load() && state.user){
  state.navStack=['screen-home'];
  goto('screen-home',false);
}else{
  goto('screen-login',false);
}

})();
