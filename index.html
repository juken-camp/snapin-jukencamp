<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SnapIn</title>
<meta name="theme-color" content="#1D9E75">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SnapIn">
<style>
:root{
  --g:#1D9E75; --gl:#E8F5EF; --gd:#0F6E56;
  --bg:#FAFAF7; --surface:#FFFFFF;
  --ink:#1A1A1A; --ink2:#5C5C5C; --ink3:#9A9A9A;
  --line:rgba(0,0,0,.08); --line2:rgba(0,0,0,.14);
  --amber:#E8A33D; --rose:#D6604D; --sky:#3F7FB8;
  --font-jp:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic Medium",sans-serif;
  --font-en:"Charter","Iowan Old Style","Georgia",serif;
  --shadow:0 1px 2px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.04);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#000;font-family:var(--font-jp);color:var(--ink);overscroll-behavior:none;-webkit-font-smoothing:antialiased;}
button{font-family:inherit;background:none;border:none;cursor:pointer;color:inherit;font-size:inherit;}
input,textarea{font-family:inherit;border:none;outline:none;background:none;color:inherit;}

.app{
  max-width:430px;
  margin:0 auto;
  height:100dvh;
  display:flex;
  flex-direction:column;
  background:var(--bg);
  position:relative;
  overflow:hidden;
  box-shadow:0 0 60px rgba(0,0,0,.15);
}

.screen{display:none;flex-direction:column;flex:1;overflow:hidden;min-height:0;}
.screen.active{display:flex;}

/* HEADER */
.hdr{
  padding:0 14px;
  height:54px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:var(--surface);
  border-bottom:0.5px solid var(--line);
  flex-shrink:0;
}
.hdr-title{font-size:17px;font-weight:600;}
.logo{
  font-family:var(--font-en);
  font-size:24px;
  font-weight:600;
  letter-spacing:-0.02em;
}
.logo em{color:var(--g);font-style:italic;}
.hdr-icons{display:flex;gap:4px;color:var(--ink2);align-items:center;}
.hdr-icons button{
  width:38px;height:38px;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;
  transition:all .15s;
}
.hdr-icons button:active{color:var(--g);transform:scale(0.92);}
.hdr-icons button.on{color:var(--g);background:var(--gl);}

/* 戻るヘッダー */
.bhdr{
  padding:0 8px;
  height:52px;
  display:flex;
  align-items:center;
  gap:4px;
  background:var(--surface);
  border-bottom:0.5px solid var(--line);
  flex-shrink:0;
}
.bhdr-back{padding:10px;color:var(--ink2);display:flex;align-items:center;}
.bhdr-back:active{color:var(--g);}
.bhdr-title{font-size:15px;font-weight:600;flex:1;}
.bhdr-action{
  font-size:14px;
  color:var(--g);
  font-weight:600;
  padding:10px 14px;
  border-radius:8px;
  transition:background .1s;
}
.bhdr-action:active{
  background:var(--gl);
  transform:scale(0.96);
}

/* BOTTOM NAV (4タブに削減: 棚 / 公式 / + / 探す) */
.bnav{
  display:flex;
  background:var(--surface);
  border-top:0.5px solid var(--line);
  padding:7px 0 max(12px,env(safe-area-inset-bottom));
  flex-shrink:0;
  position:relative;
  z-index:10;
}
.bnav-item{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
  padding:5px 0;
  color:var(--ink3);
  font-size:10px;
}
.bnav-item.on{color:var(--g);}
.bnav-item:active{transform:scale(0.92);}
.bnav-add-wrap{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  margin-top:-22px;
  position:relative;
  z-index:11;
}
.bnav-add{
  width:54px;
  height:54px;
  border-radius:50%;
  background:var(--g);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 4px 14px rgba(29,158,117,.4);
  transition:transform .15s;
  position:relative;
  z-index:12;
}
.bnav-add:active{transform:scale(0.92);}

/* SCROLL */
.scroll{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  min-height:0;
  padding-bottom:24px;
}
.scroll::-webkit-scrollbar{width:6px;}
.scroll::-webkit-scrollbar-thumb{background:var(--line2);border-radius:3px;}

/* HOME TOP */
.home-top{
  background:var(--surface);
  padding:14px 16px 12px;
  border-bottom:0.5px solid var(--line);
}
/* クイック追加: 一行 */
.quick-add{
  display:flex;
  align-items:center;
  gap:8px;
  background:var(--bg);
  border-radius:22px;
  padding:0 6px 0 16px;
  height:42px;
  margin-bottom:10px;
}
.quick-add input{
  flex:1;
  font-size:14px;
  color:var(--ink);
  background:transparent;
  height:100%;
}
.quick-add input::placeholder{color:var(--ink3);}
.quick-add-icons{display:flex;gap:2px;}
.quick-add-icon{
  width:32px;height:32px;
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  color:var(--ink3);
}
.quick-add-icon:active{color:var(--g);background:var(--gl);}
.quick-add-send{
  background:var(--g);
  color:white;
  width:32px;height:32px;
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;
}
.quick-add-send.hide{display:none;}

.home-row{display:flex;gap:8px;align-items:center;}
.search-bar{
  flex:1;
  height:36px;
  background:var(--bg);
  border-radius:18px;
  display:flex;
  align-items:center;
  padding:0 14px;
  gap:8px;
  color:var(--ink3);
  font-size:13px;
}
.view-tog{
  display:flex;
  background:var(--bg);
  border-radius:18px;
  padding:3px;
  gap:2px;
}
.view-tog button{
  width:32px;height:30px;
  border-radius:15px;
  display:flex;align-items:center;justify-content:center;
  color:var(--ink3);
}
.view-tog button.on{background:var(--surface);color:var(--g);box-shadow:0 1px 3px rgba(0,0,0,.08);}

/* 復習ストリップ */
.review-strip{
  background:linear-gradient(135deg,#FFF8E8,#FEF3D6);
  padding:14px 18px;
  border-bottom:0.5px solid var(--line);
  cursor:pointer;
}
.review-strip:active{background:linear-gradient(135deg,#FEF3D6,#FCE9B8);}
.rs-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.rs-title{font-size:13px;font-weight:600;color:#7A5A1F;display:flex;align-items:center;gap:6px;}
.rs-count{font-family:var(--font-en);font-size:13px;color:#A57F2A;font-weight:600;}
.rs-body{display:flex;align-items:center;gap:10px;}
.rs-preview{display:flex;gap:5px;}
.rs-mini{
  width:34px;height:34px;border-radius:6px;background:white;
  overflow:hidden;display:flex;align-items:center;justify-content:center;
  font-size:8px;color:var(--ink2);padding:3px;
  text-align:center;line-height:1.2;
  box-shadow:0 1px 3px rgba(0,0,0,.06);
}
.rs-mini img{width:100%;height:100%;object-fit:cover;}
.rs-cta{margin-left:auto;color:var(--gd);display:flex;align-items:center;}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:2px;
  padding:2px;
}
.card{
  aspect-ratio:1;
  background:var(--surface);
  border-radius:2px;
  overflow:hidden;
  position:relative;
  cursor:pointer;
  transition:transform .12s;
  user-select:none;
  -webkit-user-select:none;
}
.card:active{transform:scale(0.96);}
.card img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;}
.card .ctxt{
  padding:10px;
  font-size:11px;
  line-height:1.5;
  color:var(--ink);
  height:100%;
  overflow:hidden;
  display:-webkit-box;
  -webkit-line-clamp:7;
  -webkit-box-orient:vertical;
  word-break:break-word;
  background:var(--surface);
}
.card.note .ctxt{background:#FFFDF5;}
.card.list .ctxt{background:#F4F8F3;font-size:10px;}
.card .li{display:flex;gap:4px;margin-bottom:3px;align-items:flex-start;}
.card .li .chk{width:9px;height:9px;border:1px solid var(--ink3);border-radius:2px;flex-shrink:0;margin-top:2px;}
.card .li.done .chk{background:var(--g);border-color:var(--g);}
.card .li.done{color:var(--ink3);text-decoration:line-through;}

.card-badge{
  position:absolute;
  top:4px;right:4px;
  width:14px;height:14px;
  background:rgba(255,255,255,.92);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--ink2);
  pointer-events:none;
}
.card-source{
  position:absolute;
  bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,.6));
  color:white;
  font-size:9px;
  padding:14px 6px 4px;
  pointer-events:none;
}
.card-stage{
  position:absolute;
  bottom:4px;right:4px;
  display:flex;gap:1.5px;
  background:rgba(255,255,255,.85);
  padding:2px 4px;
  border-radius:6px;
  pointer-events:none;
}
.card-stage .dot{width:3px;height:3px;border-radius:50%;background:var(--ink3);}
.card-stage .dot.on{background:var(--g);}

/* モザイク */
.card.mosaic .ctxt,
.card.mosaic img{filter:blur(14px) saturate(1.2);}
.card.mosaic::before{
  content:"";
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(29,158,117,.4),rgba(15,110,86,.5));
  pointer-events:none;
  z-index:1;
}
.card.mosaic::after{
  content:"?";
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  color:white;font-size:24px;font-weight:700;
  font-family:var(--font-en);
  text-shadow:0 2px 8px rgba(0,0,0,.3);
  z-index:2;
  pointer-events:none;
}

/* 編集モード */
.grid.editing .card{
  animation:wiggle 0.45s infinite ease-in-out;
  cursor:grab;
  overflow:visible;
}
.grid.editing .card:nth-child(odd){animation-delay:-0.2s;}
@keyframes wiggle{
  0%,100%{transform:rotate(-1deg) scale(0.98);}
  50%{transform:rotate(1deg) scale(0.98);}
}
.grid.editing .card.dragging{animation:none;opacity:0.4;}
.grid.editing .card.drop-here{outline:2px solid var(--g);outline-offset:-2px;}

/* 編集モードの削除ボタン — 最前面に */
.card-del{
  position:absolute;
  top:-7px;left:-7px;
  width:24px;height:24px;
  border-radius:50%;
  background:#1a1a1a;
  color:white;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
  box-shadow:0 2px 6px rgba(0,0,0,.4);
  border:2px solid white;
}
.grid.editing .card-del{display:flex;}

/* 編集モード完了ボタン */
.edit-done{
  position:absolute;
  bottom:80px;
  right:18px;
  z-index:50;
  background:var(--g);
  color:white;
  padding:11px 22px;
  border-radius:24px;
  font-size:13px;
  font-weight:600;
  box-shadow:0 4px 14px rgba(29,158,117,.4);
  display:none;
  align-items:center;
  gap:6px;
}
.edit-done.on{display:flex;animation:fadeInUp 0.2s;}
@keyframes fadeInUp{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:translateY(0);}
}

/* FEED */
.feed{scroll-snap-type:y mandatory;background:#000;overflow-y:auto;}
.feed-item{
  scroll-snap-align:start;
  height:100%;
  width:100%;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}
.feed-item img{max-width:100%;max-height:100%;object-fit:contain;}
.feed-note{
  padding:40px 28px;
  font-size:20px;
  line-height:1.7;
  color:white;
  width:100%;
  background:linear-gradient(135deg,#1a3a2e,#0d2620);
  height:100%;
  display:flex;align-items:center;justify-content:center;
  text-align:center;
  white-space:pre-wrap;
}
.feed-list{
  padding:40px 28px;
  color:white;
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#2a2a1f,#1a1a14);
  display:flex;flex-direction:column;justify-content:center;
}
.feed-list h3{font-size:16px;margin-bottom:18px;color:#E8A33D;font-weight:500;}
.feed-list .li{font-size:17px;padding:10px 0;border-bottom:0.5px solid rgba(255,255,255,.1);display:flex;gap:12px;align-items:center;}
.feed-list .li.done{color:rgba(255,255,255,.4);text-decoration:line-through;}
.feed-list .li .chk{width:16px;height:16px;border:1.5px solid rgba(255,255,255,.5);border-radius:3px;flex-shrink:0;}
.feed-list .li.done .chk{background:var(--g);border-color:var(--g);}
.feed-meta{
  position:absolute;
  bottom:24px;left:18px;right:18px;
  color:rgba(255,255,255,.9);
  font-size:11px;
  font-family:var(--font-en);
  pointer-events:none;
}

/* EMPTY */
.empty{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:40px 30px;
  text-align:center;
  color:var(--ink3);
}
.empty-icon{
  width:72px;height:72px;
  border-radius:36px;
  background:var(--gl);
  display:flex;align-items:center;justify-content:center;
  color:var(--g);
  margin-bottom:16px;
}
.empty-title{font-size:16px;color:var(--ink);font-weight:600;margin-bottom:6px;}
.empty-sub{font-size:13px;line-height:1.6;}

/* ADD SHEET */
.sheet-mask{
  position:absolute;inset:0;
  background:rgba(0,0,0,.4);
  z-index:90;
  opacity:0;pointer-events:none;
  transition:opacity .2s;
}
.sheet-mask.on{opacity:1;pointer-events:auto;}
.sheet{
  position:absolute;
  left:0;right:0;bottom:0;
  background:var(--surface);
  border-radius:18px 18px 0 0;
  z-index:91;
  transform:translateY(100%);
  transition:transform .25s cubic-bezier(.2,.7,.3,1);
  max-height:80%;
  display:flex;
  flex-direction:column;
  padding-bottom:env(safe-area-inset-bottom);
}
.sheet.on{transform:translateY(0);}
.sheet-handle{width:38px;height:4px;background:var(--line2);border-radius:2px;margin:10px auto 0;}
.sheet-title{
  padding:12px 20px 4px;
  font-size:11px;color:var(--ink3);
  letter-spacing:0.1em;
  font-family:var(--font-en);
}
.sheet-options{
  padding:8px 16px 16px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.sheet-opt{
  background:var(--bg);
  border-radius:14px;
  padding:18px 14px;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:8px;
  text-align:left;
}
.sheet-opt:active{background:var(--gl);}
.sheet-opt-icon{
  width:36px;height:36px;
  border-radius:10px;
  background:var(--surface);
  display:flex;align-items:center;justify-content:center;
  color:var(--g);
}
.sheet-opt-title{font-size:14px;font-weight:600;color:var(--ink);}
.sheet-opt-desc{font-size:11px;color:var(--ink3);line-height:1.4;}

/* UPLOAD / EDIT */
.upload-body{
  flex:1;
  overflow-y:auto;
  padding:14px 18px 24px;
}
.up-photo{
  width:100%;
  aspect-ratio:1;
  background:var(--bg);
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  color:var(--ink3);
  margin-bottom:14px;
  overflow:hidden;
  position:relative;
}
.up-photo img{width:100%;height:100%;object-fit:cover;}
.up-photo .change{
  position:absolute;bottom:10px;right:10px;
  background:rgba(0,0,0,.6);color:white;
  font-size:11px;padding:6px 10px;border-radius:14px;
}
.up-text{
  width:100%;
  min-height:120px;
  font-size:15px;
  line-height:1.7;
  padding:14px 0;
  resize:none;
  display:block;
}
.up-text.title{font-size:17px;font-weight:500;min-height:auto;padding-bottom:4px;}

/* LIST EDITING */
.cl-row{
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 0;
  border-bottom:0.5px solid var(--line);
}
.cl-handle{color:var(--ink3);padding:4px;touch-action:none;}
.cl-chk{
  width:22px;height:22px;
  border:1.5px solid var(--ink3);
  border-radius:5px;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  color:white;
}
.cl-chk.on{background:var(--g);border-color:var(--g);}
.cl-input{flex:1;font-size:15px;padding:4px 0;}
.cl-input.done{color:var(--ink3);text-decoration:line-through;}
.cl-del{color:var(--ink3);padding:4px;}
.cl-add{
  display:flex;
  align-items:center;
  gap:10px;
  padding:14px 0;
  color:var(--g);
  font-size:14px;
  width:100%;
}
.cl-add .plus{
  width:22px;height:22px;
  border:1.5px dashed var(--g);
  border-radius:5px;
  display:flex;align-items:center;justify-content:center;
}

/* DETAIL */
.detail-img{
  width:100%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  max-height:55vh;
}
.detail-img img{max-width:100%;max-height:55vh;object-fit:contain;}
.detail-body{padding:18px 18px 24px;}
.detail-meta{
  display:flex;
  gap:8px;
  align-items:center;
  margin-bottom:14px;
  font-size:11px;
  color:var(--ink3);
  font-family:var(--font-en);
}
.detail-meta .src{
  padding:3px 8px;
  background:var(--gl);
  color:var(--gd);
  border-radius:10px;
  font-size:10px;
  font-family:var(--font-jp);
}
.detail-text{
  font-size:16px;
  line-height:1.75;
  white-space:pre-wrap;
  word-break:break-word;
}
#detail-chat-log{
  margin-top:18px;
}
#detail-chat-log:not(:empty){
  border-top:0.5px solid var(--line);
  padding-top:18px;
}
.detail-list-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 0;
  border-bottom:0.5px solid var(--line);
  font-size:15px;
}
.detail-list-item.done{color:var(--ink3);text-decoration:line-through;}
.detail-list-item .chk{
  width:22px;height:22px;
  border:1.5px solid var(--ink3);
  border-radius:5px;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  color:white;
}
.detail-list-item.done .chk{background:var(--g);border-color:var(--g);}

/* 詳細画面の下部メモエリア + AIアクション (ボトムナビと同じ高さ) */
.detail-input{
  background:var(--surface);
  border-top:0.5px solid var(--line);
  padding:8px 10px;
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
  min-height:62px;
}
.detail-input-ai{
  width:38px;height:38px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--ink2);
  background:var(--bg);
  flex-shrink:0;
}
.detail-input-ai:active{transform:scale(0.92);}
.detail-input-ai.on{background:var(--g);color:white;}
.detail-input textarea{
  flex:1;
  background:var(--bg);
  border-radius:19px;
  padding:9px 14px;
  font-size:14px;
  max-height:120px;
  min-height:38px;
  line-height:1.5;
  resize:none;
}
.detail-input-send{
  width:38px;height:38px;
  border-radius:50%;
  background:var(--g);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  flex-shrink:0;
}
.detail-input-send.disabled{
  background:var(--ink3);
  opacity:0.5;
}

/* MENU */
.menu{
  position:absolute;
  top:50px;right:14px;
  background:var(--surface);
  border-radius:10px;
  box-shadow:0 4px 20px rgba(0,0,0,.15);
  padding:6px 0;
  z-index:60;
  min-width:140px;
  display:none;
}
.menu.on{display:block;}
.menu-item{
  padding:11px 16px;
  font-size:13px;
  display:flex;align-items:center;gap:10px;
  width:100%;
  text-align:left;
}
.menu-item:active{background:var(--bg);}
.menu-item.danger{color:var(--rose);}

/* CHAT */
.chat-body{
  flex:1;
  overflow-y:auto;
  padding:14px 16px;
  background:var(--bg);
  min-height:0;
}
.chat-ref{
  background:var(--surface);
  border-radius:12px;
  padding:10px;
  display:flex;
  gap:10px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
}
.chat-ref img{width:48px;height:48px;border-radius:8px;object-fit:cover;}
.chat-ref-text{flex:1;font-size:12px;color:var(--ink2);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;}
.msg{margin-bottom:12px;display:flex;}
.msg.u{justify-content:flex-end;}
.msg.a{justify-content:flex-start;}
.bubble{
  max-width:78%;
  padding:10px 14px;
  border-radius:14px;
  font-size:14px;
  line-height:1.6;
  white-space:pre-wrap;
  word-break:break-word;
}
.msg.u .bubble{background:var(--g);color:white;border-bottom-right-radius:4px;}
.msg.a .bubble{background:var(--surface);color:var(--ink);border-bottom-left-radius:4px;box-shadow:var(--shadow);}
.chat-input{
  display:flex;
  gap:8px;
  padding:10px 12px max(10px,env(safe-area-inset-bottom));
  background:var(--surface);
  border-top:0.5px solid var(--line);
  align-items:flex-end;
  flex-shrink:0;
}
.chat-input textarea{
  flex:1;
  background:var(--bg);
  border-radius:18px;
  padding:9px 14px;
  font-size:14px;
  max-height:100px;
  min-height:36px;
  line-height:1.5;
  resize:none;
}
.chat-send{
  width:36px;height:36px;
  border-radius:18px;
  background:var(--g);
  color:white;
  display:flex;align-items:center;justify-content:center;
}

/* LIBRARY */
.lib-section{
  padding:18px 18px 6px;
  font-size:10px;
  color:var(--ink3);
  letter-spacing:0.1em;
  font-family:var(--font-en);
}
.lib-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 18px;
  background:var(--surface);
  border-bottom:0.5px solid var(--line);
}
.lib-item:active{background:var(--bg);}
.lib-avatar{
  width:40px;height:40px;
  border-radius:10px;
  background:var(--gl);
  display:flex;align-items:center;justify-content:center;
  color:var(--gd);
  font-weight:700;
  font-size:14px;
  flex-shrink:0;
  font-family:var(--font-en);
}
.lib-info{flex:1;min-width:0;}
.lib-name{font-size:14px;font-weight:600;}
.lib-handle{font-size:11px;color:var(--ink3);font-family:var(--font-en);}
.lib-action{
  padding:6px 14px;
  font-size:12px;
  font-weight:600;
  border-radius:14px;
  color:var(--g);
  border:1px solid var(--g);
  background:var(--surface);
}
.lib-action.subbed{background:var(--g);color:white;}

/* 公式棚詳細 */
.official-simple-hdr{
  padding:18px;
  background:var(--surface);
  border-bottom:0.5px solid var(--line);
}
.os-name{font-size:18px;font-weight:600;margin-bottom:3px;}
.os-handle{font-size:11px;color:var(--ink3);font-family:var(--font-en);margin-bottom:8px;}
.os-desc{font-size:12px;color:var(--ink2);line-height:1.6;margin-bottom:12px;}
.os-meta{display:flex;gap:14px;font-size:10px;color:var(--ink3);font-family:var(--font-en);align-items:center;}
.os-sub{
  margin-left:auto;
  padding:6px 14px;
  font-size:12px;font-weight:600;
  border-radius:14px;
  color:var(--g);
  border:1px solid var(--g);
}
.os-sub.on{background:var(--g);color:white;}

/* REVIEW */
.review-bg{
  background:#0a0a0a;
  color:white;
  height:100%;
  display:flex;
  flex-direction:column;
  flex:1;
}
.review-top{
  padding:14px 18px;
  display:flex;
  align-items:center;
  gap:12px;
  flex-shrink:0;
}
.review-close{
  width:36px;height:36px;
  border-radius:18px;
  background:rgba(255,255,255,.1);
  color:white;
  display:flex;align-items:center;justify-content:center;
}
.review-progress{flex:1;height:3px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden;}
.review-progress-bar{height:100%;background:var(--g);width:0;transition:width .3s;}
.review-counter{font-family:var(--font-en);font-size:12px;color:rgba(255,255,255,.7);}
.review-stage{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:0 24px;
  text-align:center;
  min-height:0;
}
.review-prompt{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:20px;}
.review-card{
  width:100%;
  max-width:340px;
  background:#1a1a1a;
  border-radius:16px;
  padding:24px;
  margin-bottom:20px;
  min-height:240px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.review-card img{max-width:100%;max-height:40vh;border-radius:8px;}
.review-card .rv-text{font-size:18px;line-height:1.7;white-space:pre-wrap;text-align:left;width:100%;}
.review-reveal{
  padding:14px 32px;
  background:var(--g);
  color:white;
  border-radius:24px;
  font-size:15px;
  font-weight:600;
}
.review-answer{
  font-size:17px;
  line-height:1.7;
  white-space:pre-wrap;
  padding:16px;
  background:rgba(29,158,117,.12);
  border-radius:10px;
  border-left:3px solid var(--g);
  text-align:left;
  width:100%;
  max-height:30vh;
  overflow-y:auto;
}
.review-actions{
  padding:14px 12px max(20px,env(safe-area-inset-bottom));
  display:flex;
  gap:8px;
  flex-shrink:0;
}
.review-btn{
  flex:1;
  padding:14px 0;
  border-radius:14px;
  font-size:14px;
  font-weight:600;
}
.review-btn.again{background:#3A2020;color:#FF8B7E;}
.review-btn.good{background:#1F3A2C;color:#7AE5A8;}
.review-done{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center;}
.review-done-icon{
  width:80px;height:80px;
  border-radius:40px;
  background:linear-gradient(135deg,var(--g),var(--gd));
  display:flex;align-items:center;justify-content:center;
  margin-bottom:20px;
  color:white;
}
.review-done h2{font-size:20px;margin-bottom:8px;font-weight:600;}

/* SEARCH */
.search-hdr{
  padding:10px 8px;
  background:var(--surface);
  border-bottom:0.5px solid var(--line);
  display:flex;
  gap:8px;
  align-items:center;
}
.search-input-wrap{
  flex:1;
  height:38px;
  background:var(--bg);
  border-radius:19px;
  padding:0 14px;
  display:flex;align-items:center;gap:8px;
}
.search-input-wrap input{flex:1;font-size:14px;}
.search-scope{
  display:flex;
  gap:6px;
  padding:10px 14px;
  background:var(--surface);
  border-bottom:0.5px solid var(--line);
  overflow-x:auto;
}
.search-scope::-webkit-scrollbar{display:none;}
.scope-chip{
  padding:6px 12px;
  background:var(--bg);
  border-radius:14px;
  font-size:12px;
  color:var(--ink2);
  white-space:nowrap;
  flex-shrink:0;
}
.scope-chip.on{background:var(--g);color:white;}
.search-empty{padding:40px 30px;text-align:center;color:var(--ink3);font-size:13px;}

/* LOGIN */
.login-wrap{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:0 30px;
  background:var(--surface);
}
.login-logo{
  font-family:var(--font-en);
  font-size:52px;
  font-weight:600;
  letter-spacing:-0.03em;
  margin-bottom:8px;
}
.login-logo em{color:var(--g);font-style:italic;}
.login-tag{
  font-size:13px;
  color:var(--ink2);
  text-align:center;
  margin-bottom:50px;
}
.login-card{
  width:100%;
  padding:18px;
  background:var(--bg);
  border-radius:14px;
  margin-bottom:12px;
  text-align:left;
  border:1px solid transparent;
}
.login-card:active{background:var(--gl);border-color:var(--g);}
.login-card-title{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;}

/* ════════════════════════════════════════════
   TODAY (今日)
   ════════════════════════════════════════════ */
.today-hero{
  padding:calc(20px + env(safe-area-inset-top)) 20px 18px;
  background:linear-gradient(140deg,#FFF,#F4FAF7);
  border-bottom:0.5px solid var(--line);
}
.today-date{
  font-family:var(--font-en);
  font-size:11px;
  color:var(--ink3);
  letter-spacing:0.15em;
  margin-bottom:4px;
}
.today-title{
  font-size:22px;
  font-weight:700;
  letter-spacing:-0.01em;
  margin-bottom:6px;
}
.today-sub{
  font-size:12px;
  color:var(--ink2);
  line-height:1.6;
}

.today-block{
  padding:20px 20px 10px;
}
.today-block-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:10px;
}
.today-block-title{
  font-size:13px;
  font-weight:700;
  letter-spacing:0.02em;
  display:flex;
  align-items:center;
  gap:8px;
}
.today-block-icon{
  width:24px;height:24px;
  border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  color:white;
}
.today-block-icon.review{background:var(--amber);}
.today-block-icon.tasks{background:var(--sky);}
.today-block-icon.new{background:var(--g);}
.today-block-count{
  font-family:var(--font-en);
  font-size:13px;
  color:var(--ink3);
}

/* 復習開始 大ボタン */
.today-review-card{
  margin:0 20px 18px;
  background:linear-gradient(135deg,#FFF4DA,#FFE9B4);
  border-radius:16px;
  padding:18px 18px 16px;
  display:flex;
  align-items:center;
  gap:14px;
  cursor:pointer;
  transition:transform .1s;
}
.today-review-card:active{transform:scale(0.98);}
.today-review-icon{
  width:52px;height:52px;
  border-radius:14px;
  background:white;
  display:flex;align-items:center;justify-content:center;
  color:var(--amber);
  flex-shrink:0;
  box-shadow:0 2px 6px rgba(0,0,0,.06);
}
.today-review-info{flex:1;}
.today-review-title{
  font-size:15px;
  font-weight:700;
  color:#7A5A1F;
  margin-bottom:2px;
}
.today-review-sub{
  font-size:12px;
  color:#A57F2A;
}
.today-review-arrow{color:#A57F2A;}

.today-review-empty{
  margin:0 20px 18px;
  padding:18px;
  background:var(--surface);
  border:1px dashed var(--line2);
  border-radius:14px;
  text-align:center;
  font-size:13px;
  color:var(--ink3);
  line-height:1.6;
}

/* 今日のタスク (リスト型カードの open items を集約) */
.today-tasks{
  background:var(--surface);
  margin:0 14px 18px;
  border-radius:14px;
  overflow:hidden;
  box-shadow:var(--shadow);
}
.today-task{
  display:flex;
  align-items:flex-start;
  gap:12px;
  padding:14px 16px;
  border-bottom:0.5px solid var(--line);
  cursor:pointer;
}
.today-task:last-child{border-bottom:none;}
.today-task:active{background:var(--bg);}
.today-task .tchk{
  width:22px;height:22px;
  border:1.5px solid var(--ink3);
  border-radius:6px;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  color:white;
  margin-top:1px;
}
.today-task.done .tchk{background:var(--g);border-color:var(--g);}
.today-task.done .ttxt{color:var(--ink3);text-decoration:line-through;}
.today-task-body{flex:1;min-width:0;}
.ttxt{font-size:14px;line-height:1.5;}
.tlist{
  font-size:10px;
  color:var(--ink3);
  font-family:var(--font-en);
  letter-spacing:0.05em;
  margin-top:3px;
}

/* 今日新しく保存したカード (横スクロール) */
.today-newcards{
  display:flex;
  gap:8px;
  padding:0 20px 18px;
  overflow-x:auto;
  scrollbar-width:none;
}
.today-newcards::-webkit-scrollbar{display:none;}
.today-newcard{
  width:110px;
  aspect-ratio:1;
  flex-shrink:0;
  border-radius:10px;
  overflow:hidden;
  background:var(--surface);
  box-shadow:var(--shadow);
  position:relative;
  cursor:pointer;
}
.today-newcard img{width:100%;height:100%;object-fit:cover;}
.today-newcard .ctxt{
  padding:10px;
  font-size:11px;
  line-height:1.5;
  height:100%;
  overflow:hidden;
  display:-webkit-box;
  -webkit-line-clamp:6;
  -webkit-box-orient:vertical;
}
.today-newcard.note .ctxt{background:#FFFDF5;}
.today-newcard.list .ctxt{background:#F4F8F3;font-size:10px;}

.today-empty-block{
  padding:20px;
  text-align:center;
  color:var(--ink3);
  font-size:12px;
  line-height:1.7;
}

/* COLOR PICKER */
.color-picker{
  padding:14px 16px 20px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}
.color-swatch{
  aspect-ratio:1;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  font-weight:600;
  border:2px solid transparent;
  transition:transform .1s;
}
.color-swatch:active{transform:scale(0.94);}
.color-swatch.selected{border-color:var(--g);}

.toast{
  position:absolute;
  bottom:90px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:rgba(26,26,26,.92);
  color:white;
  padding:10px 18px;
  border-radius:20px;
  font-size:13px;
  z-index:200;
  opacity:0;
  pointer-events:none;
  transition:all .25s;
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

.hide{display:none !important;}
</style>
</head>
<body>
<div class="app">

<!-- LOGIN -->
<div class="screen active" id="screen-login">
  <div class="login-wrap">
    <div class="login-logo">Snap<em>In</em></div>
    <div class="login-tag">写真とメモを置いておく場所。</div>
    <button class="login-card" data-action="login-personal">
      <div class="login-card-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
        個人としてはじめる
      </div>
    </button>
    <button class="login-card" data-action="login-official">
      <div class="login-card-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-6 9 6v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
        公式アカウントで入る
      </div>
    </button>
  </div>
</div>

<!-- HOME -->
<div class="screen" id="screen-home">
  <div class="hdr">
    <div class="logo">Snap<em>In</em></div>
    <div class="hdr-icons">
      <button data-action="toggle-mosaic" id="mosaic-btn" aria-label="思い出す">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/><path d="M3 3l18 18" stroke-linecap="round"/></svg>
      </button>
      <button data-action="toggle-edit" id="edit-btn" aria-label="並べ替え">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <button data-action="logout-confirm" aria-label="ログアウト">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5M21 12H9"/></svg>
      </button>
    </div>
  </div>

  <div class="home-top">
    <div class="quick-add">
      <input id="quick-input" placeholder="今、頭にあること…">
      <div class="quick-add-icons" id="quick-icons">
        <button class="quick-add-icon" data-action="quick-photo" aria-label="写真">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </button>
        <button class="quick-add-icon" data-action="quick-list" aria-label="リスト">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        </button>
      </div>
      <button class="quick-add-send hide" id="quick-send" data-action="quick-save" aria-label="保存">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg>
      </button>
    </div>
    <div class="home-row">
      <div class="search-bar" data-action="goto-search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <span>探す</span>
      </div>
      <div class="view-tog">
        <button id="vt-grid" class="on" data-action="view-grid" aria-label="グリッド">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </button>
        <button id="vt-reel" data-action="view-reel" aria-label="リール">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="3" width="12" height="18" rx="2"/><path d="M12 7v10"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="scroll" id="home-scroll">
    <div class="grid" id="grid-home"></div>
    <div class="feed hide" id="feed-home"></div>
    <div class="empty hide" id="empty-home">
      <div class="empty-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.1-3.1a2 2 0 0 0-2.81.01L6 21"/></svg>
      </div>
      <div class="empty-title">空っぽです</div>
      <div class="empty-sub">上の入力欄か、右下の + から<br>残してみてください。</div>
    </div>
  </div>

  <button class="edit-done" id="edit-done" data-action="toggle-edit">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg>
    完了
  </button>

  <div class="bnav" data-bnav="home"></div>
</div>

<!-- TODAY -->
<div class="screen" id="screen-today">
  <div class="scroll">
    <div class="today-hero">
      <div class="today-date" id="today-date">―</div>
      <div class="today-title" id="today-greeting">おはよう</div>
      <div class="today-sub" id="today-summary">―</div>
    </div>

    <div id="today-review-section"></div>
    <div id="today-tasks-section"></div>
    <div id="today-new-section"></div>
  </div>
  <div class="bnav" data-bnav="today"></div>
</div>

<!-- LIBRARY -->
<div class="screen" id="screen-library">
  <div class="hdr">
    <div class="hdr-title">公式棚</div>
  </div>
  <div class="scroll">
    <div id="lib-subscribed"></div>
    <div class="lib-section">他の棚</div>
    <div id="lib-available"></div>
  </div>
  <div class="bnav" data-bnav="library"></div>
</div>

<!-- OFFICIAL DETAIL -->
<div class="screen" id="screen-official">

<script>
(function(){
'use strict';

const STORAGE_KEY='snapin_v3';
const $=id=>document.getElementById(id);

const state={
  user:null,
  cards:[],
  subscribed:[],
  view:'grid',
  navStack:['screen-login'],
  current:null,
  searchScope:'all',
  chatRef:null,
  currentOfficial:null,
  editMode:false,
  mosaicMode:false,
  detailAiMode:false,  // 詳細画面でAI送信モードか
  photoMode:null,      // クイック写真撮影中 'photo' | 'photonote' | null
};

function save(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify({
    user:state.user,
    cards:state.cards,
    subscribed:state.subscribed,
  }));
}
function load(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return false;
    const d=JSON.parse(raw);
    state.user=d.user||null;
    state.cards=d.cards||[];
    state.subscribed=d.subscribed||[];
    return true;
  }catch(e){return false;}
}

// メモカードの色パレット (タグの代わりに色で分類)
const CARD_COLORS=[
  {id:'default',name:'白',bg:'#FFFDF5',fg:'#1A1A1A'},
  {id:'yellow', name:'黄',bg:'#FFF6D6',fg:'#5A4818'},
  {id:'pink',   name:'桃',bg:'#FCE6E8',fg:'#6B2030'},
  {id:'blue',   name:'青',bg:'#E0EDF8',fg:'#1F3A5C'},
  {id:'green',  name:'緑',bg:'#E0F1E4',fg:'#1F4E2C'},
  {id:'purple', name:'紫',bg:'#EBE0F2',fg:'#3D2657'},
  {id:'gray',   name:'灰',bg:'#ECEDEE',fg:'#3A3F44'},
];
function colorById(id){return CARD_COLORS.find(c=>c.id===id)||CARD_COLORS[0];}

// 文字量に応じて文字サイズを自動調整 (Facebook風)
// グリッド用 (小さいサムネ): 短い=大、長い=小
function autoFontSize(text,minSize,maxSize){
  if(!text)return minSize;
  const len=text.length;
  if(len<=12)return maxSize;
  if(len<=25)return Math.round(maxSize-(maxSize-minSize)*0.35);
  if(len<=60)return Math.round(maxSize-(maxSize-minSize)*0.7);
  return minSize;
}
// 詳細表示用 (大画面)
function autoFontSizeDetail(text){
  if(!text)return 16;
  const len=text.length;
  if(len<=15)return 38;
  if(len<=30)return 30;
  if(len<=60)return 24;
  if(len<=120)return 20;
  return 16;
}

// 公式棚デモデータ
const OFFICIAL_SHELVES=[

    id:'jc-english', handle:'@jukencamp-english', name:'JUKEN CAMP 英語',

      {id:'op2',type:'note',text:'定期テスト範囲\n国語: 漢字 p.45-60\n数学: 二次関数\n英語: Unit 3-4',date:'2026-05-22'},
    ]

// ═══ NAVIGATION ═══
function navHtml(active){
  const items=[
    {id:'home',label:'棚',svg:'<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>'},
    {id:'today',label:'今日',svg:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>'},
    {id:'add',label:'',svg:''},
    {id:'search',label:'探す',svg:'<circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>'},
    {id:'library',label:'公式',svg:'<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>'},
  ];
  return items.map(i=>{
    if(i.id==='add'){
      return `<div class="bnav-add-wrap"><button class="bnav-add" data-action="open-add" aria-label="追加">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      </button></div>`;
    }
    const on=active===i.id?' on':'';
    return `<button class="bnav-item${on}" data-action="nav-${i.id}">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${i.svg}</svg>
      <span>${i.label}</span>
    </button>`;
  }).join('');
}

function setupNavs(){
  document.querySelectorAll('.bnav[data-bnav]').forEach(nav=>{
    nav.innerHTML=navHtml(nav.dataset.bnav);
  });
}

function goto(id,push){
  if(push===undefined)push=true;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const sc=$(id);
  if(!sc)return;
  sc.classList.add('active');
  if(push && state.navStack[state.navStack.length-1]!==id){
    state.navStack.push(id);
  }
  if(id==='screen-home')renderHome();
  if(id==='screen-today')renderToday();
  if(id==='screen-library')renderLibrary();
  if(id==='screen-search'){
    setTimeout(()=>$('search-q').focus(),100);
    doSearch();
  }
}

function back(){
  $('detail-menu')?.classList.remove('on');
  if(state.navStack.length>1){
    state.navStack.pop();
    const prev=state.navStack[state.navStack.length-1];
    goto(prev,false);
  }else{
    goto('screen-home');
  }
}

// ═══ LOGIN ═══
function login(mode){
  state.user={
    mode,
    name:mode==='personal'?'あなた':'JUKEN CAMP',
    handle:mode==='personal'?'private':'@jukencamp'
  };
  save();
  state.navStack=['screen-home'];
  goto('screen-home',false);
}

function logoutConfirm(){
  if(!confirm('ログアウトしますか?\n端末のデータは残ります。'))return;
  state.user=null;
  state.navStack=['screen-login'];
  goto('screen-login',false);
}

// ═══ TODAY ═══

function renderToday(){
  const now=new Date();
  const dateStr=`${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
  const wd=['日','月','火','水','木','金','土'][now.getDay()];
  $('today-date').textContent=`${dateStr} ${wd}`;

  // 挨拶
  const h=now.getHours();
  let greet='こんにちは';
  if(h<5)greet='こんばんは';
  else if(h<11)greet='おはよう';
  else if(h<17)greet='こんにちは';
  else if(h<22)greet='こんばんは';
  else greet='おやすみなさい';
  $('today-greeting').textContent=greet;

  // サマリー
  const due=getDueCards();
  const todayCards=getTodayCards();
  const openTasks=getTodayOpenTasks();
  const parts=[];
  if(due.length>0)parts.push(`見返したいカード ${due.length}`);
  if(openTasks.length>0)parts.push(`未完のリスト ${openTasks.length}`);
  if(todayCards.length>0)parts.push(`今日の保存 ${todayCards.length}`);
  $('today-summary').textContent=parts.length?parts.join('　'):'今日は静かな一日です。';

  // 復習ブロック
  const rv=$('today-review-section');
  if(due.length>0){
    rv.innerHTML=`
      <div class="today-review-card" data-action="start-review">
        <div class="today-review-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
        </div>
        <div class="today-review-info">
          <div class="today-review-title">見返す ${due.length} 枚</div>
          <div class="today-review-sub">記憶に定着させるタイミングです</div>
        </div>
        <div class="today-review-arrow">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
        </div>
      </div>
    `;
  }else{
    rv.innerHTML=`
      <div class="today-review-empty">
        見返すカードは今ありません。<br>
        新しく保存したものが、明日以降ここに現れます。
      </div>
    `;
  }

  // 未完のタスク (リスト型カードの未完項目を集約)
  const tasksSec=$('today-tasks-section');
  if(openTasks.length>0){
    tasksSec.innerHTML=`
      <div class="today-block">
        <div class="today-block-head">
          <div class="today-block-title">
            <div class="today-block-icon tasks">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            </div>
            やること
          </div>
          <div class="today-block-count">${openTasks.length}</div>
        </div>
      </div>
      <div class="today-tasks" id="today-tasks-list"></div>
    `;
    const listEl=$('today-tasks-list');
    openTasks.forEach(t=>{
      const row=document.createElement('div');
      row.className='today-task';
      row.innerHTML=`
        <div class="tchk"></div>
        <div class="today-task-body">
          <div class="ttxt">${esc(t.item.t)}</div>
          <div class="tlist">${esc(t.card.title||'リスト')}</div>
        </div>
      `;
      row.addEventListener('click',()=>{
        const cIdx=state.cards.findIndex(x=>x.id===t.card.id);
        if(cIdx<0)return;
        const itemIdx=state.cards[cIdx].items.findIndex(x=>x===t.item);
        if(itemIdx<0)return;
        state.cards[cIdx].items[itemIdx].d=true;
        save();
        renderToday();
      });
      listEl.appendChild(row);
    });
  }else{
    tasksSec.innerHTML='';
  }

  // 今日新しく保存したカード
  const newSec=$('today-new-section');
  if(todayCards.length>0){
    newSec.innerHTML=`
      <div class="today-block">
        <div class="today-block-head">
          <div class="today-block-title">
            <div class="today-block-icon new">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
            </div>
            今日の保存
          </div>
          <div class="today-block-count">${todayCards.length}</div>
        </div>
      </div>
      <div class="today-newcards" id="today-newcards"></div>
    `;
    const wrap=$('today-newcards');
    todayCards.forEach(c=>{
      const el=document.createElement('div');
      el.className='today-newcard '+c.type;
      if(c.type==='photo'||c.type==='photonote'){
        el.innerHTML=`<img src="${c.image||''}">`;
      }else if(c.type==='note'){
        const col=colorById(c.color);
        const fz=autoFontSize(c.text||'',11,16);
        const centered=fz>=14;
        el.innerHTML=`<div class="ctxt" style="background:${col.bg};color:${col.fg};font-size:${fz}px;${centered?'display:flex;align-items:center;justify-content:center;text-align:center;-webkit-line-clamp:initial;':''}">${esc(c.text||'')}</div>`;
      }else if(c.type==='list'){
        const items=(c.items||[]).slice(0,4).map(i=>`<div>・${esc(i.t)}</div>`).join('');
        el.innerHTML=`<div class="ctxt">${c.title?`<b>${esc(c.title)}</b>`:''}${items}</div>`;
      }
      el.addEventListener('click',()=>openDetail(c,'mine'));
      wrap.appendChild(el);
    });
  }else{
    newSec.innerHTML='';
  }
}

function getTodayCards(){
  const startOfToday=new Date();
  startOfToday.setHours(0,0,0,0);
  const t=startOfToday.getTime();
  return state.cards.filter(c=>(c.created||0)>=t);
}

function getTodayOpenTasks(){
  // 全リストカードの未完項目を集約 (最大20件)
  const out=[];
  for(const c of state.cards){
    if(c.type!=='list')continue;
    for(const item of (c.items||[])){
      if(!item.d && item.t.trim()){
        out.push({card:c,item});
        if(out.length>=20)return out;
      }
    }
  }
  return out;
}

// ═══ HOME ═══
function renderHome(){
  const empty=$('empty-home');
  const grid=$('grid-home');
  const feed=$('feed-home');

  if(state.cards.length===0){
    empty.classList.remove('hide');
    grid.classList.add('hide');
    feed.classList.add('hide');
  }else{
    empty.classList.add('hide');
    if(state.view==='grid'){
      grid.classList.remove('hide');
      feed.classList.add('hide');
      renderGrid(grid,state.cards,'mine');
      grid.classList.toggle('editing',state.editMode);
    }else{
      feed.classList.remove('hide');
      grid.classList.add('hide');
      renderFeed(feed,state.cards);
    }
  }
  $('edit-btn').classList.toggle('on',state.editMode);
  $('mosaic-btn').classList.toggle('on',state.mosaicMode);
  $('edit-done').classList.toggle('on',state.editMode);
}

// ═══ GRID ═══
function renderGrid(el,cards,origin){
  el.innerHTML='';
  cards.forEach((c,idx)=>{
    const card=document.createElement('div');
    card.className='card '+c.type;
    if(state.mosaicMode && origin==='mine')card.classList.add('mosaic');
    card.dataset.idx=idx;
    card.dataset.origin=origin;

    let inner='';
    if(c.type==='photo' || c.type==='photonote'){
      inner=`<img src="${c.image||''}" alt="">`;
      if(c.text)inner+=`<div class="card-source">${esc(c.text.slice(0,30))}</div>`;
    }else if(c.type==='note'){
      const col=colorById(c.color);
      const fz=autoFontSize(c.text||'',11,17);
      const centered=fz>=15;
      const style=`background:${col.bg};color:${col.fg};font-size:${fz}px;${centered?'display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.4;-webkit-line-clamp:initial;':''}`;
      inner=`<div class="ctxt" style="${style}">${esc(c.text||'')}</div>`;
      inner+=`<div class="card-badge"><svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/></svg></div>`;
    }else if(c.type==='list'){
      const items=(c.items||[]).slice(0,5).map(i=>
        `<div class="li ${i.d?'done':''}"><div class="chk"></div><span>${esc(i.t)}</span></div>`
      ).join('');
      const title=c.title?`<div style="font-weight:600;font-size:11px;margin-bottom:4px;color:var(--gd);">${esc(c.title)}</div>`:'';
      inner=`<div class="ctxt">${title}${items}</div>`;
      inner+=`<div class="card-badge"><svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 11l3 3L22 4"/></svg></div>`;
    }
    if(origin==='mine' && c.type!=='list'){
      const stage=c.stage||0;
      const dots=[0,1,2,3,4].map(i=>`<div class="dot ${i<stage?'on':''}"></div>`).join('');
      inner+=`<div class="card-stage">${dots}</div>`;
    }
    if(origin==='mine'){
      inner=`<button class="card-del"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6 6 18M6 6l12 12"/></svg></button>`+inner;
    }
    card.innerHTML=inner;
    el.appendChild(card);
  });

  if(origin==='mine'){
    el.querySelectorAll('.card').forEach(card=>attachCard(card,el));
  }else{
    el.querySelectorAll('.card').forEach(card=>{
      card.addEventListener('click',()=>{
        const c=cards[parseInt(card.dataset.idx)];
        openDetail(c,'official');
      });
    });
  }
}

// ═══ FEED ═══
function renderFeed(el,cards){
  el.innerHTML='';
  cards.forEach(c=>{
    const item=document.createElement('div');
    item.className='feed-item';
    let inner='';
    if(c.type==='photo' || c.type==='photonote'){
      inner=`<img src="${c.image||''}" alt="">`;
      const txt=c.text?esc(c.text.slice(0,80)):'';
      inner+=`<div class="feed-meta">${txt}　${fmtDate(c.date)}</div>`;
    }else if(c.type==='note'){

      inner+=`<div class="feed-meta" style="color:${col.fg};opacity:0.5;">${fmtDate(c.date)}</div>`;

// ═══ CARD INTERACTION (drag + tap) ═══
function attachCard(card,gridEl){
  let startX=0,startY=0,didMove=false,isDragging=false;
  let pressTimer=null,ghost=null;

  const xy=ev=>{
    if(ev.touches&&ev.touches.length)return [ev.touches[0].clientX,ev.touches[0].clientY];
    if(ev.changedTouches&&ev.changedTouches.length)return [ev.changedTouches[0].clientX,ev.changedTouches[0].clientY];
    return [ev.clientX,ev.clientY];
  };

  const startDrag=()=>{
    isDragging=true;
    if(navigator.vibrate)navigator.vibrate(20);
    const rect=card.getBoundingClientRect();
    ghost=card.cloneNode(true);
    Object.assign(ghost.style,{
      position:'fixed',
      left:rect.left+'px',
      top:rect.top+'px',
      width:rect.width+'px',
      height:rect.height+'px',
      zIndex:'1000',
      opacity:'0.9',
      pointerEvents:'none',
      boxShadow:'0 8px 24px rgba(0,0,0,.3)',
      transform:'scale(1.08) rotate(-2deg)',
      transition:'none',
      animation:'none',
    });
    document.body.appendChild(ghost);
    card.classList.add('dragging');
  };

  const onMove=ev=>{
    const [x,y]=xy(ev);
    if(Math.abs(x-startX)>6 || Math.abs(y-startY)>6)didMove=true;

    if(!isDragging){
      if(didMove && !state.editMode){clearTimeout(pressTimer);}
      return;
    }
    ev.preventDefault();
    const rect=ghost.getBoundingClientRect();
    ghost.style.left=(x-rect.width/2)+'px';
    ghost.style.top=(y-rect.height/2)+'px';

    ghost.style.display='none';
    const target=document.elementFromPoint(x,y);
    ghost.style.display='';

    gridEl.querySelectorAll('.card').forEach(c=>c.classList.remove('drop-here'));
    if(target){
      const t=target.closest('.card');
      if(t && t!==card && t.parentElement===gridEl)t.classList.add('drop-here');
    }
  };

  const onEnd=ev=>{
    clearTimeout(pressTimer);
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('mouseup',onEnd);
    document.removeEventListener('touchmove',onMove);
    document.removeEventListener('touchend',onEnd);
    document.removeEventListener('touchcancel',onEnd);

    if(isDragging){
      const [x,y]=xy(ev);
      if(ghost){ghost.style.display='none';}
      const target=document.elementFromPoint(x,y);
      if(ghost){ghost.remove();ghost=null;}
      card.classList.remove('dragging');
      gridEl.querySelectorAll('.card').forEach(c=>c.classList.remove('drop-here'));

      if(target){
        const t=target.closest('.card');
        if(t && t!==card && t.parentElement===gridEl){
          const fromIdx=parseInt(card.dataset.idx);
          const toIdx=parseInt(t.dataset.idx);
          if(!isNaN(fromIdx) && !isNaN(toIdx)){
            const moved=state.cards.splice(fromIdx,1)[0];
            state.cards.splice(toIdx,0,moved);
            save();
            renderHome();
            return;
          }
        }
      }
      isDragging=false;
      return;
    }
    if(didMove)return;

    // 削除ボタン判定
    if(ev.target && ev.target.closest('.card-del')){
      const idx=parseInt(card.dataset.idx);
      const c=state.cards[idx];
      if(c && confirm('削除しますか?')){
        state.cards.splice(idx,1);
        save();
        renderHome();
      }
      return;
    }

    // 編集モード中は詳細を開かない
    if(state.editMode)return;

    const idx=parseInt(card.dataset.idx);
    const c=state.cards[idx];
    if(c){
      if(state.mosaicMode){
        if(card.classList.contains('mosaic')){
          card.classList.remove('mosaic');
        }else{
          openDetail(c,'mine');
        }
      }else{
        openDetail(c,'mine');
      }
    }
  };

  const onStart=ev=>{
    const [x,y]=xy(ev);
    startX=x;startY=y;didMove=false;isDragging=false;

    if(state.editMode){
      // 編集モード中: 短い長押しでドラッグ開始
      pressTimer=setTimeout(()=>{
        if(!didMove)startDrag();
      },100);
    }else{
      // 通常モード: 長押しで編集モードへ
      pressTimer=setTimeout(()=>{
        if(!didMove){
          state.editMode=true;
          gridEl.classList.add('editing');
          $('edit-btn').classList.add('on');
          $('edit-done').classList.add('on');
          if(navigator.vibrate)navigator.vibrate(40);
        }
      },500);
    }
    document.addEventListener('mousemove',onMove,{passive:false});
    document.addEventListener('mouseup',onEnd);
    document.addEventListener('touchmove',onMove,{passive:false});
    document.addEventListener('touchend',onEnd);
    document.addEventListener('touchcancel',onEnd);
  };

  card.addEventListener('mousedown',onStart);
  card.addEventListener('touchstart',onStart,{passive:true});
}

function openAddSheet(){
  $('add-mask').classList.add('on');
  $('add-sheet').classList.add('on');
}
function closeAddSheet(){
  $('add-mask').classList.remove('on');
  $('add-sheet').classList.remove('on');
}

function startCreate(type){
  closeAddSheet();
  state.current={
    id:'c_'+Date.now(),
    type,
    date:new Date().toISOString().slice(0,10),
    _new:true,
    text:'',
  };
  if(type==='photo' || type==='photonote'){
    state.photoMode=type;
    $('file-input').click();
  }else if(type==='note'){
    renderUpload();
    goto('screen-upload');
    setTimeout(()=>{
      const ta=$('up-body').querySelector('textarea');
      if(ta)ta.focus();
    },100);
  }else if(type==='list'){
    state.current.title='';
    state.current.items=[{t:'',d:false}];
    renderUpload();
    goto('screen-upload');
    setTimeout(()=>{
      const inp=$('up-body').querySelector('.cl-input');
      if(inp)inp.focus();
    },100);
  }
}

function onFilePick(e){
  const file=e.target.files[0];
  if(!file){
    // キャンセル → state.currentを破棄
    state.current=null;
    state.photoMode=null;
    return;
  }
  const reader=new FileReader();
  reader.onload=ev=>{
    if(!state.current)state.current={id:'c_'+Date.now(),type:state.photoMode||'photo',date:new Date().toISOString().slice(0,10),_new:true,text:''};
    state.current.image=ev.target.result;
    state.photoMode=null;
    renderUpload();
    goto('screen-upload');
  };
  reader.readAsDataURL(file);
  e.target.value='';
}
