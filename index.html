<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,viewport-fit=cover">
<title>SnapIn</title>
<style>
/* ════════════════════════════════════════════════════════════
   SnapIn — 思考速度を止めない知識フロー
   設計原則：白・グレー5段・緑1色／装飾なし／速度第一／再接触
   ════════════════════════════════════════════════════════════ */

:root{
  --g:#1A8B68;          /* 緑：唯一の有彩色 */
  --g-soft:#E8F4EF;
  --g-deep:#0E5C46;
  --bg:#FAFAFA;         /* 背景 */
  --surface:#FFFFFF;
  --ink-1:#0A0A0A;      /* 主テキスト */
  --ink-2:#525252;      /* 副テキスト */
  --ink-3:#A3A3A3;      /* 補助 */
  --ink-4:#D4D4D4;      /* 罫線 */
  --ink-5:#F0F0F0;      /* 最も薄い面 */
  --hair:rgba(0,0,0,0.06);
  --shadow-1:0 1px 2px rgba(0,0,0,0.04);
  --shadow-2:0 8px 32px rgba(0,0,0,0.08);
  --shadow-3:0 24px 64px rgba(0,0,0,0.16);
  --ease:cubic-bezier(0.25,0.9,0.3,1);
  --ease-spring:cubic-bezier(0.2,1.3,0.4,1);
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{
  height:100%;
  background:#000;
  font-family:"Hiragino Sans","SF Pro Text",-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  font-weight:300;
  color:var(--ink-1);
  letter-spacing:0.005em;
  overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
}
body{display:flex;align-items:center;justify-content:center;}

.app{
  width:100%;max-width:430px;height:100dvh;
  background:var(--surface);
  display:flex;flex-direction:column;
  position:relative;overflow:hidden;
  box-shadow:var(--shadow-3);
}

/* ─── HEADER ─── */
.hdr{
  height:48px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
  border-bottom:0.5px solid var(--hair);
}
.brand{
  font-family:"SF Pro Display",-apple-system,sans-serif;
  font-size:18px;font-weight:200;letter-spacing:-0.02em;
  color:var(--ink-1);
}
.brand .accent{color:var(--g);font-weight:300;}
.hdr-icon{
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  color:var(--ink-2);cursor:pointer;
  transition:color 0.15s var(--ease);
  margin-right:-8px;
}
.hdr-icon:active{color:var(--g);}

/* ─── SCREENS ─── */
.screen{
  flex:1;display:none;flex-direction:column;overflow:hidden;
  animation:fadeIn 0.25s var(--ease);
}
.screen.active{display:flex;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

/* ─── HOME : 静かなプロフィール帯 ─── */
.home-bar{
  padding:14px 20px 10px;
  display:flex;align-items:center;gap:14px;
  flex-shrink:0;
}
.ava{
  width:40px;height:40px;border-radius:50%;
  background:var(--g-soft);color:var(--g-deep);
  display:flex;align-items:center;justify-content:center;
  font-family:"SF Pro Display",sans-serif;
  font-size:15px;font-weight:400;letter-spacing:0.02em;
  flex-shrink:0;
}
.home-meta{flex:1;min-width:0;}
.home-name{
  font-size:13px;font-weight:500;color:var(--ink-1);
  letter-spacing:0.01em;
}
.home-sub{
  font-size:10px;color:var(--ink-3);
  margin-top:2px;letter-spacing:0.05em;
}
.home-sub b{font-weight:500;color:var(--ink-2);}
.view-switch{
  display:flex;background:var(--ink-5);
  border-radius:8px;padding:2px;gap:0;
}
.vs-btn{
  width:28px;height:24px;border:none;background:transparent;
  display:flex;align-items:center;justify-content:center;
  border-radius:6px;cursor:pointer;
  color:var(--ink-3);
  transition:all 0.18s var(--ease);
}
.vs-btn.on{
  background:var(--surface);color:var(--ink-1);
  box-shadow:var(--shadow-1);
}

/* ─── HOME : チャネル帯（公式フォロー） ─── */
.channels{
  padding:6px 16px 12px;
  display:flex;gap:10px;overflow-x:auto;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
  flex-shrink:0;
}
.channels::-webkit-scrollbar{display:none;}
.ch{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  cursor:pointer;flex-shrink:0;
  padding:2px;
}
.ch-ava{
  width:48px;height:48px;border-radius:50%;
  background:var(--ink-5);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:500;color:var(--ink-2);
  position:relative;
  transition:transform 0.15s var(--ease);
}
.ch:active .ch-ava{transform:scale(0.94);}
.ch.has-new .ch-ava{
  background:var(--surface);
  box-shadow:0 0 0 2px var(--g),0 0 0 4px var(--surface);
}
.ch-name{
  font-size:9px;color:var(--ink-2);
  max-width:56px;text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  letter-spacing:0.02em;
}

/* ─── GRID : 3列の単純な並び ─── */
.grid-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.grid-wrap::-webkit-scrollbar{display:none;}
.grid-wrap{scrollbar-width:none;}
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:2px;
  padding:0 0 100px;
}
.tile{
  aspect-ratio:1;
  position:relative;overflow:hidden;
  background:var(--ink-5);
  cursor:pointer;
  transition:opacity 0.12s var(--ease);
}
.tile:active{opacity:0.75;}
.tile img{
  width:100%;height:100%;object-fit:cover;
  display:block;
}
.tile-text{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:10px;text-align:center;
  background:var(--surface);
}
.tile-text-q{
  font-size:9px;line-height:1.5;
  color:var(--ink-2);
  font-weight:400;
  display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;
  overflow:hidden;
}
.tile-mark{
  position:absolute;top:6px;right:6px;
  width:6px;height:6px;border-radius:50%;
  background:var(--g);
  box-shadow:0 0 0 1.5px rgba(255,255,255,0.95);
}
.tile-corner{
  position:absolute;top:6px;left:6px;
  background:rgba(0,0,0,0.45);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  color:rgba(255,255,255,0.92);
  font-size:8px;letter-spacing:0.03em;
  padding:2px 6px;border-radius:4px;
  font-weight:400;
}

/* ─── EMPTY ─── */
.empty{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 32px;color:var(--ink-3);
  text-align:center;gap:14px;
}
.empty-icon{
  width:48px;height:48px;border-radius:50%;
  border:1px solid var(--ink-4);
  display:flex;align-items:center;justify-content:center;
  color:var(--ink-3);
}
.empty-text{font-size:12px;line-height:1.6;letter-spacing:0.02em;}
.empty-text b{display:block;color:var(--ink-2);font-weight:500;margin-bottom:4px;font-size:13px;}

/* ─── CAPTURE FAB ─── */
.fab{
  position:absolute;
  bottom:calc(80px + env(safe-area-inset-bottom));
  right:20px;
  width:54px;height:54px;border-radius:50%;
  background:var(--ink-1);color:var(--surface);
  border:none;display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  box-shadow:0 8px 24px rgba(0,0,0,0.18),0 2px 6px rgba(0,0,0,0.12);
  transition:transform 0.18s var(--ease-spring),background 0.15s var(--ease);
  z-index:50;
}
.fab:active{transform:scale(0.88);background:var(--g-deep);}

/* ─── BOTTOM NAV ─── */
.bnav{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-around;
  padding:8px 0 max(14px,env(safe-area-inset-bottom));
  border-top:0.5px solid var(--hair);
  background:var(--surface);
}
.nav-btn{
  width:48px;height:40px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:0;
  background:none;border:none;cursor:pointer;
  color:var(--ink-3);
  transition:color 0.15s var(--ease);
  padding:0;
}
.nav-btn.on{color:var(--ink-1);}
.nav-dot{
  width:4px;height:4px;border-radius:50%;
  background:transparent;margin-top:4px;
  transition:background 0.15s var(--ease);
}
.nav-btn.on .nav-dot{background:var(--g);}

/* ═══════════════════════════════════════════════
   REEL — 縦スワイプ巡回
   ═══════════════════════════════════════════════ */
.reel{
  flex:1;position:relative;overflow:hidden;
  background:#000;
}
.reel-scroller{
  height:100%;width:100%;
  overflow-y:scroll;scroll-snap-type:y mandatory;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.reel-scroller::-webkit-scrollbar{display:none;}
.reel-item{
  height:100%;width:100%;
  scroll-snap-align:start;scroll-snap-stop:always;
  position:relative;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.reel-img{
  width:100%;height:100%;object-fit:contain;
  background:#000;
}
.reel-text-bg{
  position:absolute;inset:0;
  background:linear-gradient(160deg,#1a1a1a 0%,#0a0a0a 100%);
  display:flex;align-items:center;justify-content:center;
  padding:40px 32px;
}
.reel-text-content{
  font-size:17px;line-height:1.75;color:rgba(255,255,255,0.92);
  font-weight:300;letter-spacing:0.03em;
  max-width:340px;text-align:left;
}
.reel-meta{
  position:absolute;top:14px;left:0;right:0;
  display:flex;justify-content:space-between;align-items:center;
  padding:0 18px;z-index:5;
}
.reel-cat{
  font-size:10px;color:rgba(255,255,255,0.85);
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  padding:5px 11px;border-radius:100px;
  letter-spacing:0.05em;font-weight:400;
  border:0.5px solid rgba(255,255,255,0.12);
}
.reel-count{
  font-size:10px;color:rgba(255,255,255,0.55);
  letter-spacing:0.08em;font-variant-numeric:tabular-nums;
}
.reel-bottom{
  position:absolute;left:0;right:0;bottom:0;
  padding:16px 18px max(20px,env(safe-area-inset-bottom));
  background:linear-gradient(transparent,rgba(0,0,0,0.65) 60%);
  z-index:5;
}
.reel-date{
  font-size:10px;color:rgba(255,255,255,0.55);
  letter-spacing:0.06em;margin-bottom:8px;
}
.reel-actions{
  display:flex;gap:8px;align-items:center;
}
.reel-act{
  flex:1;height:38px;
  display:flex;align-items:center;justify-content:center;gap:6px;
  background:rgba(255,255,255,0.08);
  border:0.5px solid rgba(255,255,255,0.15);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  color:rgba(255,255,255,0.9);
  border-radius:100px;cursor:pointer;
  font-size:11px;font-weight:400;letter-spacing:0.05em;
  transition:all 0.15s var(--ease);
}
.reel-act:active{background:rgba(255,255,255,0.18);transform:scale(0.97);}
.reel-act.primary{
  background:var(--g);border-color:transparent;
  color:white;
}
.reel-act.primary:active{background:var(--g-deep);}
.reel-progress{
  position:absolute;top:0;left:0;right:0;
  display:flex;gap:3px;padding:6px 18px;z-index:5;
  pointer-events:none;
}
.reel-progress-seg{
  flex:1;height:2px;background:rgba(255,255,255,0.2);
  border-radius:1px;overflow:hidden;
}
.reel-progress-seg.passed{background:rgba(255,255,255,0.9);}
.reel-progress-seg.current{
  background:rgba(255,255,255,0.9);
}

/* ═══════════════════════════════════════════════
   CAPTURE SHEET
   ═══════════════════════════════════════════════ */
.sheet-mask{
  position:absolute;inset:0;
  background:rgba(0,0,0,0.4);
  opacity:0;pointer-events:none;
  transition:opacity 0.3s var(--ease);
  z-index:100;
}
.sheet-mask.on{opacity:1;pointer-events:auto;}

.sheet{
  position:absolute;left:0;right:0;bottom:0;
  background:var(--surface);
  border-radius:24px 24px 0 0;
  transform:translateY(100%);
  transition:transform 0.4s var(--ease-spring);
  z-index:101;
  box-shadow:0 -12px 40px rgba(0,0,0,0.16);
  display:flex;flex-direction:column;
  max-height:88%;
}
.sheet.on{transform:translateY(0);}
.sheet-handle{
  width:36px;height:4px;border-radius:2px;
  background:var(--ink-4);
  margin:10px auto 0;flex-shrink:0;
}
.sheet-hdr{
  padding:8px 20px 14px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.sheet-title{
  font-size:13px;font-weight:500;color:var(--ink-1);
  letter-spacing:0.02em;
}
.sheet-close{
  font-size:13px;color:var(--ink-3);cursor:pointer;
  letter-spacing:0.02em;
}
.sheet-body{
  flex:1;overflow-y:auto;padding:0 20px 24px;
}
.sheet-body::-webkit-scrollbar{display:none;}

/* キャプチャ選択肢 */
.cap-options{display:flex;flex-direction:column;gap:6px;}
.cap-opt{
  display:flex;align-items:center;gap:14px;
  padding:16px 14px;
  background:var(--ink-5);
  border:none;border-radius:14px;
  cursor:pointer;text-align:left;width:100%;
  transition:background 0.15s var(--ease),transform 0.15s var(--ease);
}
.cap-opt:active{background:var(--g-soft);transform:scale(0.985);}
.cap-icon{
  width:38px;height:38px;border-radius:10px;
  background:var(--surface);
  display:flex;align-items:center;justify-content:center;
  color:var(--ink-2);flex-shrink:0;
}
.cap-meta{flex:1;min-width:0;}
.cap-meta-t{
  font-size:14px;color:var(--ink-1);font-weight:500;
  letter-spacing:0.01em;
}
.cap-meta-s{
  font-size:10px;color:var(--ink-3);
  margin-top:2px;letter-spacing:0.03em;
}
.cap-chev{color:var(--ink-3);flex-shrink:0;}

/* テキスト入力モード */
.cap-text-area{
  width:100%;min-height:140px;
  border:none;background:transparent;
  font-family:inherit;font-size:15px;
  line-height:1.7;color:var(--ink-1);
  resize:none;outline:none;
  letter-spacing:0.02em;
  padding:8px 0;
}
.cap-text-area::placeholder{color:var(--ink-3);}
.cap-bottom-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:12px;border-top:0.5px solid var(--hair);
  margin-top:8px;
}
.cap-hint{font-size:10px;color:var(--ink-3);letter-spacing:0.03em;}
.cap-save{
  background:var(--ink-1);color:var(--surface);
  border:none;border-radius:100px;
  padding:10px 22px;font-size:12px;font-weight:500;
  cursor:pointer;letter-spacing:0.05em;
  transition:all 0.15s var(--ease);
  font-family:inherit;
}
.cap-save:active{transform:scale(0.95);background:var(--g);}
.cap-save:disabled{background:var(--ink-4);color:var(--ink-3);}

/* ═══════════════════════════════════════════════
   DETAIL VIEW
   ═══════════════════════════════════════════════ */
.detail{
  position:absolute;inset:0;
  background:var(--surface);
  z-index:80;
  display:none;flex-direction:column;
}
.detail.on{display:flex;animation:slideUp 0.3s var(--ease);}
@keyframes slideUp{from{transform:translateY(20px);opacity:0;}}
.detail-hdr{
  height:48px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 8px 0 20px;
  border-bottom:0.5px solid var(--hair);
}
.detail-back{
  width:40px;height:40px;display:flex;align-items:center;justify-content:center;
  color:var(--ink-2);cursor:pointer;margin-left:-12px;
}
.detail-actions{display:flex;gap:0;}
.detail-act{
  width:40px;height:40px;display:flex;align-items:center;justify-content:center;
  color:var(--ink-2);cursor:pointer;
  transition:color 0.15s var(--ease);
}
.detail-act:active{color:var(--g);}
.detail-act.danger:active{color:#C0392B;}
.detail-body{
  flex:1;overflow-y:auto;
  display:flex;flex-direction:column;
}
.detail-body::-webkit-scrollbar{display:none;}
.detail-media{
  width:100%;
  background:var(--ink-5);
  display:flex;align-items:center;justify-content:center;
  min-height:260px;
}
.detail-media img{
  width:100%;height:auto;display:block;
  max-height:60vh;object-fit:contain;
}
.detail-text{padding:24px 24px 32px;}
.detail-text-q{
  font-size:16px;line-height:1.85;color:var(--ink-1);
  font-weight:300;letter-spacing:0.02em;
  white-space:pre-wrap;
}
.detail-meta{
  padding:0 24px 16px;
  display:flex;gap:10px;align-items:center;
}
.detail-meta-cat{
  font-size:10px;color:var(--ink-2);
  letter-spacing:0.08em;text-transform:uppercase;
}
.detail-meta-date{font-size:10px;color:var(--ink-3);letter-spacing:0.04em;}
.detail-meta-dot{color:var(--ink-4);}
.detail-foot{
  flex-shrink:0;
  padding:14px 20px max(18px,env(safe-area-inset-bottom));
  border-top:0.5px solid var(--hair);
  display:flex;gap:8px;
}
.detail-foot button{
  flex:1;height:42px;
  border-radius:100px;border:none;
  font-family:inherit;font-size:12px;font-weight:500;
  letter-spacing:0.05em;cursor:pointer;
  transition:all 0.15s var(--ease);
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.detail-foot button:active{transform:scale(0.97);}
.btn-ghost{background:var(--ink-5);color:var(--ink-1);}
.btn-ghost:active{background:var(--ink-4);}
.btn-primary{background:var(--g);color:white;}
.btn-primary:active{background:var(--g-deep);}

/* ═══════════════════════════════════════════════
   AI panel (深掘り)
   ═══════════════════════════════════════════════ */
.ai-panel{
  position:absolute;inset:0;
  background:var(--surface);
  z-index:90;
  display:none;flex-direction:column;
}
.ai-panel.on{display:flex;animation:slideUp 0.3s var(--ease);}
.ai-hdr{
  height:48px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px 0 20px;
  border-bottom:0.5px solid var(--hair);
}
.ai-title{
  font-size:13px;font-weight:500;letter-spacing:0.02em;
  display:flex;align-items:center;gap:8px;
}
.ai-title .ai-dot{
  width:6px;height:6px;border-radius:50%;background:var(--g);
  animation:pulse 1.8s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:0.4;}50%{opacity:1;}}
.ai-body{
  flex:1;overflow-y:auto;padding:20px 24px;
}
.ai-q{
  font-size:13px;color:var(--ink-3);
  margin-bottom:14px;letter-spacing:0.02em;
  padding-bottom:14px;border-bottom:0.5px solid var(--hair);
}
.ai-a{
  font-size:15px;line-height:1.85;color:var(--ink-1);
  font-weight:300;letter-spacing:0.02em;white-space:pre-wrap;
}
.ai-thinking{
  display:flex;gap:5px;padding:8px 0;
}
.ai-thinking span{
  width:6px;height:6px;border-radius:50%;background:var(--ink-3);
  animation:think 1.2s ease-in-out infinite;
}
.ai-thinking span:nth-child(2){animation-delay:0.15s;}
.ai-thinking span:nth-child(3){animation-delay:0.3s;}
@keyframes think{
  0%,100%{transform:translateY(0);opacity:0.4;}
  50%{transform:translateY(-4px);opacity:1;}
}

/* ═══════════════════════════════════════════════
   TOAST — 静かな通知
   ═══════════════════════════════════════════════ */
.toast{
  position:absolute;
  bottom:calc(90px + env(safe-area-inset-bottom));
  left:50%;transform:translateX(-50%) translateY(20px);
  background:rgba(10,10,10,0.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  color:white;
  padding:10px 18px;border-radius:100px;
  font-size:12px;letter-spacing:0.04em;font-weight:300;
  opacity:0;pointer-events:none;
  transition:all 0.3s var(--ease);
  z-index:200;
  white-space:nowrap;
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* ═══════════════════════════════════════════════
   CHANNEL DETAIL
   ═══════════════════════════════════════════════ */
.ch-detail{
  position:absolute;inset:0;
  background:var(--surface);
  z-index:70;
  display:none;flex-direction:column;
}
.ch-detail.on{display:flex;animation:slideUp 0.3s var(--ease);}
.ch-detail-hero{
  padding:20px 24px 16px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  border-bottom:0.5px solid var(--hair);
}
.ch-detail-ava{
  width:60px;height:60px;border-radius:50%;
  background:var(--g-soft);color:var(--g-deep);
  display:flex;align-items:center;justify-content:center;
  font-family:"SF Pro Display",sans-serif;
  font-size:20px;font-weight:300;letter-spacing:0.04em;
}
.ch-detail-name{
  font-size:15px;font-weight:500;letter-spacing:0.01em;
}
.ch-detail-desc{
  font-size:11px;color:var(--ink-2);
  text-align:center;line-height:1.6;letter-spacing:0.03em;
  max-width:280px;
}
.ch-detail-sub{
  height:32px;padding:0 20px;
  background:var(--ink-1);color:white;
  border:none;border-radius:100px;
  font-size:11px;font-weight:500;letter-spacing:0.08em;
  cursor:pointer;font-family:inherit;
  transition:all 0.15s var(--ease);
  margin-top:4px;
}
.ch-detail-sub.subscribed{
  background:transparent;color:var(--ink-2);
  border:1px solid var(--ink-4);
}
.ch-detail-sub:active{transform:scale(0.96);}

/* ═══════════════════════════════════════════════
   ピンチ感のあるラベル類
   ═══════════════════════════════════════════════ */
.section-label{
  font-size:9px;color:var(--ink-3);
  letter-spacing:0.18em;text-transform:uppercase;
  padding:18px 20px 8px;font-weight:400;
}

/* fade-in for grid tiles */
.tile{animation:tileIn 0.4s var(--ease) both;}
@keyframes tileIn{from{opacity:0;transform:scale(0.95);}}
.tile:nth-child(1){animation-delay:0.00s;}
.tile:nth-child(2){animation-delay:0.02s;}
.tile:nth-child(3){animation-delay:0.04s;}
.tile:nth-child(4){animation-delay:0.06s;}
.tile:nth-child(5){animation-delay:0.08s;}
.tile:nth-child(6){animation-delay:0.10s;}
.tile:nth-child(7){animation-delay:0.12s;}
.tile:nth-child(8){animation-delay:0.14s;}
.tile:nth-child(9){animation-delay:0.16s;}

</style>
</head>
<body>

<div class="app" id="app">

  <!-- ═══ HEADER ═══ -->
  <header class="hdr">
    <div class="brand">Snap<span class="accent">In</span></div>
    <div class="hdr-icon" id="btn-channel-search" title="チャネル">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
        <circle cx="11" cy="11" r="7"/><path d="M21 21l-5-5"/>

  <!-- ═══ HOME SCREEN ═══ -->
  <section class="screen active" id="screen-home">
    <div class="home-bar">

            <rect x="9.5" y="1.5" width="5" height="5" rx="0.5"/>
            <rect x="1.5" y="9.5" width="5" height="5" rx="0.5"/>

    <!-- 公式チャネル帯 -->

  <!-- ═══ REEL SCREEN ═══ -->
  <section class="screen" id="screen-reel">
    <div class="reel">

  </section>

  <!-- ═══ BOTTOM NAV ═══ -->
  <nav class="bnav">
    <button class="nav-btn on" data-nav="home" aria-label="ホーム">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
        <path d="M3 11l9-7 9 7v9a1 1 0 01-1 1h-5v-7h-6v7H4a1 1 0 01-1-1v-9z"/>
      </svg>
      <div class="nav-dot"></div>
    </button>
    <button class="nav-btn" data-nav="reel" aria-label="リール">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
        <rect x="5" y="3" width="14" height="18" rx="2"/>
        <line x1="12" y1="17" x2="12" y2="18"/>
      </svg>
      <div class="nav-dot"></div>
    </button>
    <button class="nav-btn" data-nav="capture" aria-label="保存">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
        <circle cx="12" cy="12" r="9"/>
        <line x1="12" y1="8" x2="12" y2="16"/>
        <line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
      <div class="nav-dot"></div>

  </nav>

  <!-- ═══ CAPTURE SHEET ═══ -->
  <div class="sheet-mask" id="sheet-mask"></div>
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr">
      <div class="sheet-title" id="sheet-title">保存</div>
      <div class="sheet-close" id="sheet-close">閉じる</div>
    </div>
    <div class="sheet-body" id="sheet-body">
      <!-- 動的 -->
    </div>
  </div>

  <!-- ═══ DETAIL ═══ -->
  <div class="detail" id="detail">
    <div class="detail-hdr">
      <div class="detail-back" id="detail-back">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
          <path d="M15 6l-6 6 6 6"/>
        </svg>
      </div>
      <div class="detail-actions">
        <div class="detail-act" id="detail-share" title="共有">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
            <path d="M12 4v12M7 9l5-5 5 5M5 20h14"/>
          </svg>
        </div>
        <div class="detail-act danger" id="detail-delete" title="削除">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
            <path d="M4 7h16M9 7V5a1 1 0 011-1h4a1 1 0 011 1v2M6 7l1 12a2 2 0 002 2h6a2 2 0 002-2l1-12"/>

        覚えた

  <!-- ═══ AI panel ═══ -->
  <div class="ai-panel" id="ai-panel">
    <div class="ai-hdr">
      <div class="ai-title"><span class="ai-dot"></span>深掘り</div>

        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
          <path d="M6 6l12 12M18 6L6 18"/>

    <div class="ai-body" id="ai-body"></div>

  <!-- ═══ CHANNEL DETAIL ═══ -->
  <div class="ch-detail" id="ch-detail">
    <div class="detail-hdr">
      <div class="detail-back" id="ch-back">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
          <path d="M15 6l-6 6 6 6"/>
        </svg>
      </div>
    </div>
    <div class="ch-detail-hero">
      <div class="ch-detail-ava" id="ch-detail-ava"></div>
      <div class="ch-detail-name" id="ch-detail-name"></div>

      <button class="ch-detail-sub" id="ch-detail-sub">購読する</button>
    </div>

  <!-- ═══ TOAST ═══ -->

</div>

<script>
/* ════════════════════════════════════════════════════════════
   SnapIn — 思想優先プロトタイプ
   保存：localStorage / 公式チャネル：固定データ
   ════════════════════════════════════════════════════════════ */

const STORE_KEY = 'snapin.v1';
const SUB_KEY = 'snapin.subs.v1';

// ── 公式チャネル（JUKEN CAMP） ──
const CHANNELS = [
  {id:'jc-english',name:'英語',desc:'JUKEN CAMP 英語チャネル｜文法・語彙・読解の知識ストリーム',
   posts:[
     {type:'text',cat:'英文法',content:'仮定法過去完了：\n\nIf I had studied harder, I would have passed.\n\n「過去の事実に反する仮定」を表す。\nhad + 過去分詞 / would have + 過去分詞。'},
     {type:'text',cat:'語彙',content:'apparent ≠「明らかな」だけではない。\n\n「見かけ上の」「表面上の」という反対寄りの意味も持つ。\n\nan apparent contradiction\n=「一見すると矛盾」'},
     {type:'text',cat:'構文',content:'no sooner ... than\n\nNo sooner had I sat down than the phone rang.\n=「座るやいなや電話が鳴った」\n\n倒置に注意。'},
     {type:'text',cat:'読解',content:'because of / due to の使い分け：\n\n・because of 〜 副詞句\n・due to 〜 形容詞句（be動詞のあとに）\n\nThe delay was due to fog. ◎\nDue to fog, the delay... △'},
   ]},
  {id:'jc-math',name:'数学',desc:'JUKEN CAMP 数学チャネル｜公式・解法・典型問題の知識ストリーム',
   posts:[
     {type:'text',cat:'三角関数',content:'三角関数の合成：\n\na sin θ + b cos θ\n= √(a²+b²) sin(θ + α)\n\ntan α = b/a'},
     {type:'text',cat:'微分',content:'積の微分公式：\n(fg)\' = f\'g + fg\'\n\n商の微分公式：\n(f/g)\' = (f\'g - fg\') / g²'},
     {type:'text',cat:'数列',content:'等差数列の和：\nSₙ = n(a + l)/2 = n{2a + (n-1)d}/2\n\n等比数列の和：\nSₙ = a(1-rⁿ)/(1-r)  (r≠1)'},
   ]},
  {id:'jc-minatogawa',name:'港川3年',desc:'港川3年生クラス｜講義ノート・課題・直前期トピック',
   posts:[
     {type:'text',cat:'告知',content:'12月模試対策：\n\n来週水曜18:00〜\n英語長文の解き方を扱います。\n\n直前期の集中講義の出席は必須。'},
   ]},
];

// ── State ──
let state = {
  posts: JSON.parse(localStorage.getItem(STORE_KEY) || '[]'),
  subs: JSON.parse(localStorage.getItem(SUB_KEY) || '["jc-english","jc-minatogawa"]'),
  view: 'grid',
  currentDetail: null,
};

// 初回のサンプル投稿（空のときだけ）
if(state.posts.length === 0){
  state.posts = [
    {id:gid(),type:'text',cat:'メモ',content:'apparent は「一見〜」の意味があるらしい。\n\nan apparent contradiction = 一見矛盾',ts:Date.now()-3600000*2},
    {id:gid(),type:'text',cat:'AI会話',content:'Q: 三角関数の合成って何のため？\n\nA: 振幅と位相を1つの式にまとめる。\n波形を1つのsin/cosで表すために使う。',ts:Date.now()-3600000*5},
    {id:gid(),type:'text',cat:'疑問',content:'仮定法過去完了って、過去のことなのに「would have」を使うのは\nなんで「未来形のwill」が「過去形になる」のか？',ts:Date.now()-3600000*9},
  ];
  save();
}

function gid(){return 'p_' + Math.random().toString(36).slice(2,10) + Date.now().toString(36);}
function save(){localStorage.setItem(STORE_KEY, JSON.stringify(state.posts));}
function saveSubs(){localStorage.setItem(SUB_KEY, JSON.stringify(state.subs));}

// ── 日付フォーマット ──
function fmtDate(ts){
  const d = new Date(ts);
  const now = new Date();
  const diff = (now - d) / 1000;
  if(diff < 60) return 'たった今';
  if(diff < 3600) return Math.floor(diff/60) + '分前';
  if(diff < 86400) return Math.floor(diff/3600) + '時間前';
  if(diff < 604800) return Math.floor(diff/86400) + '日前';
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function fmtDateLong(ts){
  const d = new Date(ts);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ─────────────────────────────────────────────
// RENDER : Home
// ─────────────────────────────────────────────
function renderHome(){
  // stats
  const today = new Date();today.setHours(0,0,0,0);
  const todayCount = state.posts.filter(p => p.ts >= today.getTime()).length;
  document.getElementById('stat-count').textContent = state.posts.length;
  document.getElementById('stat-today').textContent = todayCount;

  // channels
  const chRow = document.getElementById('channels-row');
  chRow.innerHTML = '';
  // 「あなた」だけは自分のメモ最新
  const youCh = document.createElement('div');
  youCh.className = 'ch';
  youCh.innerHTML = `
    <div class="ch-ava" style="background:var(--g-soft);color:var(--g-deep);">K</div>
    <div class="ch-name">あなた</div>`;
  youCh.onclick = () => switchView('grid');
  chRow.appendChild(youCh);

  CHANNELS.forEach(ch => {
    const subbed = state.subs.includes(ch.id);
    const el = document.createElement('div');
    el.className = 'ch' + (subbed ? ' has-new' : '');
    el.innerHTML = `
      <div class="ch-ava">${ch.name.charAt(0)}</div>
      <div class="ch-name">${ch.name}</div>`;
    el.onclick = () => openChannel(ch.id);
    chRow.appendChild(el);
  });

  // grid
  const grid = document.getElementById('grid');
  if(state.posts.length === 0){
    grid.parentElement.innerHTML = `
      <div class="empty">
        <div class="empty-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
            <circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/>
          </svg>
        </div>
        <div class="empty-text">
          <b>まだ何もありません</b>
          パッと撮って、雑に置いておく場所です。<br>整理は要りません。
        </div>
      </div>`;
    return;
  }
  // grid再構築（リセット）
  let gw = document.getElementById('grid-wrap');
  if(!gw){
    const wrap = document.createElement('div');
    wrap.className = 'grid-wrap';
    wrap.id = 'grid-wrap';
    wrap.innerHTML = '<div class="grid" id="grid"></div>';
    chRow.parentElement.insertBefore(wrap, chRow.parentElement.querySelector('.fab'));
    gw = wrap;
  }
  const gridEl = document.getElementById('grid');
  gridEl.innerHTML = '';
  // 新しい順
  const sorted = [...state.posts].sort((a,b) => b.ts - a.ts);
  sorted.forEach(p => {
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.onclick = () => openDetail(p.id);
    if(p.type === 'image' && p.dataUrl){
      tile.innerHTML = `<img src="${p.dataUrl}" alt="">`;
      if(p.cat) tile.innerHTML += `<div class="tile-corner">${escapeHtml(p.cat)}</div>`;
    } else {
      tile.innerHTML = `
        <div class="tile-text">
          <div class="tile-text-q">${escapeHtml(p.content || '')}</div>
        </div>
        ${p.cat ? `<div class="tile-corner">${escapeHtml(p.cat)}</div>` : ''}`;
    }
    if(!p.learned){
      tile.innerHTML += `<div class="tile-mark"></div>`;
    }
    gridEl.appendChild(tile);
  });
}

// ─────────────────────────────────────────────
// RENDER : Reel
// ─────────────────────────────────────────────
function renderReel(){
  const sc = document.getElementById('reel-scroller');
  sc.innerHTML = '';
  const sorted = [...state.posts].sort((a,b) => b.ts - a.ts);
  if(sorted.length === 0){
    sc.innerHTML = `<div style="height:100%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.5);font-size:13px;letter-spacing:0.04em;">保存したものがリールに並びます</div>`;
    return;
  }
  sorted.forEach((p, i) => {
    const item = document.createElement('div');
    item.className = 'reel-item';
    const total = sorted.length;
    const segments = Array.from({length: Math.min(total, 8)}, (_, idx) =>
      `<div class="reel-progress-seg ${idx <= Math.min(i, 7) ? 'passed' : ''}"></div>`
    ).join('');
    let media = '';
    if(p.type === 'image' && p.dataUrl){
      media = `<img class="reel-img" src="${p.dataUrl}" alt="">`;
    } else {
      media = `
        <div class="reel-text-bg">
          <div class="reel-text-content">${escapeHtml(p.content || '').replace(/\n/g, '<br>')}</div>
        </div>`;
    }
    item.innerHTML = `
      ${media}
      <div class="reel-progress">${segments}</div>
      <div class="reel-meta">
        <div class="reel-cat">${escapeHtml(p.cat || 'メモ')}</div>
        <div class="reel-count">${i+1} / ${total}</div>
      </div>
      <div class="reel-bottom">
        <div class="reel-date">${fmtDateLong(p.ts)}</div>
        <div class="reel-actions">
          <button class="reel-act" data-act="learned" data-id="${p.id}">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 6L9 17l-5-5"/></svg>
            覚えた
          </button>
          <button class="reel-act primary" data-act="dig" data-id="${p.id}">深掘り</button>
        </div>
      </div>
    `;
    sc.appendChild(item);
  });
  // bind reel actions
  sc.querySelectorAll('[data-act]').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const id = btn.dataset.id;
      const act = btn.dataset.act;
      if(act === 'learned') markLearned(id);
      if(act === 'dig') openAI(id);
    };
  });
}

// ─────────────────────────────────────────────
// View Switch
// ─────────────────────────────────────────────
function switchView(view){
  state.view = view;
  document.querySelectorAll('.vs-btn').forEach(b => {
    b.classList.toggle('on', b.dataset.view === view);
  });
  if(view === 'grid'){
    showScreen('home');
  } else {
    showScreen('reel');
    renderReel();
  }
}

function showScreen(name){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('on', b.dataset.nav === (name === 'reel' ? 'reel' : 'home'));
  });
}

// ─────────────────────────────────────────────
// CAPTURE SHEET
// ─────────────────────────────────────────────
const sheet = document.getElementById('sheet');
const sheetMask = document.getElementById('sheet-mask');
const sheetBody = document.getElementById('sheet-body');
const sheetTitle = document.getElementById('sheet-title');

function openSheet(){
  sheetTitle.textContent = '保存';
  sheetBody.innerHTML = `
    <div class="cap-options">
      <button class="cap-opt" data-cap="camera">
        <div class="cap-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="6" width="18" height="13" rx="2"/>
            <circle cx="12" cy="12.5" r="3.5"/>
            <path d="M8 6l1.5-2h5L16 6"/>
          </svg>
        </div>
        <div class="cap-meta">
          <div class="cap-meta-t">撮る</div>
          <div class="cap-meta-s">問題・板書・気になったもの</div>
        </div>
        <svg class="cap-chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 6l6 6-6 6"/></svg>
      </button>
      <button class="cap-opt" data-cap="album">
        <div class="cap-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
        </div>
        <div class="cap-meta">
          <div class="cap-meta-t">アルバムから</div>
          <div class="cap-meta-s">既存の写真を取り込む</div>
        </div>
        <svg class="cap-chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 6l6 6-6 6"/></svg>
      </button>
      <button class="cap-opt" data-cap="text">
        <div class="cap-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M4 6h16M4 12h16M4 18h10"/>
          </svg>
        </div>
        <div class="cap-meta">
          <div class="cap-meta-t">テキスト</div>
          <div class="cap-meta-s">疑問・思考の途中・AIとの会話</div>
        </div>
        <svg class="cap-chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 6l6 6-6 6"/></svg>
      </button>
    </div>
  `;
  sheet.classList.add('on');
  sheetMask.classList.add('on');

  sheetBody.querySelectorAll('[data-cap]').forEach(btn => {
    btn.onclick = () => {
      const t = btn.dataset.cap;
      if(t === 'text') showTextCapture();
      if(t === 'camera' || t === 'album') triggerFile(t === 'camera');
    };
  });
}

function showTextCapture(){
  sheetTitle.textContent = '雑に書く';
  sheetBody.innerHTML = `
    <textarea class="cap-text-area" id="cap-text" placeholder="思考を逃がさず、ここに置く。&#10;タイトルは要りません。" autofocus></textarea>
    <div class="cap-bottom-bar">
      <div class="cap-hint">タイトル不要・整理不要</div>
      <button class="cap-save" id="cap-save" disabled>保存</button>
    </div>
  `;
  const ta = document.getElementById('cap-text');
  const sv = document.getElementById('cap-save');
  ta.focus();
  ta.oninput = () => { sv.disabled = ta.value.trim().length === 0; };
  sv.onclick = () => {
    const content = ta.value.trim();
    if(!content) return;
    addPost({type:'text', content, cat:'メモ'});
    closeSheet();
    toast('保存しました');
  };
}

function triggerFile(useCamera){
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*';
  if(useCamera) inp.capture = 'environment';
  inp.onchange = (e) => {
    const f = e.target.files[0];
    if(!f) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      addPost({type:'image', dataUrl: ev.target.result, cat:'写真'});
      closeSheet();
      toast('保存しました');
    };
    reader.readAsDataURL(f);
  };
  inp.click();
}

function closeSheet(){
  sheet.classList.remove('on');
  sheetMask.classList.remove('on');
}

sheetMask.onclick = closeSheet;
document.getElementById('sheet-close').onclick = closeSheet;

// ─────────────────────────────────────────────
// POST操作
// ─────────────────────────────────────────────
function addPost(data){
  const post = {id:gid(), ts:Date.now(), learned:false, ...data};
  state.posts.unshift(post);
  save();
  if(state.view === 'grid' && document.getElementById('screen-home').classList.contains('active')){
    renderHome();
  }
}

function markLearned(id){
  const p = state.posts.find(x => x.id === id);
  if(!p) return;
  p.learned = true;
  save();
  toast('覚えた ✓ ／ いつでも見返せます');
  if(state.currentDetail === id) closeDetail();
  if(document.getElementById('screen-home').classList.contains('active')) renderHome();
}

function deletePost(id){
  state.posts = state.posts.filter(p => p.id !== id);
  save();
  closeDetail();
  toast('消しました');
  renderHome();
}

// ─────────────────────────────────────────────
// DETAIL
// ─────────────────────────────────────────────
function openDetail(id){
  const p = state.posts.find(x => x.id === id) || allChannelPosts().find(x => x.id === id);
  if(!p) return;
  state.currentDetail = id;
  const body = document.getElementById('detail-body');
  let media = '';
  if(p.type === 'image' && p.dataUrl){
    media = `<div class="detail-media"><img src="${p.dataUrl}" alt=""></div>`;
  }
  body.innerHTML = `
    ${media}
    <div class="detail-meta">
      <div class="detail-meta-cat">${escapeHtml(p.cat || 'メモ')}</div>
      <div class="detail-meta-dot">·</div>
      <div class="detail-meta-date">${fmtDateLong(p.ts)}</div>
    </div>
    ${p.content ? `<div class="detail-text"><div class="detail-text-q">${escapeHtml(p.content)}</div></div>` : ''}
  `;
  // mark button label
  const mb = document.getElementById('detail-mark');
  mb.innerHTML = p.learned
    ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M20 6L9 17l-5-5"/></svg> 覚えた ✓`
    : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M20 6L9 17l-5-5"/></svg> 覚えた`;

  document.getElementById('detail').classList.add('on');
}

function closeDetail(){
  document.getElementById('detail').classList.remove('on');
  state.currentDetail = null;
}

document.getElementById('detail-back').onclick = closeDetail;
document.getElementById('detail-mark').onclick = () => {
  if(state.currentDetail) markLearned(state.currentDetail);
};
document.getElementById('detail-delete').onclick = () => {
  if(state.currentDetail && confirm('この保存を消しますか？')) deletePost(state.currentDetail);
};
document.getElementById('detail-ai').onclick = () => {
  if(state.currentDetail) openAI(state.currentDetail);
};
document.getElementById('detail-share').onclick = () => toast('共有機能は本実装時に追加');

// ─────────────────────────────────────────────
// AI panel (mock 深掘り)
// ─────────────────────────────────────────────
function openAI(id){
  const p = state.posts.find(x => x.id === id) || allChannelPosts().find(x => x.id === id);
  if(!p) return;
  const panel = document.getElementById('ai-panel');
  const body = document.getElementById('ai-body');
  body.innerHTML = `
    <div class="ai-q">${escapeHtml((p.content || '').slice(0,140))}${(p.content||'').length>140?'…':''}</div>
    <div class="ai-a"><div class="ai-thinking"><span></span><span></span><span></span></div></div>
  `;
  panel.classList.add('on');
  // モック応答（本実装ではClaude API）
  setTimeout(() => {
    const a = body.querySelector('.ai-a');
    a.innerHTML = generateMockAnswer(p);
  }, 900);
}

function generateMockAnswer(p){
  const c = (p.content || '').toLowerCase();
  if(c.includes('apparent')){
    return `apparent には2つの意味があります。\n\n1. はっきりした、明白な\n2. 見かけ上の、表面上の（実は違うかも）\n\n文脈で意味が変わる単語です。\nan apparent contradiction は「一見すると矛盾しているように見える」という意味で、② の使い方。\n\n語源は「現れる appear」。\n「目に見えている状態」がコアイメージなので、「明らかに見える」も「表面に見えているだけ」も同じ語感から来ています。`;
  }
  if(c.includes('仮定法')){
    return `「would have + 過去分詞」の構造には歴史的な理由があります。\n\n英語では「現実から距離を置く」ことを「時制を一つ過去にずらす」ことで表現します。\n\n・現実 → 直説法現在\n・現実から離れた仮定 → 過去形\n・過去の事実に反する仮定 → 過去完了\n\nwill → would は、will の過去形ではなく「現実からの距離」を示す形。\n「would have + 過去分詞」で「過去の事実に反する未来的想像」を表します。\n\n日本語の「〜していたら、〜していただろう」と似た構造です。`;
  }
  if(c.includes('三角関数')){
    return `三角関数の合成は、見た目を整理するための便利な式です。\n\n物理では、2つの波が重なるときに使います。\na sin θ + b cos θ という2つの波が、結局1つの sin 波として表せる、ということ。\n\n√(a²+b²) が合成後の「振幅」、α が「位相のずれ」になります。\n\nこの式が分かっていると、振動・波動・交流回路の問題が一気にシンプルになります。`;
  }
  return `深掘り：\n\nこの保存内容を別の角度から見ると、いくつかの観点があります。\n\n・基本概念の確認\n・典型的な使われ方\n・よくある誤解\n\n本番の実装では、Claude APIに接続して、保存内容を踏まえた精密な解説を返します。`;
}

document.getElementById('ai-close').onclick = () => {
  document.getElementById('ai-panel').classList.remove('on');
};

// ─────────────────────────────────────────────
// CHANNEL
// ─────────────────────────────────────────────
function allChannelPosts(){
  return CHANNELS.flatMap(c => (c.posts||[]).map(p => ({...p, channelId: c.id, id: 'ch_' + c.id + '_' + (p.content||'').slice(0,10), ts: Date.now() - Math.random()*86400000*3, learned:false})));
}

function openChannel(id){
  const ch = CHANNELS.find(c => c.id === id);
  if(!ch) return;
  const ava = document.getElementById('ch-detail-ava');
  ava.textContent = ch.name.charAt(0);
  document.getElementById('ch-detail-name').textContent = '@' + ch.id;
  document.getElementById('ch-detail-desc').textContent = ch.desc;
  const subBtn = document.getElementById('ch-detail-sub');
  const subbed = state.subs.includes(id);
  subBtn.textContent = subbed ? '購読中' : '購読する';
  subBtn.classList.toggle('subscribed', subbed);
  subBtn.onclick = () => {
    if(state.subs.includes(id)){
      state.subs = state.subs.filter(x => x !== id);
      subBtn.textContent = '購読する';
      subBtn.classList.remove('subscribed');
      toast('購読を解除しました');
    } else {
      state.subs.push(id);
      subBtn.textContent = '購読中';
      subBtn.classList.add('subscribed');
      toast('購読しました');
    }
    saveSubs();
    renderHome();
  };

  const grid = document.getElementById('ch-detail-grid');
  grid.innerHTML = '';
  (ch.posts || []).forEach((p, i) => {
    const tile = document.createElement('div');
    tile.className = 'tile';
    const fakeId = 'ch_' + ch.id + '_' + i;
    tile.onclick = () => {
      const synthetic = {id:fakeId, type:p.type, content:p.content, cat:p.cat, ts:Date.now() - i*3600000, learned:false};
      state.posts.push(synthetic); // 一時的にopenDetailから見える化
      save();
      openDetail(fakeId);
    };
    tile.innerHTML = `
      <div class="tile-text">
        <div class="tile-text-q">${escapeHtml(p.content || '')}</div>
      </div>
      ${p.cat ? `<div class="tile-corner">${escapeHtml(p.cat)}</div>` : ''}
    `;
    grid.appendChild(tile);
  });

  document.getElementById('ch-detail').classList.add('on');
}

document.getElementById('ch-back').onclick = () => {
  document.getElementById('ch-detail').classList.remove('on');
};

// ─────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────
let toastTimer = null;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('on'), 1800);
}

// ─────────────────────────────────────────────
// EVENTS
// ─────────────────────────────────────────────
document.getElementById('fab').onclick = openSheet;
document.querySelectorAll('.nav-btn').forEach(b => {
  b.onclick = () => {
    const n = b.dataset.nav;
    if(n === 'capture'){ openSheet(); return; }
    if(n === 'home') switchView('grid');
    if(n === 'reel') switchView('reel');
  };
});
document.querySelectorAll('.vs-btn').forEach(b => {
  b.onclick = () => switchView(b.dataset.view);
});
document.getElementById('btn-channel-search').onclick = () => {
  // 最初のチャネルを開くデモ
  openChannel(CHANNELS[0].id);
};

// ─────────────────────────────────────────────
// UTIL
// ─────────────────────────────────────────────
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, m => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[m]));
}

// 初期描画
renderHome();
</script>
</body>
</html>
